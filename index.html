<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trobetrotter</title>
    
    <!-- Подключаем Tailwind для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключаем React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Подключаем Babel, чтобы браузер понял React-код внутри HTML -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Подключаем парсер для Google Таблиц (магия данных) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Новый современный шрифт в стиле Apple (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .animate-item {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* --- АДАПТИВНЫЙ КОНТЕЙНЕР ПРИЛОЖЕНИЯ --- */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .mobile-simulator {
            height: 100dvh;
            width: 100%;
            position: relative;
            overflow: hidden; 
            overscroll-behavior-y: none;
            transform: translateZ(0); 
        }
        .mobile-simulator > div {
            min-height: 100% !important;
        }

        /* НОВЫЙ КЛАСС: Обертка для контента, которая обеспечивает прокрутку поверх фона */
        .mobile-content {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 10;
        }

        /* Фиксированный размытый фон под стеклом */
        .bg-glass-layer {
            position: absolute; /* ИЗМЕНЕНО: Зафиксировано внутри симулятора */
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =========================================================================================
        // 💖 ВАЙБКОДЕР ЗОНА: НАСТРОЙКИ ПРОЕКТА (МЕНЯЙТЕ ТЕКСТ И ССЫЛКИ В КАВЫЧКАХ) 💖
        // =========================================================================================

        const CONFIG = {
            // --- 1. ГЛАВНЫЙ ЭКРАН ---
            brandName: "Ольга Иванова", 
            slogan: "Твой личный тревел-эксперт", 
            avatarUrl: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=200",
            
            // НОВОЕ: Сочное фото на фон (Размоется и уйдет под стекло)
            bgImageUrl: "https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?auto=format&fit=crop&q=80&w=1000",

            // --- 2. БАЗА ДАННЫХ ТУРОВ (Ссылка на твою Google Таблицу CSV) ---
            googleSheetUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSaRWByT--Ch96eWyxGr2fKuwK7NFITq0YG6g_k6fZkP78CreHlEHB96AU1x6fLyiRT9SxW2_xRTGsG/pub?gid=0&single=true&output=csv",

            // --- 3. РАЗДЕЛ "ОБО МНЕ" ---
            about: {
                title: "Обо мне",
                text: "Привет! Я твой личный тревел-эксперт. Я помогаю людям находить идеальные места для отдыха, организую незабываемые туры и беру всю рутину с документами на себя. Моя цель — сделать так, чтобы ты просто собрал чемодан и наслаждался отпуском!",
                photoUrl: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80&w=400",
            },

            // --- 4. ССЫЛКА ДЛЯ КНОПКИ "БРОНИРОВАНИЕ" ---
            bookingLink: "https://t.me/telegram", 

            // --- 5. КОНТАКТЫ ---
            contacts: {
                telegram: "https://t.me/telegram",
                instagram: "https://instagram.com/instagram",
                whatsapp: "https://wa.me/1234567890",
                phone: "+7 (999) 123-45-67"
            },

            // =====================================================================
            // --- 7. НАСТРОЙКИ ОТЗЫВОВ (СЮДА ВСТАВЛЯТЬ ССЫЛКИ ДЛЯ ОТЗЫВОВ) ---
            // =====================================================================
            // Ссылка №1 (Для чтения отзывов из таблицы)
            reviewsCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSaRWByT--Ch96eWyxGr2fKuwK7NFITq0YG6g_k6fZkP78CreHlEHB96AU1x6fLyiRT9SxW2_xRTGsG/pub?gid=882822745&single=true&output=csv",
            
            // Ссылка №2 (Для отправки новых отзывов)
            reviewsPostUrl: "https://script.google.com/macros/s/AKfycbwnSKpgdCJGand6-hgZ1L6_5a7RRxi9gpf4fa-sPvuOGJqTBp6GiBYtdjOzzjfvMfDR-Q/exec"
        };

        // =========================================================================================
        // 🛑 СТОП-ЛИНИЯ! ДАЛЬШЕ ИДЕТ СЛОЖНЫЙ КОД! НЕ ТРОГАЕМ, ЧТОБЫ МАГИЯ НЕ СЛОМАЛАСЬ! 🛑
        // =========================================================================================

        const IconArrowLeft = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconInstagram = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>;
        const IconSend = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
        const IconPhone = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
        const IconMapPin = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconStar = ({size=24, filled=true, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const IconEdit = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconChevronRight = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
        
        // Иконки для сортировки
        const IconSortAsc = ({size=14, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 5h10"/><path d="M11 9h7"/><path d="M11 13h4"/><path d="M3 17l3 3 3-3"/><path d="M6 18V4"/></svg>;
        const IconSortDesc = ({size=14, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 5h4"/><path d="M11 9h7"/><path d="M11 13h10"/><path d="M3 17l3 3 3-3"/><path d="M6 18V4"/></svg>;
        const IconSortDefault = ({size=14, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;

        function App() {
            const [activeScreen, setActiveScreen] = useState('home');
            const [tours, setTours] = useState([]);
            const [isLoadingTours, setIsLoadingTours] = useState(true);
            const [dynamicBookingLink, setDynamicBookingLink] = useState("");
            
            // Состояние сортировки туров: 'default', 'asc', 'desc'
            const [sortOrder, setSortOrder] = useState('default');

            // Состояния для отзывов
            const [reviews, setReviews] = useState([]);
            const [isLoadingReviews, setIsLoadingReviews] = useState(true);

            // Состояния для модального окна отзывов
            const [isReviewModalOpen, setIsReviewModalOpen] = useState(false);
            const [reviewForm, setReviewForm] = useState({ name: '', text: '', rating: 5 });
            const [isReviewSubmitted, setIsReviewSubmitted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            // --- ЛОГИКА СВАЙПА (Назад вправо) ---
            const touchStartX = useRef(null);
            const touchStartY = useRef(null);

            const handleTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
                touchStartY.current = e.touches[0].clientY;
            };

            const handleTouchEnd = (e) => {
                if (!touchStartX.current || !touchStartY.current) return;

                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;

                const diffX = touchEndX - touchStartX.current;
                const diffY = Math.abs(touchEndY - touchStartY.current);

                // Условия: свайп вправо > 160px (не сильно чувствительно),
                // вертикальное смещение < 50px (чтобы не путать со скроллом)
                if (diffX > 160 && diffY < 50) {
                    if (isReviewModalOpen) {
                        triggerHaptic();
                        setIsReviewModalOpen(false);
                    } else if (activeScreen !== 'home') {
                        navigateTo('home');
                    }
                }

                touchStartX.current = null;
                touchStartY.current = null;
            };

            useEffect(() => {
                // Инициализация Telegram
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                    // Жестко фиксируем шторку
                    if (window.Telegram.WebApp.disableVerticalSwipes) {
                        window.Telegram.WebApp.disableVerticalSwipes();
                    }
                }

                // Загрузка туров
                if (window.Papa && CONFIG.googleSheetUrl) {
                    window.Papa.parse(CONFIG.googleSheetUrl, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            let foundGlobalLink = "";
                            const validTours = results.data.map(row => {
                                const linkKey = Object.keys(row).find(k => k.trim().toLowerCase() === 'bookinglink');
                                const rowLink = linkKey ? row[linkKey].trim() : '';
                                if (rowLink && !foundGlobalLink) foundGlobalLink = rowLink;
                                return { ...row, _actualLink: rowLink };
                            }).filter(row => row.title && row.price);
                            
                            setDynamicBookingLink(foundGlobalLink);
                            setTours(validTours);
                            setIsLoadingTours(false);
                        },
                        error: function(err) {
                            console.error("Ошибка загрузки туров:", err);
                            setIsLoadingTours(false);
                        }
                    });
                } else {
                    setIsLoadingTours(false);
                }

                // Загрузка отзывов
                if (window.Papa && CONFIG.reviewsCsvUrl) {
                    window.Papa.parse(CONFIG.reviewsCsvUrl, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            const fetchedReviews = results.data
                                .filter(row => row.name && row.text)
                                .map((row, index) => ({
                                    id: index,
                                    name: row.name,
                                    date: row.date,
                                    rating: parseInt(row.rating) || 5,
                                    text: row.text
                                })).reverse();
                            setReviews(fetchedReviews);
                            setIsLoadingReviews(false);
                        },
                        error: function(err) {
                            console.error("Ошибка загрузки отзывов:", err);
                            setIsLoadingReviews(false);
                        }
                    });
                } else {
                    setIsLoadingReviews(false);
                }
            }, []);

            const triggerHaptic = () => {
                if (window.Telegram?.WebApp?.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                } else if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
            };

            const navigateTo = (screen, customLink = null) => {
                triggerHaptic();
                
                if (screen === 'booking') {
                    const linkToOpen = CONFIG.bookingLink;
                    if (window.Telegram?.WebApp?.openLink) window.Telegram.WebApp.openLink(linkToOpen);
                    else window.open(linkToOpen, '_blank');
                    return;
                }
                
                if (screen === 'quiQuo') {
                    const linkToOpen = customLink || dynamicBookingLink;
                    if (!linkToOpen) {
                        alert("Ссылка на подборку еще не добавлена в таблицу!");
                        return;
                    }
                    if (window.Telegram?.WebApp?.openLink) window.Telegram.WebApp.openLink(linkToOpen);
                    else window.open(linkToOpen, '_blank');
                    return;
                }

                setActiveScreen(screen);
            };

            const handleSubmitReview = async (e) => {
                e.preventDefault();
                if (isSubmitting) return;
                setIsSubmitting(true);
                
                try {
                    await fetch(CONFIG.reviewsPostUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(reviewForm)
                    });
                    
                    setIsReviewSubmitted(true);
                    
                    const d = new Date();
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = d.getFullYear();
                    const newDateStr = `${day}-${month}-${year}`;
                    
                    setReviews(prev => [{
                        id: Date.now(),
                        name: reviewForm.name,
                        date: newDateStr,
                        rating: reviewForm.rating,
                        text: reviewForm.text
                    }, ...prev]);

                    setTimeout(() => {
                        setIsReviewModalOpen(false);
                        setIsReviewSubmitted(false);
                        setReviewForm({ name: '', text: '', rating: 5 });
                    }, 3000);
                    
                } catch (error) {
                    console.error("Ошибка при отправке отзыва:", error);
                    alert("Упс! Что-то пошло не так. Попробуйте отправить отзыв чуть позже.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            // Логика переключения сортировки
            const toggleSort = () => {
                triggerHaptic();
                if (sortOrder === 'default') setSortOrder('asc');
                else if (sortOrder === 'asc') setSortOrder('desc');
                else setSortOrder('default');
            };

            // Применяем сортировку к массиву туров
            const sortedTours = [...tours].sort((a, b) => {
                if (sortOrder === 'default') return 0;
                // Достаем только цифры из цены (например из "54 468 РУБ" получаем 54468)
                const priceA = parseInt(a.price.replace(/\D/g, '')) || 0;
                const priceB = parseInt(b.price.replace(/\D/g, '')) || 0;
                return sortOrder === 'asc' ? priceA - priceB : priceB - priceA;
            });

            // Компонент тонкой прозрачной кнопки-пузырька (Apple Style)
            const MenuButton = ({ onClick, text, delay }) => (
                <button 
                    onClick={onClick} 
                    className="animate-item w-full bg-white/40 backdrop-blur-md border border-white/50 rounded-[30px] py-4 px-6 flex justify-between items-center active:bg-white/60 active:scale-[0.98] transition-all"
                    style={{animationDelay: delay}}
                >
                    <span className="text-[17px] font-medium tracking-tight text-[#1d1d1f]">{text}</span>
                    <IconChevronRight size={20} className="text-[#86868b]" />
                </button>
            );

            return (
                <div className="min-h-screen flex justify-center w-full bg-[#f5f5f7] sm:bg-[#1c1c1e] sm:py-10">
                    
                    {/* Контейнер приложения */}
                    <div 
                        className="mobile-simulator w-full max-w-2xl sm:rounded-[40px] sm:shadow-2xl text-[#1d1d1f] selection:bg-blue-200 hide-scrollbar"
                        onTouchStart={handleTouchStart}
                        onTouchEnd={handleTouchEnd}
                    >
                        
                        {/* ФОН: Размытое фото под матовым стеклом */}
                        <div className="bg-glass-layer">
                            <img src={CONFIG.bgImageUrl} className="w-full h-full object-cover blur-[0px] scale-110 opacity-90" alt="bg" />
                            <div className="absolute inset-0 bg-white/20 backdrop-blur-sm"></div>
                        </div>

                        {/* ⏳ УЛЬТРАМОДНЫЙ ГЛОБАЛЬНЫЙ ЭКРАН ЗАГРУЗКИ АППКИ */}
                        {(isLoadingTours || isLoadingReviews) && (
                            <div className="absolute inset-0 z-[100] flex flex-col items-center justify-center bg-white/30 backdrop-blur-md animate-fade">
                                <div className="relative w-16 h-16 mb-5 flex items-center justify-center">
                                    {/* Мягкий фоновый круг */}
                                    <div className="absolute inset-0 rounded-full border-[3px] border-[#1d1d1f]/10"></div>
                                    {/* Динамичный градиентный спиннер */}
                                    <div className="absolute inset-0 rounded-full border-[3px] border-transparent border-t-[#1d1d1f] border-r-[#1d1d1f]/50 animate-spin"></div>
                                    {/* Пульсирующая сердцевина */}
                                    <div className="w-6 h-6 bg-[#1d1d1f]/20 rounded-full animate-pulse"></div>
                                </div>
                                <span className="text-[12px] font-bold tracking-[0.2em] text-[#1d1d1f]/80 uppercase animate-pulse">
                                    Загрузка
                                </span>
                            </div>
                        )}
                        
                        {/* КОНТЕНТ: Скроллится поверх фона */}
                        <div className="mobile-content hide-scrollbar">
                            {/* -------------------- 🏠 ГЛАВНЫЙ ЭКРАН -------------------- */}
                            {activeScreen === 'home' && (
                                <div className="relative z-10 h-full min-h-full flex flex-col items-center px-5 pt-12 pb-8 animate-fade">
                                    
                                    {/* 🧑‍💼 БЛОК: Шапка профиля */}
                                    <div className="flex flex-col items-center w-full animate-item" style={{animationDelay: '0.1s'}}>
                                        <div className="relative mb-5">
                                            <img 
                                                src={CONFIG.avatarUrl} 
                                                alt="Аватар" 
                                                className="w-[120px] h-[120px] rounded-full object-cover shadow-[0_8px_24px_rgba(0,0,0,0.12)] border-2 border-white/80" 
                                            />
                                        </div>
                                        <h1 className="text-[28px] font-bold tracking-tight text-[#1d1d1f] text-center leading-tight">
                                            {CONFIG.brandName}
                                        </h1>
                                        <p className="text-[15px] font-medium text-[#1d1d1f]/70 text-center mt-1.5">
                                            {CONFIG.slogan}
                                        </p>
                                    </div>

                                    {/* 🎛️ БЛОК: Основное меню */}
                                    <div className="w-full flex flex-col gap-3.5 mt-auto pb-4">
                                        <MenuButton onClick={() => navigateTo('about')} text="Обо мне" delay="0.2s" />
                                        <MenuButton onClick={() => navigateTo('tours')} text="Горящие туры" delay="0.3s" />
                                        <MenuButton onClick={() => navigateTo('contacts')} text="Контакты" delay="0.4s" />
                                        <MenuButton onClick={() => navigateTo('reviews')} text="Отзывы" delay="0.5s" />
                                    </div>
                                </div>
                            )}

                            {/* -------------------- 👩‍🦰 ЭКРАН "ОБО МНЕ" -------------------- */}
                            {activeScreen === 'about' && (
                                <div className="relative z-10 min-h-screen px-5 pt-12 pb-10 animate-fade flex flex-col">
                                    <button onClick={() => navigateTo('home')} className="flex items-center gap-1 mb-8 font-medium text-[#007aff] active:opacity-60 transition-opacity">
                                        <IconArrowLeft size={22} /> Назад
                                    </button>
                                    
                                    <div className="w-full bg-white/60 backdrop-blur-lg rounded-[32px] p-6 shadow-sm border border-white/60 flex flex-col items-center text-center">
                                        <img src={CONFIG.about.photoUrl} alt="About me" className="w-full h-[250px] object-cover rounded-[24px] mb-6 shadow-sm" />
                                        <h2 className="text-[24px] font-bold tracking-tight text-[#1d1d1f] mb-3">{CONFIG.about.title}</h2>
                                        <p className="text-[16px] text-[#1d1d1f]/80 leading-relaxed font-medium">{CONFIG.about.text}</p>
                                    </div>
                                </div>
                            )}

                            {/* -------------------- 🔥 ЭКРАН "ГОРЯЩИЕ ТУРЫ" -------------------- */}
                            {activeScreen === 'tours' && (
                                <div className="relative z-10 min-h-screen px-5 pt-12 pb-10 animate-fade">
                                    <div className="flex justify-between items-center mb-6">
                                        <button onClick={() => navigateTo('home')} className="flex items-center gap-1 font-medium text-[#007aff] active:opacity-60 transition-opacity">
                                            <IconArrowLeft size={22} /> Назад
                                        </button>
                                        <div className="flex items-center gap-1.5">
                                            <span className="w-2 h-2 rounded-full bg-[#34c759] animate-pulse"></span>
                                            <span className="text-[12px] font-medium text-[#86868b] tracking-wide uppercase">Обновлено</span>
                                        </div>
                                    </div>
                                    
                                    <div className="flex justify-between items-end mb-6">
                                        <h2 className="text-[32px] font-bold tracking-tight text-[#1d1d1f]">Туры</h2>
                                        
                                        {/* Кнопка сортировки */}
                                        <button 
                                            onClick={toggleSort}
                                            className="flex items-center gap-1.5 px-3 py-1.5 bg-white/50 backdrop-blur-md border border-white/60 rounded-full text-[13px] font-medium text-[#1d1d1f] active:bg-white/70 transition-colors shadow-sm"
                                        >
                                            {sortOrder === 'asc' ? <IconSortAsc /> : sortOrder === 'desc' ? <IconSortDesc /> : <IconSortDefault />}
                                            {sortOrder === 'asc' ? 'Дешевле' : sortOrder === 'desc' ? 'Дороже' : 'Сортировка'}
                                        </button>
                                    </div>
                                    
                                    {isLoadingTours ? (
                                        <div className="flex justify-center items-center h-40">
                                            <div className="w-8 h-8 border-[3px] border-[#e5e5ea] border-t-[#86868b] rounded-full animate-spin"></div>
                                        </div>
                                    ) : tours.length === 0 ? (
                                        <div className="text-center text-[#86868b] font-medium py-10 bg-white/60 backdrop-blur-lg rounded-[32px] border border-white/60 shadow-sm">Нет доступных туров</div>
                                    ) : (
                                        <div className="flex flex-col gap-4 w-full">
                                            {sortedTours.map((tour, index) => (
                                                /* Мягкая полупрозрачная карточка */
                                                <div key={tour.id || index} onClick={() => navigateTo('quiQuo', tour._actualLink)} className="relative bg-white/60 backdrop-blur-lg p-4 rounded-[32px] shadow-sm border border-white/60 active:scale-[0.98] transition-transform cursor-pointer flex flex-col">
                                                    
                                                    <div className="relative w-full h-[160px] mb-4 rounded-[20px] overflow-hidden">
                                                        <img src={tour.imageUrl || "https://images.unsplash.com/photo-1514282401047-d79a71a590e8?auto=format&fit=crop&w=600&q=80"} 
                                                             alt={tour.title} 
                                                             className="w-full h-full object-cover" />
                                                        
                                                        {/* ИЗМЕНЕНО: Светло-зеленая плашка рейтинга */}
                                                        <div className="absolute top-3 right-3 px-3 py-1.5 bg-green-100 text-green-800 text-[12px] font-bold rounded-full flex items-center gap-1 shadow-[0_4px_12px_rgba(0,0,0,0.08)]">
                                                            <IconStar size={12} filled={true} className="text-green-800" />
                                                            {tour.rating || "5.0"}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex flex-col px-1">
                                                        <div className="font-bold text-[17px] text-[#1d1d1f] leading-tight mb-1">{tour.hotel}</div>
                                                        
                                                        <div className="text-[14px] text-[#1d1d1f]/70 font-medium mb-1">{tour.dates}</div>
                                                        
                                                        <div className="text-[13px] text-[#1d1d1f]/70 flex items-center gap-1 mb-4">
                                                            <IconMapPin size={14} className="shrink-0" />
                                                            <span className="truncate">{tour.title}</span>
                                                        </div>
                                                        
                                                        <div className="flex items-center justify-between pt-3 border-t border-white/40">
                                                            <div className="flex flex-col">
                                                                {tour.oldPrice && <span className="line-through text-[12px] text-[#1d1d1f]/50 font-medium mb-0.5">{tour.oldPrice}</span>}
                                                                <span className="font-bold text-[19px] text-[#1d1d1f] tracking-tight">{tour.price}</span>
                                                            </div>
                                                            <button 
                                                                onClick={(e) => { e.stopPropagation(); navigateTo('quiQuo', tour._actualLink); }} 
                                                                className="bg-white/80 backdrop-blur-md text-[#007aff] text-[14px] font-semibold py-2 px-4 rounded-full active:bg-white transition-colors"
                                                            >
                                                                Смотреть
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* -------------------- 📞 ЭКРАН "КОНТАКТЫ" -------------------- */}
                            {activeScreen === 'contacts' && (
                                <div className="relative z-10 min-h-screen px-5 pt-12 pb-10 animate-fade flex flex-col">
                                    <button onClick={() => navigateTo('home')} className="flex items-center gap-1 mb-6 font-medium text-[#007aff] active:opacity-60 transition-opacity">
                                        <IconArrowLeft size={22} /> Назад
                                    </button>
                                    
                                    <div className="flex-1 flex flex-col items-center justify-center w-full">
                                        <h2 className="text-[32px] font-bold tracking-tight text-[#1d1d1f] mb-8 text-center">Связь</h2>
                                        
                                        <div className="w-full flex flex-col gap-4">
                                            <a href={CONFIG.contacts.telegram} target="_blank" rel="noreferrer" onClick={triggerHaptic} className="flex items-center p-4 bg-white/60 backdrop-blur-lg rounded-[32px] border border-white/60 shadow-sm active:scale-[0.98] transition-transform">
                                                <div className="w-12 h-12 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center text-[#007aff] mr-4 shadow-sm">
                                                    <IconSend size={22} />
                                                </div>
                                                <span className="text-[17px] font-semibold text-[#1d1d1f]">Telegram</span>
                                                <IconChevronRight size={20} className="text-[#1d1d1f]/40 ml-auto" />
                                            </a>
                                            
                                            <a href={CONFIG.contacts.instagram} target="_blank" rel="noreferrer" onClick={triggerHaptic} className="flex items-center p-4 bg-white/60 backdrop-blur-lg rounded-[32px] border border-white/60 shadow-sm active:scale-[0.98] transition-transform">
                                                <div className="w-12 h-12 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center text-[#e5456d] mr-4 shadow-sm">
                                                    <IconInstagram size={22} />
                                                </div>
                                                <span className="text-[17px] font-semibold text-[#1d1d1f]">Instagram</span>
                                                <IconChevronRight size={20} className="text-[#1d1d1f]/40 ml-auto" />
                                            </a>
                                            
                                            <a href={`tel:${CONFIG.contacts.phone.replace(/[^0-9+]/g, '')}`} onClick={triggerHaptic} className="flex items-center p-4 bg-white/60 backdrop-blur-lg rounded-[32px] border border-white/60 shadow-sm active:scale-[0.98] transition-transform">
                                                <div className="w-12 h-12 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center text-[#34c759] mr-4 shadow-sm">
                                                    <IconPhone size={22} />
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className="text-[17px] font-semibold text-[#1d1d1f]">Телефон</span>
                                                    <span className="text-[14px] text-[#1d1d1f]/70 font-medium">{CONFIG.contacts.phone}</span>
                                                </div>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* -------------------- ⭐️ ЭКРАН "ОТЗЫВЫ" -------------------- */}
                            {activeScreen === 'reviews' && (
                                <div className="relative z-10 min-h-screen pt-12 px-5 animate-fade flex flex-col pb-28">
                                    <button onClick={() => navigateTo('home')} className="flex items-center gap-1 mb-6 font-medium text-[#007aff] active:opacity-60 transition-opacity shrink-0">
                                        <IconArrowLeft size={22} /> Назад
                                    </button>
                                    
                                    <h2 className="text-[32px] font-bold tracking-tight text-[#1d1d1f] mb-6">Отзывы</h2>
                                    
                                    <div className="flex flex-col gap-4 w-full">
                                        {isLoadingReviews ? (
                                            <div className="flex justify-center items-center h-40">
                                                <div className="w-8 h-8 border-[3px] border-[#e5e5ea] border-t-[#86868b] rounded-full animate-spin"></div>
                                            </div>
                                        ) : reviews.length === 0 ? (
                                            <div className="text-center text-[#86868b] font-medium py-10 bg-white/60 backdrop-blur-lg rounded-[32px] border border-white/60 shadow-sm">Здесь пока нет отзывов</div>
                                        ) : (
                                            reviews.map(review => (
                                                <div key={review.id} className="bg-white/60 backdrop-blur-lg p-5 rounded-[28px] shadow-sm border border-white/60 flex flex-col gap-2">
                                                    <div className="flex justify-between items-start">
                                                        <div className="flex flex-col">
                                                            <h3 className="font-bold text-[#1d1d1f] text-[16px]">{review.name}</h3>
                                                            <div className="text-[12px] text-[#1d1d1f]/60 font-medium mt-0.5">{review.date}</div>
                                                        </div>
                                                        <div className="flex gap-0.5">
                                                            {[...Array(5)].map((_, i) => (
                                                                <IconStar key={i} size={14} filled={i < review.rating} className={i < review.rating ? "text-[#ff9500]" : "text-[#1d1d1f]/20"} />
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <p className="text-[#1d1d1f] text-[15px] leading-relaxed mt-2">{review.text}</p>
                                                </div>
                                            ))
                                        )}
                                    </div>

                                    {/* Плавающая кнопка "Написать отзыв" */}
                                    <div className="fixed bottom-0 left-0 w-full p-5 bg-gradient-to-t from-white/70 via-white/40 to-transparent pt-12 pb-8 flex justify-center z-20 pointer-events-none">
                                        <button 
                                            onClick={() => setIsReviewModalOpen(true)}
                                            className="pointer-events-auto w-full max-w-[350px] flex justify-center items-center gap-2 bg-white/90 backdrop-blur-xl border border-white text-[#1d1d1f] rounded-full py-4 text-[17px] font-bold shadow-[0_8px_20px_rgba(0,0,0,0.1)] active:scale-[0.98] transition-transform"
                                        >
                                            <IconEdit size={18} /> Написать отзыв
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div> {/* <-- Конец обертки mobile-content --> */}

                        {/* -------------------- 🪟 МОДАЛЬНОЕ ОКНО ДЛЯ НАПИСАНИЯ ОТЗЫВА -------------------- */}
                        {isReviewModalOpen && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-md animate-fade p-4">
                                <div className="bg-white/80 backdrop-blur-2xl border border-white/50 w-full max-w-[400px] rounded-[40px] p-6 pt-8 shadow-2xl relative animate-item">

                                    <button onClick={() => setIsReviewModalOpen(false)} className="absolute top-6 right-6 w-8 h-8 bg-white/50 rounded-full flex items-center justify-center text-[#1d1d1f]/60 active:scale-90 transition-transform">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                    </button>

                                    {isReviewSubmitted ? (
                                        <div className="py-12 flex flex-col items-center text-center animate-fade">
                                            <div className="w-16 h-16 bg-[#34c759] text-white rounded-full flex items-center justify-center mb-6 shadow-[0_4px_15px_rgba(52,199,89,0.3)]">
                                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                            </div>
                                            <h3 className="text-[24px] font-bold tracking-tight text-[#1d1d1f] mb-2">Отправлено</h3>
                                            <p className="text-[15px] text-[#1d1d1f]/70 font-medium">Спасибо за ваш отзыв!</p>
                                        </div>
                                    ) : (
                                        <form onSubmit={handleSubmitReview} className="flex flex-col gap-5 mt-2">
                                            <h3 className="text-[24px] font-bold tracking-tight text-[#1d1d1f] mb-2">Новый отзыв</h3>
                                            
                                            <div className="flex flex-col gap-2 mb-2 items-center">
                                                <div className="flex gap-2 text-[#ff9500]">
                                                    {[1, 2, 3, 4, 5].map((star) => (
                                                        <button type="button" key={star} onClick={() => setReviewForm({...reviewForm, rating: star})} className="transition-transform active:scale-75">
                                                            <IconStar size={40} filled={star <= reviewForm.rating} className={star <= reviewForm.rating ? "text-[#ff9500]" : "text-[#1d1d1f]/10"} />
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="flex flex-col gap-3 bg-white/40 p-3 rounded-[24px] border border-white/50">
                                                <input 
                                                    type="text" 
                                                    required
                                                    value={reviewForm.name}
                                                    onChange={(e) => setReviewForm({...reviewForm, name: e.target.value})}
                                                    className="w-full bg-transparent px-3 py-2 outline-none font-medium text-[16px] text-[#1d1d1f] placeholder-[#1d1d1f]/40 border-b border-white/40"
                                                    placeholder="Ваше имя"
                                                />
                                                <textarea 
                                                    required
                                                    rows="3"
                                                    value={reviewForm.text}
                                                    onChange={(e) => setReviewForm({...reviewForm, text: e.target.value})}
                                                    className="w-full bg-transparent px-3 py-2 outline-none font-medium text-[16px] text-[#1d1d1f] resize-none placeholder-[#1d1d1f]/40"
                                                    placeholder="Поделитесь впечатлениями..."
                                                ></textarea>
                                            </div>

                                            <button type="submit" disabled={isSubmitting} className={`w-full bg-[#007aff] text-white py-4 rounded-full font-semibold mt-4 shadow-sm text-[17px] flex justify-center items-center gap-2 ${isSubmitting ? 'opacity-70 cursor-not-allowed' : 'active:scale-[0.98] transition-transform'}`}>
                                                {isSubmitting ? (
                                                    <><div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> Отправка...</>
                                                ) : 'Отправить'}
                                            </button>
                                        </form>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
