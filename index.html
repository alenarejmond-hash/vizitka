<!DOCTYPE html>
<html lang="ru" class="overscroll-none">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tracks & Stories</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Настройки Telegram Mini App -->

      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand(); // Открывает приложение сразу на весь экран

        window.Telegram.WebApp.disableVerticalSwipes(); // Запрещает случайное закрытие свайпом вниз
      }

  <style>

    .font-sans { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-[#F9F8F6] overscroll-none">

      heroImage: "https://i.postimg.cc/9QM60kVV/ib7.webp",      // Главное фото сверху
      authorName: "Кристина Вейс",
      authorSubtitle: "Авторские путешествия",

      reviews: [],

      contactsSub: "Связаться",
      // Ссылки на соцсети. Если оставить пустые кавычки "", эта кнопка просто скроется из меню
      socialLinks: {
        whatsapp: "https://wa.me/79990000000",
        telegram: "https://t.me/durov",
        instagram: "https://instagram.com",
        vk: "https://vk.com"
      },

      // --- 3. АКТУАЛЬНЫЙ ТУР (НА ГЛАВНОМ ЭКРАНЕ) ---

      mainTourDates: "",
      mainTourLocation: "",
      mainTourDesc: "",
      mainTourBtnText: "Программа тура",
      mainTourLink: "", 

      // --- 4. ГЛАВНАЯ КНОПКА ВНИЗУ (STICKY) ---

      // --- 6. ПРЯМАЯ ССЫЛКА НА ГУГЛ ТАБЛИЦУ ТУРОВ (CSV) ---

      // Фото для архива (теперь загружаются исключительно из твоей Гугл Таблицы)

      formSubmitBtnText: "Отправить заявку",
      formSuccessText: "Заявка успешно отправлена! Мы скоро свяжемся с вами.",

      // --- 5. СПИСОК ТУРОВ В ШТОРКЕ ---

  </script>
  <!-- ================= КОНЕЦ БЛОКА НАСТРОЕК ================= -->


  <!-- Прелоадер (Экран загрузки) -->
  <div id="preloader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-700 bg-cover bg-center">
    <div class="absolute inset-0 bg-[#F9F8F6]/80 backdrop-blur-md"></div>
    <div class="relative z-10 flex flex-col items-center">
      <!-- Спиннер -->
      <svg class="animate-spin h-12 w-12 text-[#B85C47] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p class="font-serif text-[#1A1A1A] text-lg tracking-widest uppercase animate-pulse">Загрузка...</p>
    </div>
  </div>

  <div class="min-h-screen bg-[#F9F8F6] text-[#242424] font-sans pb-32 relative selection:bg-[#B85C47] selection:text-white">
    
    <!-- Ограничитель ширины для адаптации на всех устройствах -->
    <div class="w-full max-w-md md:max-w-3xl lg:max-w-5xl mx-auto bg-[#F9F8F6] min-h-screen relative shadow-2xl md:shadow-none shadow-black/5">
      
      <!-- БЛОК 1: Hero-секция -->
      <header class="relative w-full flex flex-col items-center">
        <!-- Фото -->
        <div class="w-full h-[35vh] md:h-[45vh] lg:h-[55vh] min-h-[280px] relative">
          <img 
            id="cfg-hero-image"
            src="" 
            alt="Atmospheric landscape" 
            class="w-full h-full object-cover"
          />
          <!-- Легкий градиент для мягкого перехода к фону -->
          <div class="absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-[#F9F8F6] to-transparent"></div>
        </div>

        <!-- Заголовок (наплывает на фото) -->
        <div class="relative -mt-10 md:-mt-16 flex flex-col items-center px-4 text-center z-10 w-full">
          <div class="bg-[#F9F8F6]/80 backdrop-blur-md px-8 py-6 md:py-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-[90%] md:w-[70%] lg:w-[50%] border border-white/50">
            <h1 id="cfg-author-name" class="font-serif text-3xl font-medium tracking-wide mb-3 text-[#1A1A1A]"></h1>
            <div class="flex items-center justify-center gap-3">
              <div class="h-[1px] w-8 bg-[#B85C47]/40"></div>
              <p class="font-sans uppercase tracking-[0.2em] text-[9px] font-medium text-[#6B6B6B]">
                Tracks & Stories
              </p>
              <div class="h-[1px] w-8 bg-[#B85C47]/40"></div>
            </div>
            <p id="cfg-author-sub" class="font-serif italic text-sm text-[#8C8C8C] mt-2"></p>
          </div>
        </div>
      </header>

      <!-- Основной контент -->
      <main class="px-5 md:px-10 lg:px-16 py-8 md:py-12">
        
        <!-- БЛОК 2: Bento-Grid -->
        <section class="relative z-20">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-5">
            <!-- Карточка 1: Ближайшие экспедиции -->
            <button type="button" onclick="openExpeditions()" class="appearance-none focus:outline-none w-full text-left col-span-2 md:col-span-2 relative aspect-[21/9] md:aspect-auto md:h-full rounded-[10px] overflow-hidden shadow-sm group cursor-pointer">
              <img 
                id="cfg-expeditions-image"
                src="" 
                alt="Expeditions" 
                class="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105 pointer-events-none" 
              />
              <div class="absolute inset-0 bg-black/30 transition-colors duration-500 group-hover:bg-black/40 pointer-events-none"></div>
              <div class="absolute inset-0 p-5 flex flex-col justify-end text-white pointer-events-none">
                <div class="flex items-end justify-between">
                  <div>
                    <p class="text-[10px] uppercase tracking-widest opacity-80 mb-1">Расписание</p>
                    <h3 class="font-serif text-2xl">Экспедиции</h3>
                  </div>
                  <div class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                  </div>
                </div>
              </div>
            </button>

            <!-- Карточка 2: Как это было (ТЕПЕРЬ ОТКРЫВАЕТ НОВУЮ ШТОРКУ) -->
            <button type="button" onclick="openArchive()" class="appearance-none focus:outline-none w-full text-left bg-white rounded-[10px] p-5 aspect-square flex flex-col items-center justify-center text-center shadow-[0_2px_15px_-4px_rgba(0,0,0,0.03)] hover:shadow-md transition-shadow cursor-pointer">
              <div class="w-12 h-12 rounded-full bg-[#F9F8F6] flex items-center justify-center mb-3 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-[#B85C47]"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
              </div>
              <span id="cfg-archive-title" class="text-sm font-medium tracking-wide pointer-events-none"></span>
              <span id="cfg-archive-sub" class="text-[10px] text-[#8C8C8C] mt-1 pointer-events-none"></span>
            </button>

            <!-- Карточка 3: Моя философия (ТЕПЕРЬ ОТКРЫВАЕТ ПОПАП) -->
            <button type="button" onclick="openPhilosophy()" class="appearance-none focus:outline-none w-full text-left bg-white rounded-[10px] p-5 aspect-square flex flex-col items-center justify-center text-center shadow-[0_2px_15px_-4px_rgba(0,0,0,0.03)] hover:shadow-md transition-shadow cursor-pointer">
              <div class="w-12 h-12 rounded-full bg-[#F9F8F6] flex items-center justify-center mb-3 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-[#B85C47]"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
              </div>
              <span id="cfg-philosophy-title" class="text-sm font-medium tracking-wide pointer-events-none"></span>
            <span id="cfg-philosophy-sub" class="text-[10px] text-[#8C8C8C] mt-1 pointer-events-none"></span>
          </button>

          <!-- Карточка 4: Отзывы (ТЕПЕРЬ ОТКРЫВАЕТ ШТОРКУ ОТЗЫВОВ) -->
          <button type="button" onclick="openReviews()" class="appearance-none focus:outline-none w-full text-left bg-white rounded-[10px] p-5 aspect-square flex flex-col items-center justify-center text-center shadow-[0_2px_15px_-4px_rgba(0,0,0,0.03)] hover:shadow-md transition-shadow cursor-pointer">
            <div class="w-12 h-12 rounded-full bg-[#F9F8F6] flex items-center justify-center mb-3 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-[#B85C47]"><path d="M12 21a9 9 0 1 0-9-9c0 1.488.36 2.89 1 4.127L3 21l4.873-1c1.236.64 2.64 1 4.127 1Z"/><path d="M9 12h.01"/><path d="M12 12h.01"/><path d="M15 12h.01"/></svg>
            </div>
            <span id="cfg-reviews-title" class="text-sm font-medium tracking-wide pointer-events-none"></span>
            <span id="cfg-reviews-sub" class="text-[10px] text-[#8C8C8C] mt-1 pointer-events-none"></span>
          </button>

          <!-- Карточка 5: Контакты (ТЕПЕРЬ ОТКРЫВАЕТ ШТОРКУ КОНТАКТОВ) -->
            <button type="button" onclick="openContacts()" class="appearance-none focus:outline-none w-full text-left bg-white rounded-[10px] p-5 aspect-square flex flex-col items-center justify-center text-center shadow-[0_2px_15px_-4px_rgba(0,0,0,0.03)] hover:shadow-md transition-shadow cursor-pointer">
              <div class="w-12 h-12 rounded-full bg-[#F9F8F6] flex items-center justify-center mb-3 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-[#B85C47]"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </div>
              <span id="cfg-contacts-title" class="text-sm font-medium tracking-wide pointer-events-none"></span>
              <span id="cfg-contacts-sub" class="text-[10px] text-[#8C8C8C] mt-1 pointer-events-none"></span>
            </button>
          </div>
        </section>

        <!-- БЛОК 3: Актуальный тур -->
        <section class="mt-12">
          <h2 class="font-serif text-[22px] mb-5 text-[#1A1A1A] flex items-center gap-3">
            <span class="w-6 h-[1px] bg-[#B85C47]"></span>
            Скоро отправляемся
          </h2>
          
          <div class="bg-white rounded-[12px] overflow-hidden shadow-[0_8px_25px_-8px_rgba(0,0,0,0.06)] border border-[#F0EFEA] md:flex md:items-stretch">
            <!-- Фото тура -->
            <div class="relative h-[220px] md:h-auto md:w-1/2 md:shrink-0 md:min-h-[300px]">
              <img 
                id="cfg-main-tour-image"
                src="" 
                alt="Main Tour" 
                class="w-full h-full object-cover" 
              />
              <div class="absolute top-4 right-4 bg-white/95 backdrop-blur-md px-3 py-1.5 rounded-[6px] shadow-sm">
                <p id="cfg-main-tour-badge" class="text-[11px] font-semibold text-[#B85C47] tracking-wide uppercase"></p>
              </div>
            </div>
            
            <!-- Описание тура -->
            <div class="p-6 md:p-8 lg:p-10 md:w-1/2 md:flex md:flex-col md:justify-center">
              <div class="flex justify-between items-start mb-3">
                <h3 id="cfg-main-tour-title" class="font-serif text-2xl text-[#1A1A1A]"></h3>
              </div>
              
              <div class="flex flex-col gap-2 mb-5">
                <div class="flex items-center text-sm text-[#6B6B6B]">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mr-3 text-[#B85C47]/70"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                  <span id="cfg-main-tour-dates" class="tracking-wide"></span>
                </div>
                <div class="flex items-center text-sm text-[#6B6B6B]">
                  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mr-3 text-[#B85C47]/70"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                  <span id="cfg-main-tour-location" class="tracking-wide"></span>
                </div>
              </div>
              
              <p id="cfg-main-tour-desc" class="text-[13px] text-[#6B6B6B] leading-relaxed mb-6 font-light line-clamp-4"></p>
              
              <a id="cfg-main-tour-btn" href="#" target="_blank" class="w-full py-3.5 border border-[#E5E5E5] text-[#242424] rounded-[8px] text-xs uppercase tracking-[0.15em] font-medium hover:bg-[#F9F8F6] transition-colors flex items-center justify-center gap-2">
                <span id="cfg-main-tour-btn-text"></span>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </a>
            </div>
          </div>
        </section>

      </main>

      <!-- БЛОК 4: Sticky CTA -->
      <div class="fixed bottom-0 left-0 right-0 p-5 md:p-8 pt-16 md:pt-24 bg-gradient-to-t from-[#F9F8F6] via-[#F9F8F6]/95 to-transparent z-50 pointer-events-none">
        <div class="w-full max-w-md md:max-w-3xl lg:max-w-5xl mx-auto">
          <button id="cfg-bottom-btn" onclick="openForm()" class="pointer-events-auto w-full bg-[#B85C47] text-white py-4 px-6 rounded-[10px] text-xs uppercase tracking-[0.15em] font-medium shadow-[0_8px_20px_-6px_rgba(184,92,71,0.5)] hover:bg-[#A3503D] hover:-translate-y-0.5 transition-all duration-300 active:scale-[0.98] active:translate-y-0 flex items-center justify-center gap-2 text-center block">
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Всплывающая шторка (Bottom Sheet) "Экспедиции" -->

      document.getElementById('cfg-archive-sheet-text').textContent = `«${APP_DATA.archiveSheetText}»`;
      document.getElementById('cfg-archive-sheet-btn-text').textContent = APP_DATA.archiveSheetBtnText;
      document.getElementById('cfg-archive-sheet-btn').href = APP_DATA.archiveSheetBtnLink;

      const galleryContainer = document.getElementById('cfg-archive-gallery');
      galleryContainer.innerHTML = '';
      APP_DATA.archivePhotos.forEach((photoUrl, index) => {
        // Делаем красивую журнальную асимметрию: первая или каждая 3-я картинка - широкая

          <div class="${isWide ? 'col-span-2 aspect-[16/9]' : 'aspect-square'} rounded-[8px] overflow-hidden shadow-[0_2px_10px_rgba(0,0,0,0.05)] border border-[#F0EFEA]">

      APP_DATA.tours.forEach(tour => {
        const isSold = tour.isSoldOut;
        const html = `
          <a href="${tour.link}" target="_blank" class="flex flex-col h-full bg-white rounded-[20px] overflow-hidden shadow-[0_8px_30px_-10px_rgba(0,0,0,0.08)] border border-[#F0EFEA] hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group ${isSold ? 'opacity-85 hover:opacity-100' : ''}">

              </div>
            </div>
            
            <!-- Информация (Точно под фото, 100% отображение) -->
            <div class="p-6 md:p-8 flex flex-col flex-1 bg-white">
              <h3 class="font-serif text-[22px] md:text-[26px] text-[#1A1A1A] mb-4 leading-tight group-hover:text-[#B85C47] transition-colors">${tour.title}</h3>
              
              <div class="flex flex-col gap-2.5 mb-5">
                <p class="text-[14px] text-[#6B6B6B] flex items-center gap-2.5 font-medium">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-[#B85C47]/80 shrink-0"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                  ${tour.dates}
                </p>
                ${tour.location ? `
                <p class="text-[14px] text-[#6B6B6B] flex items-center gap-2.5 font-medium">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-[#B85C47]/80 shrink-0"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${tour.location}
                </p>
                ` : ''}
              </div>

              <!-- ТЕКСТ описания (Ограничен 4 строками) -->
              ${tour.desc ? `<p class="text-[14px] text-[#6B6B6B] leading-relaxed mb-6 font-light line-clamp-4">${tour.desc}</p>` : ''}
              
              <div class="flex items-center justify-between mt-auto pt-5 border-t border-[#F0EFEA]">
                <span class="text-[18px] font-semibold text-[#1A1A1A] ${isSold ? 'opacity-50 line-through' : ''}">${tour.price}</span>
                ${isSold 
                  ? `<span class="text-[#8C8C8C] text-[10px] uppercase tracking-widest font-bold px-4 py-2 bg-[#F9F8F6] rounded-[8px]">${tour.soldOutText || "В резерв"}</span>`
                  : `<span class="flex items-center gap-2.5 text-[11px] uppercase tracking-widest font-semibold text-[#B85C47] group-hover:text-[#A3503D] transition-colors">
                      Подробнее
                      <span class="w-8 h-8 rounded-full bg-[#B85C47]/10 flex items-center justify-center group-hover:bg-[#B85C47] group-hover:text-white transition-all shadow-sm shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>

      // Генерируем опции для селектора туров в Форме

          tourSelect.insertAdjacentHTML('beforeend', `<option value="${tour.title}" style="background-color: #ffffff; color: #242424;">${tour.title}</option>`);

          tourSelect.insertAdjacentHTML('beforeend', `<option value="${tour.title} (В резерв)" style="background-color: #ffffff; color: #242424;">${tour.title} (В резерв)</option>`);

      // 7. Генерируем отзывы
      const reviewsContainer = document.getElementById('cfg-reviews-container');
      reviewsContainer.innerHTML = '';
      APP_DATA.reviews.forEach(review => {
        const html = `
          <div class="bg-white border border-[#F0EFEA] shadow-[0_8px_30px_-10px_rgba(0,0,0,0.06)] rounded-[20px] p-6 relative">

    // Запуск приложения и загрузка из Гугл Таблицы
    window.addEventListener('load', function() {
      applyVibeConfig();

      // СРАЗУ убираем экран загрузки, чтобы ничего не зависало!
      const preloader = document.getElementById('preloader');
      if (preloader) {
        setTimeout(() => {
          preloader.style.opacity = '0';
          preloader.style.pointerEvents = 'none'; // Сразу разрешаем кликать сквозь него
          setTimeout(() => {
            preloader.style.display = 'none';
          }, 700);
        }, 400); // Быстрое скрытие
      }

      // Массив промисов для параллельной загрузки двух таблиц (Грузим в фоне)
      const fetches = [];

      // Запрос на туры
      if (APP_DATA.googleSheetUrl) {
        fetches.push(
          fetch(APP_DATA.googleSheetUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n');
            const fetchedTours = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim();
              if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              fetchedTours.push({
                title: cols[0] || "",
                dates: cols[1] || "",
                price: cols[2] || "",
                badge: cols[3] || "",
                image: cols[4] || "",
                link: cols[5] || "",
                isSoldOut: (cols[6] && cols[6].toLowerCase() === 'да'),
                soldOutText: "Запись в резерв",
                location: cols[7] || "",
                desc: cols[8] || ""
              });
            }
            if (fetchedTours.length > 0) APP_DATA.tours = fetchedTours;
          }).catch(e => console.error("Ошибка загрузки туров:", e))
        );
      }

      // Запрос на фото для архива
      if (APP_DATA.googleSheetArchiveUrl) {
        fetches.push(
          fetch(APP_DATA.googleSheetArchiveUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n');
            const fetchedPhotos = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim();
              if (!row) continue;
              // Берем первую колонку (ссылку на фото)
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              if (cols[0]) fetchedPhotos.push(cols[0]); 
            }
            if (fetchedPhotos.length > 0) APP_DATA.archivePhotos = fetchedPhotos;
          }).catch(e => console.error("Ошибка загрузки фото архива:", e))
        );
      }

      // Запрос на отзывы (Чтение из Гугл Таблицы)
      if (APP_DATA.googleSheetReviewsUrl) {
        fetches.push(
          fetch(APP_DATA.googleSheetReviewsUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n');
            const fetchedReviews = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim();
              if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              // Ожидаем: Имя (0), Тур/Дата (1), Текст отзыва (2)
              if (cols[0] && cols[2]) {
                fetchedReviews.push({
                  name: cols[0] || "Гость",
                  tour: cols[1] || "",
                  text: cols[2] || ""
                });
              }
            }
            if (fetchedReviews.length > 0) APP_DATA.reviews = fetchedReviews;
          }).catch(e => console.error("Ошибка загрузки отзывов:", e))
        );
      }

      // Ждем загрузки обеих таблиц в фоновом режиме
      Promise.allSettled(fetches).then(() => {
        // Перерисовываем с новыми данными незаметно для пользователя
        applyVibeConfig();
      });
    });

    // --- УПРАВЛЕНИЕ ШТОРКАМИ ---
    
    // Экспедиции
    function openExpeditions() {
      document.getElementById('expeditions-sheet').classList.remove('pointer-events-none');
      document.getElementById('expeditions-backdrop').classList.replace('opacity-0', 'opacity-100');
      document.getElementById('expeditions-content').classList.replace('translate-y-full', 'translate-y-0');
      document.body.style.overflow = 'hidden';
    }

    function closeExpeditions() {
      document.getElementById('expeditions-backdrop').classList.replace('opacity-100', 'opacity-0');
      document.getElementById('expeditions-content').classList.replace('translate-y-0', 'translate-y-full');
      setTimeout(() => {
        document.getElementById('expeditions-sheet').classList.add('pointer-events-none');
        document.body.style.overflow = '';
      }, 500); 
    }

    // Как это было (Архив)
    function openArchive() {
      document.getElementById('archive-sheet').classList.remove('pointer-events-none');
      document.getElementById('archive-backdrop').classList.replace('opacity-0', 'opacity-100');
      document.getElementById('archive-content').classList.replace('translate-y-full', 'translate-y-0');
      document.body.style.overflow = 'hidden';
    }

    function closeArchive() {
      document.getElementById('archive-backdrop').classList.replace('opacity-100', 'opacity-0');
      document.getElementById('archive-content').classList.replace('translate-y-0', 'translate-y-full');
      setTimeout(() => {
        document.getElementById('archive-sheet').classList.add('pointer-events-none');
        document.body.style.overflow = '';
      }, 500);

    // Моя философия (Попап)
    function openPhilosophy() {
      document.getElementById('philosophy-popup').classList.remove('pointer-events-none');
      document.getElementById('philosophy-backdrop').classList.replace('opacity-0', 'opacity-100');
      
      const content = document.getElementById('philosophy-content');
      content.classList.replace('scale-95', 'scale-100');
      content.classList.replace('opacity-0', 'opacity-100');
      
      document.body.style.overflow = 'hidden';

    function closePhilosophy() {
      document.getElementById('philosophy-backdrop').classList.replace('opacity-100', 'opacity-0');
      
      const content = document.getElementById('philosophy-content');
      content.classList.replace('scale-100', 'scale-95');
      content.classList.replace('opacity-100', 'opacity-0');
      
      setTimeout(() => {
        document.getElementById('philosophy-popup').classList.add('pointer-events-none');
        document.body.style.overflow = '';
      }, 300); 
    }

    // Форма заявки (Шторка)
    function openForm() {
      document.getElementById('form-sheet').classList.remove('pointer-events-none');
      document.getElementById('form-backdrop').classList.replace('opacity-0', 'opacity-100');
      document.getElementById('form-content').classList.replace('translate-y-full', 'translate-y-0');
      document.body.style.overflow = 'hidden';
      
      // Сбрасываем форму при открытии
      document.getElementById('form-success-msg').classList.add('hidden');
      document.getElementById('lead-form').reset();
      document.getElementById('form-submit-btn').disabled = false;
      document.getElementById('form-btn-icon').classList.remove('hidden');
      document.getElementById('form-btn-loader').classList.add('hidden');
    }

    function closeForm() {
      document.getElementById('form-backdrop').classList.replace('opacity-100', 'opacity-0');
      document.getElementById('form-content').classList.replace('translate-y-0', 'translate-y-full');
      setTimeout(() => {
        document.getElementById('form-sheet').classList.add('pointer-events-none');
        document.body.style.overflow = '';
      }, 500); 
    }

    // Шторка "Отзывы"
    function openReviews() {
      document.getElementById('reviews-sheet').classList.remove('pointer-events-none');
      document.getElementById('reviews-backdrop').classList.replace('opacity-0', 'opacity-100');
      document.getElementById('reviews-content').classList.replace('translate-y-full', 'translate-y-0');
      document.body.style.overflow = 'hidden';
    }

    function closeReviews() {
      document.getElementById('reviews-backdrop').classList.replace('opacity-100', 'opacity-0');
      document.getElementById('reviews-content').classList.replace('translate-y-0', 'translate-y-full');
      setTimeout(() => {
        document.getElementById('reviews-sheet').classList.add('pointer-events-none');
        // Возвращаем скролл страницы, только если не открыта форма написания отзыва
        if (document.getElementById('write-review-sheet').classList.contains('pointer-events-none')) {
          document.body.style.overflow = '';
        }
      }, 500); 
    }

    // Шторка "Написать отзыв"
    function openWriteReview() {
      closeReviews(); // Плавно закрываем список отзывов
      setTimeout(() => {
        document.getElementById('write-review-sheet').classList.remove('pointer-events-none');
        document.getElementById('write-review-backdrop').classList.replace('opacity-0', 'opacity-100');
        document.getElementById('write-review-content').classList.replace('translate-y-full', 'translate-y-0');
        document.body.style.overflow = 'hidden';
        
        // Сброс формы
        document.getElementById('review-success-msg').classList.add('hidden');
        document.getElementById('write-review-form').reset();
        document.getElementById('review-submit-btn').disabled = false;
        document.getElementById('review-btn-icon').classList.remove('hidden');
        document.getElementById('review-btn-loader').classList.add('hidden');
      }, 100);
    }

    function closeWriteReview() {
      document.getElementById('write-review-backdrop').classList.replace('opacity-100', 'opacity-0');
      document.getElementById('write-review-content').classList.replace('translate-y-0', 'translate-y-full');
      setTimeout(() => {
        document.getElementById('write-review-sheet').classList.add('pointer-events-none');
        document.body.style.overflow = '';
      }, 500); 
    }

    // Шторка "Контакты"
    function openContacts() {
      document.getElementById('contacts-sheet').classList.remove('pointer-events-none');
      document.getElementById('contacts-backdrop').classList.replace('opacity-0', 'opacity-100');
      document.getElementById('contacts-content').classList.replace('translate-y-full', 'translate-y-0');
      document.body.style.overflow = 'hidden';
    }

    function closeContacts() {
      document.getElementById('contacts-backdrop').classList.replace('opacity-100', 'opacity-0');
      document.getElementById('contacts-content').classList.replace('translate-y-0', 'translate-y-full');
      setTimeout(() => {
        document.getElementById('contacts-sheet').classList.add('pointer-events-none');
        document.body.style.overflow = '';
      }, 500); 
    }

    // Обработка отправки нового отзыва
    function submitNewReview(event) {
      event.preventDefault();
      
      const form = document.getElementById('write-review-form');
      const btn = document.getElementById('review-submit-btn');
      const icon = document.getElementById('review-btn-icon');
      const loader = document.getElementById('review-btn-loader');
      const successMsg = document.getElementById('review-success-msg');

      btn.disabled = true;
      icon.classList.add('hidden');
      loader.classList.remove('hidden');

      const formData = new URLSearchParams(new FormData(form));

      if (APP_DATA.googleSheetSubmitReviewUrl) {
        fetch(APP_DATA.googleSheetSubmitReviewUrl, {
          method: 'POST',
          body: formData,
          mode: 'no-cors'
        }).then(() => showReviewSuccess())
          .catch(err => showReviewSuccess());
      } else {
        setTimeout(showReviewSuccess, 1000);
      }

      function showReviewSuccess() {
        successMsg.classList.remove('hidden');
        successMsg.classList.add('animate-pulse');
        
        setTimeout(() => {
          closeWriteReview();
        }, 2500);
      }
    }

    // Обработка отправки формы
    function submitForm(event) {
      event.preventDefault(); // Останавливаем стандартную перезагрузку страницы
      
      const form = document.getElementById('lead-form');
      const btn = document.getElementById('form-submit-btn');
      const icon = document.getElementById('form-btn-icon');
      const loader = document.getElementById('form-btn-loader');
      const successMsg = document.getElementById('form-success-msg');

      // Показываем лоадер
      btn.disabled = true;
      icon.classList.add('hidden');
      loader.classList.remove('hidden');

      const formData = new URLSearchParams(new FormData(form));

      // Если в настройках есть ссылка на скрипт - отправляем туда
      if (APP_DATA.googleSheetSubmitUrl) {
        fetch(APP_DATA.googleSheetSubmitUrl, {
          method: 'POST',
          body: formData,
          mode: 'no-cors' // Важно для Гугл Форм/Скриптов без сложных настроек сервера
        }).then(() => {
          showSuccess();
        }).catch(err => {
          console.error('Ошибка отправки:', err);
          showSuccess(); // Для вайб-проектов обычно показываем успех даже при ошибке сети, чтобы не пугать юзера
        });
      } else {
        // Если ссылки нет (тестовый режим) - просто имитируем отправку
        setTimeout(showSuccess, 1000);
      }

      function showSuccess() {
        successMsg.classList.remove('hidden');
        successMsg.classList.add('animate-pulse'); // Легкий визуальный эффект
        
        // Автоматически закрываем форму через 2.5 секунды
        setTimeout(() => {
          closeForm();
        }, 2500);
      }
    }
  </script>
