            serif: ['"Cinzel"', 'serif'],          // Острый шрифт для заголовков
            sans: ['"Space Grotesk"', 'sans-serif'], // Строгий гротеск для чтения

          boxShadow: {
            'glow': '0 0 20px -5px rgba(226, 232, 240, 0.08)',

      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }
    
    /* Стилизация выпадающего списка под темную тему */
    select option {
      background-color: #0A0A0C;
      color: #FFFFFF;
      font-family: "Space Grotesk", sans-serif;
    }

    /* Эффект затухания фото в черный */

      right: 10px;
      pointer-events: none;

  <script>
    function applyVibeConfig() {
      // 1. Главный экран
      document.getElementById('cfg-hero-image').src = APP_DATA.heroImage;
      document.getElementById('cfg-author-name').textContent = APP_DATA.authorName;
      document.getElementById('cfg-author-sub').textContent = "Private Escapes & Night Journeys";

      // Соцсети в футере
      if(APP_DATA.socialLinks) {
        const wa = document.getElementById('cfg-contact-wa');
        if(APP_DATA.socialLinks.whatsapp) { wa.href = APP_DATA.socialLinks.whatsapp; wa.style.display = 'block'; } else { wa.style.display = 'none'; }
        
        const tg = document.getElementById('cfg-contact-tg');
        if(APP_DATA.socialLinks.telegram) { tg.href = APP_DATA.socialLinks.telegram; tg.style.display = 'block'; } else { tg.style.display = 'none'; }
        
        const ig = document.getElementById('cfg-contact-ig');
        if(APP_DATA.socialLinks.instagram) { ig.href = APP_DATA.socialLinks.instagram; ig.style.display = 'block'; } else { ig.style.display = 'none'; }
      }

      // 3. Актуальный тур
      const nearestTour = APP_DATA.tours.find(t => !t.isSoldOut) || APP_DATA.tours[0];
      
      if (nearestTour) {
        document.getElementById('cfg-main-tour-image').src = nearestTour.image || APP_DATA.mainTourImage;
        document.getElementById('cfg-main-tour-badge').textContent = nearestTour.badge || APP_DATA.mainTourBadge || "Exclusive";
        document.getElementById('cfg-main-tour-title').textContent = nearestTour.title || APP_DATA.mainTourTitle;
        document.getElementById('cfg-main-tour-dates').textContent = nearestTour.dates || APP_DATA.mainTourDates;
        document.getElementById('cfg-main-tour-location').textContent = nearestTour.location || APP_DATA.mainTourLocation;
        document.getElementById('cfg-main-tour-desc').textContent = nearestTour.desc || APP_DATA.mainTourDesc;
        document.getElementById('cfg-main-tour-btn-text').textContent = "Открыть маршрут";
        document.getElementById('cfg-main-tour-btn').href = nearestTour.link || APP_DATA.mainTourLink;
      }

      // 4. Главная кнопка
      document.getElementById('cfg-bottom-btn').textContent = "ЗАБРОНИРОВАТЬ ТУР";

      // 5. Форма
      document.getElementById('cfg-form-title').textContent = APP_DATA.formTitle;
      document.getElementById('cfg-form-subtitle').textContent = APP_DATA.formSubtitle;
      document.getElementById('cfg-form-btn-text').textContent = APP_DATA.formSubmitBtnText;
      document.getElementById('cfg-form-success-text').textContent = APP_DATA.formSuccessText;

      // 6. Философия
      document.getElementById('cfg-philosophy-popup-img').src = APP_DATA.philosophyPopupImage;
      document.getElementById('cfg-philosophy-popup-title').textContent = APP_DATA.philosophyPopupTitle;
      
      const bulletsContainer = document.getElementById('cfg-philosophy-bullets');
      bulletsContainer.innerHTML = '';
      APP_DATA.philosophyPopupBullets.forEach(text => {
        const html = `
          <li class="flex items-start">
            <span class="text-platinum mr-4 mt-0.5 font-serif text-lg opacity-80">+</span>
            <span class="leading-relaxed tracking-wide">${text}</span>
          </li>
        `;
        bulletsContainer.insertAdjacentHTML('beforeend', html);
      });

      // 7. Архив
      document.getElementById('cfg-archive-sheet-text').textContent = `«${APP_DATA.archiveSheetText}»`;
      document.getElementById('cfg-archive-sheet-btn-text').textContent = APP_DATA.archiveSheetBtnText;
      document.getElementById('cfg-archive-sheet-btn').href = APP_DATA.archiveSheetBtnLink;

      const galleryContainer = document.getElementById('cfg-archive-gallery');
      galleryContainer.innerHTML = '';
      APP_DATA.archivePhotos.forEach(photoUrl => {
        const html = `
          <div class="bg-surface border border-white/5 rounded-xl overflow-hidden shadow-glow-subtle hover:border-white/20 transition-all duration-500">
            <img src="${photoUrl}" class="w-full aspect-square object-cover opacity-80 hover:opacity-100 transition-opacity duration-500" alt="Archive Story">
          </div>
        `;
        galleryContainer.insertAdjacentHTML('beforeend', html);
      });

      // 8. Туры (Стиль: Dark Cards)
      const toursContainer = document.getElementById('cfg-tours-container');
      toursContainer.innerHTML = ''; 
      
      APP_DATA.tours.forEach((tour, index) => {
        const isSold = tour.isSoldOut;

        const html = `
          <div class="bg-surface rounded-2xl border border-white/5 shadow-glow-subtle group overflow-hidden relative ${isSold ? 'opacity-60' : ''}">
            <div class="relative w-full aspect-[16/9] overflow-hidden bg-space border-b border-white/5">
              <img src="${tour.image}" class="w-full h-full object-cover opacity-90 group-hover:scale-105 transition-transform duration-1000 ease-out" alt="${tour.title}">
              <div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
              <div class="absolute top-4 left-4 bg-space/50 backdrop-blur-md border border-white/20 text-white px-3 py-1 rounded-full text-[9px] uppercase tracking-[0.2em] font-sans">
                ${tour.badge || "VIP"}
              </div>
            </div>
            
            <div class="p-6">
              <h3 class="font-serif text-[24px] text-white mb-4 tracking-wide group-hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.3)] transition-all">${tour.title}</h3>
              
              <div class="flex justify-between items-center font-sans text-[10px] tracking-[0.15em] text-silver uppercase mb-5">
                <span>${tour.dates}</span>
                ${tour.location ? `<span class="text-right text-silver/60">${tour.location}</span>` : ''}
              </div>

              ${tour.desc ? `<p class="text-sm text-silver/70 leading-relaxed mb-6 font-sans font-light line-clamp-2">${tour.desc}</p>` : ''}
              
              <div class="flex items-center justify-between mt-6 pt-5 border-t border-white/5">
                <span class="font-sans font-medium text-xl md:text-2xl text-white tracking-widest ${isSold ? 'line-through opacity-50' : ''}">${tour.price}</span>
                
                ${isSold 
                  ? `<span class="text-white/40 text-[9px] uppercase tracking-[0.2em] font-sans border border-white/10 rounded-full px-4 py-1.5">${tour.soldOutText || "Закрыто"}</span>`
                  : `<a href="${tour.link}" target="_blank" class="inline-flex items-center font-sans text-[10px] uppercase tracking-[0.2em] text-white border border-white/20 rounded-full px-5 py-2 hover:bg-white/5 hover:border-white/50 hover:shadow-glow transition-all">
                      Подробности
                     </a>`
                }
              </div>
            </div>
          </div>
        `;
        toursContainer.insertAdjacentHTML('beforeend', html);
      });

      const tourSelect = document.getElementById('tour-select');
      tourSelect.innerHTML = '<option value="" disabled selected class="bg-space text-white">Выберите направление</option><option value="Не определился, нужна помощь" class="bg-space text-white">Помогите выбрать</option>';
      APP_DATA.tours.forEach(tour => {
        if(!tour.isSoldOut) {
          tourSelect.insertAdjacentHTML('beforeend', `<option value="${tour.title}" class="bg-space text-white">${tour.title}</option>`);
        } else {
          tourSelect.insertAdjacentHTML('beforeend', `<option value="${tour.title} (В резерв)" class="bg-space text-silver/50">${tour.title} (В резерв)</option>`);
        }
      });

      // 9. Отзывы (Минималистичные блоки с водяным знаком)
      const reviewsContainer = document.getElementById('cfg-reviews-container');
      reviewsContainer.innerHTML = '';

      APP_DATA.reviews.forEach((review) => {
        const html = `
          <div class="bg-surface border border-white/10 p-8 relative rounded-2xl shadow-[0_0_25px_rgba(255,255,255,0.08)] overflow-hidden">
            <div class="quote-watermark">"</div>
            
            <p class="font-sans font-light text-[15px] text-silver leading-relaxed mb-6 relative z-10">${review.text}</p>
            
            <div class="flex flex-col mt-6 border-t border-white/5 pt-5 relative z-10">
              <span class="text-[11px] font-serif tracking-[0.2em] uppercase text-white">${review.name}</span>
              <span class="font-sans text-xs text-silver/50 mt-1">${review.tour}</span>
            </div>
          </div>
        `;
        reviewsContainer.insertAdjacentHTML('beforeend', html);
      });
    }

    // Запуск приложения и загрузка
    window.addEventListener('load', function() {
      applyVibeConfig();

      const preloader = document.getElementById('preloader');
      if (preloader) {
        setTimeout(() => {
          preloader.style.opacity = '0';
          setTimeout(() => { preloader.style.display = 'none'; }, 1000);
        }, 1200);
      }

      const fetches = [];

      if (APP_DATA.googleSheetUrl) {
        fetches.push(
          fetch(APP_DATA.googleSheetUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n');
            const fetchedTours = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim();
              if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              fetchedTours.push({
                title: cols[0] || "", dates: cols[1] || "", price: cols[2] || "",
                badge: cols[3] || "", image: cols[4] || "", link: cols[5] || "",
                isSoldOut: (cols[6] && cols[6].toLowerCase() === 'да'),
                soldOutText: "Лист ожидания", location: cols[7] || "", desc: cols[8] || ""
              });
            }
            if (fetchedTours.length > 0) APP_DATA.tours = fetchedTours;
          }).catch(e => console.error(e))
        );
      }

      if (APP_DATA.googleSheetArchiveUrl) {
        fetches.push(
          fetch(APP_DATA.googleSheetArchiveUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n');
            const fetchedPhotos = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim();
              if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              if (cols[0]) fetchedPhotos.push(cols[0]); 
            }
            if (fetchedPhotos.length > 0) APP_DATA.archivePhotos = fetchedPhotos;
          }).catch(e => console.error(e))
        );
      }

      if (APP_DATA.googleSheetReviewsUrl) {
        fetches.push(
          fetch(APP_DATA.googleSheetReviewsUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n');
            const fetchedReviews = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim();
              if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              if (cols[0] && cols[2]) {
                fetchedReviews.push({ name: cols[0] || "Гость", tour: cols[1] || "", text: cols[2] || "" });
              }
            }
            if (fetchedReviews.length > 0) APP_DATA.reviews = fetchedReviews;
          }).catch(e => console.error(e))
        );
      }

      Promise.allSettled(fetches).then(() => { applyVibeConfig(); });
    });

    // --- ЗАКРЫТЫЕ ШТОРКИ ---
    function openExpeditions() { document.getElementById('expeditions-sheet').classList.remove('pointer-events-none'); document.getElementById('expeditions-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('expeditions-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; }
    function closeExpeditions() { document.getElementById('expeditions-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('expeditions-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('expeditions-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function openArchive() { document.getElementById('archive-sheet').classList.remove('pointer-events-none'); document.getElementById('archive-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('archive-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; }
    function closeArchive() { document.getElementById('archive-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('archive-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('archive-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function openPhilosophy() { document.getElementById('philosophy-sheet').classList.remove('pointer-events-none'); document.getElementById('philosophy-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('philosophy-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; }
    function closePhilosophy() { document.getElementById('philosophy-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('philosophy-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('philosophy-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function openForm() { document.getElementById('form-sheet').classList.remove('pointer-events-none'); document.getElementById('form-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('form-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; document.getElementById('form-success-msg').classList.add('hidden'); document.getElementById('lead-form').reset(); document.getElementById('form-submit-btn').disabled = false; document.getElementById('form-btn-loader').classList.add('hidden'); }
    function closeForm() { document.getElementById('form-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('form-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('form-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function openReviews() { document.getElementById('reviews-sheet').classList.remove('pointer-events-none'); document.getElementById('reviews-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('reviews-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; }
    function closeReviews() { document.getElementById('reviews-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('reviews-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('reviews-sheet').classList.add('pointer-events-none'); if (document.getElementById('write-review-sheet').classList.contains('pointer-events-none')) { document.body.style.overflow = ''; } }, 500); }

    function openWriteReview() { closeReviews(); setTimeout(() => { document.getElementById('write-review-sheet').classList.remove('pointer-events-none'); document.getElementById('write-review-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('write-review-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; document.getElementById('review-success-msg').classList.add('hidden'); document.getElementById('write-review-form').reset(); document.getElementById('review-submit-btn').disabled = false; document.getElementById('review-btn-loader').classList.add('hidden'); }, 300); }
    function closeWriteReview() { document.getElementById('write-review-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('write-review-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('write-review-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function submitNewReview(event) {
      event.preventDefault();
      const form = document.getElementById('write-review-form'); const btn = document.getElementById('review-submit-btn'); const loader = document.getElementById('review-btn-loader'); const successMsg = document.getElementById('review-success-msg');
      btn.disabled = true; loader.classList.remove('hidden');
      const formData = new URLSearchParams(new FormData(form));
      if (APP_DATA.googleSheetSubmitReviewUrl) { fetch(APP_DATA.googleSheetSubmitReviewUrl, { method: 'POST', body: formData, mode: 'no-cors' }).then(() => showReviewSuccess()).catch(err => showReviewSuccess()); } else { setTimeout(showReviewSuccess, 1000); }
      function showReviewSuccess() { successMsg.classList.remove('hidden'); setTimeout(() => { closeWriteReview(); }, 2500); }
    }

    function submitForm(event) {
      event.preventDefault(); 
      const form = document.getElementById('lead-form'); const btn = document.getElementById('form-submit-btn'); const loader = document.getElementById('form-btn-loader'); const successMsg = document.getElementById('form-success-msg');
      btn.disabled = true; loader.classList.remove('hidden');
      const formData = new URLSearchParams(new FormData(form));
      if (APP_DATA.googleSheetSubmitUrl) { fetch(APP_DATA.googleSheetSubmitUrl, { method: 'POST', body: formData, mode: 'no-cors' }).then(() => { showSuccess(); }).catch(err => { showSuccess(); }); } else { setTimeout(showSuccess, 1000); }
      function showSuccess() { successMsg.classList.remove('hidden'); setTimeout(() => { closeForm(); }, 2500); }
    }
  </script>
