<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Навигатор Канала</title>
    <!-- Подключение Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключение шрифта -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Иконки Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        app: {
                            bg: '#e2e2e6',
                            card: 'rgba(255, 255, 255, 0.6)',
                            dark: '#1c1c1e',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* ========================================================================= */
        /* 🌈 НАСТРОЙКИ ЦВЕТА ФОНА (АНИМИРОВАННЫЙ ГРАДИЕНТ) 🌈 */
        /* Меняйте цвета ниже. Можно использовать HEX-коды или английские названия */
        /* ========================================================================= */
        :root {
            --bg-color-1: #ffcf00; /* Желтый */
            --bg-color-2: #ff7700; /* Оранжевый */
            --bg-color-3: #b000ff; /* Фиолетовый */
        }

        .dynamic-bg {
            background: linear-gradient(-45deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3), var(--bg-color-1));
            background-size: 300% 300%;
            animation: gradient-bg 12s ease infinite;
        }

        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            color: #1c1c1e;
            -webkit-tap-highlight-color: transparent;
        }

        /* Парящие тени как на референсе */
        .floating-shadow {
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3), 0 20px 30px -10px rgba(0, 0, 0, 0.2);
        }

        /* Черные воздушные и полупрозрачные карточки (эффект темного матового стекла с подсветкой) */
        .card-shadow {
            background: rgba(10, 10, 12, 0.45) !important;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Кнопка "Subscribe" стайл */
        .black-pill-btn {
            background-color: #1a1a1c;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        .black-pill-btn:active {
            transform: scale(0.97);
            background-color: #000000;
        }

        /* Кастомный скроллбар (скрыт для красоты) */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Плавное появление */
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
    </style>
</head>
<body class="dynamic-bg min-h-screen pb-12 pt-6 px-5 flex flex-col items-center">

    <!-- ЗАГРУЗОЧНЫЙ ЭКРАН (Огненный лоадер) -->
    <div id="app-loader" class="fixed inset-0 z-[100] dynamic-bg flex items-center justify-center transition-opacity duration-500">
        <div class="relative w-20 h-20 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-4 border-orange-500/20"></div>
            <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-orange-500 border-r-red-500 border-b-yellow-400 animate-spin shadow-[0_0_30px_rgba(249,115,22,0.6)]"></div>
            <i class="ph-fill ph-fire text-orange-500 text-3xl animate-pulse"></i>
        </div>
    </div>

    <!-- ========================================================================= -->
    <!-- 🛑 НАСТРОЙКИ: МЕНЯЙТЕ ФОТО, ТЕКСТЫ И ССЫЛКИ ТОЛЬКО ЗДЕСЬ 🛑 -->
    <!-- ========================================================================= -->
    <script>
        const CONFIG = {
            
            // 👤 1. ВАШ ПРОФИЛЬ
            profile: {
                name: "Полина Чубакина", 
                avatar: "https://i.postimg.cc/vT8f0F1c/photo-2026-03-13-17-39-13.jpg", 
                bio: "Зажигаю сердца и сцены. Фаер-шоу, акробатика и жизнь в движении 🔥"
            },

            // 👋 2. ДАВАЙТЕ ЗНАКОМИТЬСЯ (Шторка)
            about: {
                photo: "https://i.postimg.cc/vT8f0F1c/photo-2026-03-13-17-39-13.jpg", 
                text: "Привет! Меня зовут Полина. Я занимаюсь фаер-шоу уже более 2 лет...<br><br>Мой путь начался с простой искры, а теперь я зажигаю целые стадионы. В этом блоге я делюсь самым сокровенным." 
            },

            // 🔗 3. РУБРИКИ ПОСТОВ (Квадратные кнопки)
            categories: [
                { 
                    title: "Огненные выступления", 
                    icon: "🔥",
                    badge: "Хит!",
                    posts: [
                        { title: "Моё лучшее соло с веерами", link: "https://t.me/telegram" },
                        { title: "Выступление на фестивале", link: "https://t.me/telegram" },
                        { title: "Огонь и танцы: бэкстейдж", link: "https://t.me/telegram" }
                    ]
                },
                { 
                    title: "Акробатика", 
                    icon: "🤸‍♀️",
                    badge: null,
                    posts: [
                        { title: "Как я научилась делать сальто", link: "https://t.me/telegram" },
                        { title: "Секреты идеальной растяжки", link: "https://t.me/telegram" }
                    ]
                }
            ],

            // 🎲 4. СЛУЧАЙНЫЙ ПОСТ
            randomPosts: [
                "https://t.me/telegram", 
                "https://t.me/telegram"
            ],

            // 📱 5. СОЦИАЛЬНЫЕ СЕТИ
            socials: {
                instagram: "https://instagram.com",
                youtube: "https://youtube.com",
                vk: "https://vk.com"
            }
        };
    </script>
    <!-- ========================================================================= -->
    <!-- 🛑 КОНЕЦ НАСТРОЕК 🛑 -->
    <!-- ========================================================================= -->

    <div class="w-full max-w-md mx-auto space-y-6">

        <!-- ГЛАВНОЕ ФОТО (Как на референсе слева) -->
        <div class="relative w-full aspect-[3.5/4] rounded-[2.5rem] overflow-hidden floating-shadow fade-in">
            <!-- Само фото -->
            <img id="profile-avatar" src="" alt="Avatar" class="absolute inset-0 w-full h-full object-cover">
            
            <!-- Градиент внизу для читаемости текста -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
            
            <!-- Контент поверх фото -->
            <div class="absolute bottom-6 left-6 right-6 text-white">
                <!-- Имя и галочка -->
                <h1 class="text-4xl font-serif font-bold flex items-center gap-2 tracking-tight">
                    <span id="profile-name"></span>
                    <i class="ph-fill ph-check-circle text-white/90 text-[24px]"></i>
                </h1>
            </div>
        </div>

        <!-- КРАТКАЯ ИНФОРМАЦИЯ (Под фото) -->
        <div class="text-center px-4 fade-in delay-1">
            <p id="profile-bio" class="text-gray-900 font-bold text-sm leading-relaxed"></p>
        </div>

        <!-- КНОПКА "ДАВАЙТЕ ЗНАКОМИТЬСЯ" -->
        <div class="w-full fade-in delay-2 pt-2">
            <button onclick="openSheet()" class="w-full relative rounded-3xl p-5 card-shadow transition-transform active:scale-[0.98] flex items-center justify-between text-left">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center shadow-sm bg-black/30 text-white">
                        <i class="ph-bold ph-user text-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-[16px] font-bold text-white">Давайте знакомиться</h3>
                        <p class="text-[13px] font-medium text-gray-300">Моя история и путь</p>
                    </div>
                </div>
                <i class="ph-bold ph-caret-right text-gray-400 text-xl"></i>
            </button>
        </div>

        <!-- КАРТОЧКИ-РУБРИКИ (Квадратные кнопки) -->
        <div class="grid grid-cols-2 gap-3 fade-in delay-2 mt-3" id="links-container">
            <!-- Карточки сгенерируются через JS -->
        </div>

        <!-- ЧЕРНАЯ КНОПКА (Как "Subscribe") -->
        <div class="pt-4 fade-in delay-3">
            <button onclick="openRandomPost()" class="w-full black-pill-btn text-white rounded-full py-4 px-6 flex items-center justify-center gap-2 font-semibold text-[15px]">
                Случайный пост 🎲
            </button>
            
            <!-- Футер (Как "Cancel anytime / Terms of use...") -->
            <div class="mt-4 text-center space-y-2">
                <p class="text-xs text-gray-700 font-bold">Мои социальные сети</p>
                <div class="flex justify-center gap-4 text-xs text-gray-800 font-bold">
                    <a id="social-inst" href="#" target="_blank" onclick="tg.HapticFeedback.impactOccurred('light')" class="hover:text-black transition-colors">Instagram</a>
                    <span>|</span>
                    <a id="social-yt" href="#" target="_blank" onclick="tg.HapticFeedback.impactOccurred('light')" class="hover:text-black transition-colors">YouTube</a>
                    <span>|</span>
                    <a id="social-vk" href="#" target="_blank" onclick="tg.HapticFeedback.impactOccurred('light')" class="hover:text-black transition-colors">ВКонтакте</a>
                </div>
            </div>
        </div>

    </div>

    <!-- ============================================== -->
    <!-- ШТОРКА "ДАВАЙТЕ ЗНАКОМИТЬСЯ" -->
    <!-- ============================================== -->
    <div id="sheet-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300" onclick="closeSheet()"></div>
    
    <div id="about-sheet" class="fixed bottom-0 left-0 w-full bg-black/45 backdrop-blur-2xl border-t border-white/20 rounded-t-[2.5rem] z-50 transform translate-y-full transition-transform duration-300 flex flex-col max-h-[90vh] shadow-[0_-10px_40px_rgba(0,0,0,0.4)]">
        <!-- Зона закрытия / полоска -->
        <div class="w-full flex justify-center py-4" onclick="closeSheet()">
            <div class="w-14 h-1.5 bg-white/30 rounded-full"></div>
        </div>
        
        <!-- Контент шторки (со скроллом) -->
        <div class="overflow-y-auto px-6 pb-12 custom-scrollbar">
            <h2 class="text-2xl font-bold mb-5 tracking-tight text-white">Обо мне</h2>
            <img id="about-photo" src="" alt="About" class="w-full aspect-square object-cover rounded-[2rem] mb-5 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <div id="about-text" class="text-gray-200 space-y-3 leading-relaxed text-[15px] font-medium"></div>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- ШТОРКА "ПОСТЫ РУБРИКИ" -->
    <!-- ============================================== -->
    <div id="posts-sheet" class="fixed bottom-0 left-0 w-full bg-black/45 backdrop-blur-2xl border-t border-white/20 rounded-t-[2.5rem] z-50 transform translate-y-full transition-transform duration-300 flex flex-col max-h-[90vh] shadow-[0_-10px_40px_rgba(0,0,0,0.4)]">
        <!-- Зона закрытия / полоска -->
        <div class="w-full flex justify-center py-4" onclick="closeSheet()">
            <div class="w-14 h-1.5 bg-white/30 rounded-full"></div>
        </div>
        <!-- Контент шторки (со скроллом) -->
        <div class="overflow-y-auto px-6 pb-12 custom-scrollbar">
            <h2 id="posts-sheet-title" class="text-2xl font-bold mb-5 tracking-tight text-white text-center"></h2>
            <div id="posts-sheet-list" class="space-y-3">
                <!-- Ссылки на посты сгенерируются тут -->
            </div>
        </div>
    </div>

    <!-- ОСНОВНАЯ ЛОГИКА -->
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Предотвращаем закрытие шторки свайпом вниз
        try {
            tg.disableVerticalSwipes();
        } catch(e) {}
        
        // Устанавливаем цвет фона шапки в телеграме (Фиолетовый)
        tg.setHeaderColor('#b000ff');

        function renderApp() {
            // Профиль
            document.getElementById('profile-avatar').src = CONFIG.profile.avatar;
            document.getElementById('profile-name').textContent = CONFIG.profile.name;
            document.getElementById('profile-bio').textContent = CONFIG.profile.bio;

            // Шторка "Давайте знакомиться"
            document.getElementById('about-photo').src = CONFIG.about.photo;
            document.getElementById('about-text').innerHTML = CONFIG.about.text;

            // Генерация квадратных карточек-рубрик
            const container = document.getElementById('links-container');
            container.innerHTML = '';
            
            CONFIG.categories.forEach((item, index) => {
                const badgeHtml = item.badge 
                    ? `<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-white text-black text-[10px] font-extrabold px-3 py-1 w-max rounded-full shadow-[0_5px_15px_rgba(255,255,255,0.3)] z-10">${item.badge}</div>` 
                    : '';

                container.innerHTML += `
                    <button onclick="openPostsSheet(${index})" class="block relative rounded-3xl p-4 card-shadow transition-transform active:scale-[0.98] flex flex-col items-center justify-center aspect-square w-full text-center">
                        ${badgeHtml}
                        <div class="w-12 h-12 rounded-full border border-white/40 flex items-center justify-center mb-3 bg-white/10 text-2xl">
                            ${item.icon}
                        </div>
                        <h3 class="text-[14px] font-bold text-white leading-tight">${item.title}</h3>
                    </button>
                `;
            });

            // Соцсети
            document.getElementById('social-inst').href = CONFIG.socials.instagram;
            document.getElementById('social-yt').href = CONFIG.socials.youtube;
            document.getElementById('social-vk').href = CONFIG.socials.vk;
        }

        function openRandomPost() {
            tg.HapticFeedback.impactOccurred('medium');
            const links = CONFIG.randomPosts;
            const randomIndex = Math.floor(Math.random() * links.length);
            window.open(links[randomIndex], '_blank');
        }

        // Логика шторки с постами
        function openPostsSheet(index) {
            tg.HapticFeedback.impactOccurred('light');
            document.body.style.overflow = 'hidden'; 
            
            const category = CONFIG.categories[index];
            document.getElementById('posts-sheet-title').textContent = category.title;
            
            const list = document.getElementById('posts-sheet-list');
            list.innerHTML = '';
            category.posts.forEach(post => {
                list.innerHTML += `
                    <a href="${post.link}" target="_blank" onclick="tg.HapticFeedback.impactOccurred('light')" class="block p-4 rounded-2xl bg-white/10 hover:bg-white/20 border border-white/20 transition-colors flex items-center justify-between active:scale-[0.98]">
                        <span class="text-[14px] font-bold text-white text-left">${post.title}</span>
                        <i class="ph-bold ph-caret-right text-gray-300"></i>
                    </a>
                `;
            });

            const sheet = document.getElementById('posts-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        // Логика шторки "Обо мне"
        function openSheet() {
            tg.HapticFeedback.impactOccurred('light');
            document.body.style.overflow = 'hidden'; 
            const sheet = document.getElementById('about-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        function closeSheet() {
            document.body.style.overflow = ''; 
            const aboutSheet = document.getElementById('about-sheet');
            const postsSheet = document.getElementById('posts-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.add('opacity-0');
            aboutSheet.classList.add('translate-y-full');
            postsSheet.classList.add('translate-y-full');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        window.onload = () => {
            renderApp();
            
            // Скрываем загрузочный экран
            setTimeout(() => {
                const loader = document.getElementById('app-loader');
                if(loader) {
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.remove(), 500);
                }
            }, 600);
        };
    </script>
</body>
</html>
