<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trobetrotter</title>
    
    <!-- Подключаем Tailwind для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключаем React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Подключаем Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Подключаем парсер для Google Таблиц -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- 
    =======================================================================
    ✨✨✨ БЛОК ДЛЯ ВАЙБКОДЕРА (НАСТРОЙКИ ШРИФТОВ) ✨✨✨
    Здесь ты можешь изменить ссылки на шрифты от Google Fonts.
    =======================================================================
    -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <!-- ================= КОНЕЦ БЛОКА ШРИФТОВ ================= -->

    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            /* Если хочешь изменить цвет фона всего приложения - меняй #F9F8F6 здесь */
            background-color: #F9F8F6; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none;
        }
        
        /* Здесь задаются сами шрифты. 
        font-serif - для заголовков
        font-sans - для обычного текста
        */
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }

        /* Анимации для дизайна */
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes slideUpSheet {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .animate-slide-up {
            animation: slideUpSheet 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Убираем скроллбар, но оставляем прокрутку */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .app-container {
            min-height: 100dvh;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #F9F8F6;
        }
    </style>
</head>
<body class="bg-[#F9F8F6] text-[#242424] font-sans selection:bg-[#B85C47] selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        // =======================================================================
        // ✨✨✨ БЛОК ДЛЯ ВАЙБКОДЕРА (НАСТРОЙКИ ПРИЛОЖЕНИЯ) ✨✨✨
        // Привет! Это твоя панель управления. Тебе больше не нужно копаться 
        // в сложном коде ниже. Просто меняй текст и ссылки внутри кавычек "", 
        // и дизайн обновится сам!
        // =======================================================================
        const APP_SETTINGS = {
            // --- 1. ТЕКСТЫ И ФОТО: ГЛАВНЫЙ ЭКРАН ---
            brandName: "Вероника Крафт", 
            brandSubtitle: "Travel Expert", 
            slogan: "Твой личный тревел-эксперт", 
            heroImage: "https://i.postimg.cc/NjngY2VT/unnamed-7.jpg", // Главное фото сверху и на экране загрузки
            
            // --- 2. ТЕКСТЫ И ФОТО: МЕНЮ (ПЛИТКИ) ---
            menuToursTitle: "Горящие туры",
            menuToursImage: "https://i.postimg.cc/cCC9sCPQ/unnamed-8.jpg", // Фото на плитке туров

            menuAboutTitle: "Обо мне",
            menuAboutSubtitle: "Мой подход",

            menuReviewsTitle: "Отзывы",
            menuReviewsSubtitle: "Слова туристов",

            menuContactsTitle: "Связаться со мной",
            menuContactsSubtitle: "Отвечаю лично",

            // --- 3. ТЕКСТЫ: АКТУАЛЬНЫЙ ТУР (НА ГЛАВНОМ ЭКРАНЕ) ---
            featuredTourSectionTitle: "Ближайший тур",
            featuredTourBtnText: "Подробнее",

            // --- 4. ТЕКСТЫ И ССЫЛКИ: ГЛАВНАЯ КНОПКА ВНИЗУ ---
            bottomBtnText: "Подобрать тур",
            bottomBtnGlobalLink: "https://t.me/aicreata", // Ссылка для главной кнопки, если не указана другая в туре

            // --- 5. ТЕКСТЫ И ФОТО: ЭКРАН "ОБО МНЕ" ---
            aboutSheetTitle: "Обо мне",
            aboutPhotoUrl: "https://i.postimg.cc/NjngY2VT/unnamed-7.jpg",
            aboutText: "Привет! Я твой личный тревел-эксперт. Я помогаю людям находить идеальные места для отдыха, организую незабываемые туры и беру всю рутину с документами на себя. Моя цель — сделать так, чтобы ты просто собрал чемодан и наслаждался отпуском!",

            // --- 6. ТЕКСТЫ И ССЫЛКИ: ЭКРАН "КОНТАКТЫ" ---
            contactsSheetTitle: "Связаться со мной",
            socialLinks: {
                whatsapp: "https://wa.me/1234567890",
                telegram: "https://t.me/telegram",
                instagram: "https://instagram.com/instagram",
                phone: "+7 (999) 123-45-67"
            },

            // --- 7. ТЕКСТЫ: ОТЗЫВЫ ---
            reviewsSheetTitle: "Отзывы",
            writeReviewBtnText: "Написать отзыв",

            // --- 8. РАЗМЕРЫ (ВЫСОТА ФОТОГРАФИЙ) ---
            sizes: {
                heroImageHeight: "40vh",     // Высота главного фото (vh - процент от высоты экрана)
                tourCardImageHeight: "200px" // Высота фото в карточке тура внутри шторки
            },

            // --- 9. БАЗЫ ДАННЫХ (GOOGLE SHEETS И SCRIPTS) ---
            // Ссылка на таблицу с ТУРАМИ (CSV)
            googleSheetToursUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSaRWByT--Ch96eWyxGr2fKuwK7NFITq0YG6g_k6fZkP78CreHlEHB96AU1x6fLyiRT9SxW2_xRTGsG/pub?gid=0&single=true&output=csv",
            
            // Ссылка на таблицу с ОТЗЫВАМИ (CSV)
            googleSheetReviewsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSaRWByT--Ch96eWyxGr2fKuwK7NFITq0YG6g_k6fZkP78CreHlEHB96AU1x6fLyiRT9SxW2_xRTGsG/pub?gid=882822745&single=true&output=csv",
            
            // Ссылка на Google Apps Script для ПРИЕМА НОВЫХ ОТЗЫВОВ
            googleScriptSubmitReviewUrl: "https://script.google.com/macros/s/AKfycbwnSKpgdCJGand6-hgZ1L6_5a7RRxi9gpf4fa-sPvuOGJqTBp6GiBYtdjOzzjfvMfDR-Q/exec"
        };
        // ================= КОНЕЦ БЛОКА НАСТРОЕК =================

        const { useState, useEffect, useRef } = React;

        function App() {
            // ЛОГИКА СОСТОЯНИЙ
            const [activeScreen, setActiveScreen] = useState('home');
            const [tours, setTours] = useState([]);
            const [isLoadingTours, setIsLoadingTours] = useState(true);
            const [dynamicBookingLink, setDynamicBookingLink] = useState("");
            const [sortOrder, setSortOrder] = useState('none');
            const touchStartRef = useRef(null);
            const [reviews, setReviews] = useState([]);
            const [isLoadingReviews, setIsLoadingReviews] = useState(true);
            const [isReviewModalOpen, setIsReviewModalOpen] = useState(false);
            const [reviewForm, setReviewForm] = useState({ name: '', text: '', rating: 5 });
            const [isReviewSubmitted, setIsReviewSubmitted] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isAppLoading, setIsAppLoading] = useState(true);
            const [isAppFading, setIsAppFading] = useState(false);

            useEffect(() => {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                    if (window.Telegram.WebApp.disableVerticalSwipes) {
                        window.Telegram.WebApp.disableVerticalSwipes();
                    }
                }

                if (window.Papa && APP_SETTINGS.googleSheetToursUrl) {
                    window.Papa.parse(APP_SETTINGS.googleSheetToursUrl, {
                        download: true, header: true, skipEmptyLines: true,
                        complete: function(results) {
                            let foundGlobalLink = "";
                            const validTours = results.data.map(row => {
                                const linkKey = Object.keys(row).find(k => k.trim().toLowerCase() === 'bookinglink');
                                const rowLink = linkKey ? row[linkKey].trim() : '';
                                if (rowLink && !foundGlobalLink) foundGlobalLink = rowLink;
                                return { ...row, _actualLink: rowLink };
                            }).filter(row => row.title && row.price);
                            setDynamicBookingLink(foundGlobalLink);
                            setTours(validTours);
                            setIsLoadingTours(false);
                        },
                        error: function(err) { console.error("Ошибка загрузки туров:", err); setIsLoadingTours(false); }
                    });
                } else { setIsLoadingTours(false); }

                if (window.Papa && APP_SETTINGS.googleSheetReviewsUrl) {
                    window.Papa.parse(APP_SETTINGS.googleSheetReviewsUrl, {
                        download: true, header: true, skipEmptyLines: true,
                        complete: function(results) {
                            const fetchedReviews = results.data
                                .filter(row => row.name && row.text)
                                .map((row, index) => ({
                                    id: index, name: row.name, date: row.date,
                                    rating: parseInt(row.rating) || 5, text: row.text
                                })).reverse();
                            setReviews(fetchedReviews);
                            setIsLoadingReviews(false);
                        },
                        error: function(err) { console.error("Ошибка загрузки отзывов:", err); setIsLoadingReviews(false); }
                    });
                } else { setIsLoadingReviews(false); }

                const fadeTimer = setTimeout(() => setIsAppFading(true), 1500);
                const removeTimer = setTimeout(() => setIsAppLoading(false), 2000);
                return () => { clearTimeout(fadeTimer); clearTimeout(removeTimer); };
            }, []);

            useEffect(() => {
                // Блокируем скролл фона при открытых шторках, чтобы убрать "прыжки"
                if (activeScreen !== 'home' || isReviewModalOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                }
            }, [activeScreen, isReviewModalOpen]);

            const triggerHaptic = () => {
                if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                else if (navigator.vibrate) navigator.vibrate(50);
            };

            const navigateTo = (screen, customLink = null) => {
                triggerHaptic();
                if (screen === 'booking') {
                    const linkToOpen = APP_SETTINGS.bottomBtnGlobalLink;
                    if (window.Telegram?.WebApp?.openLink) window.Telegram.WebApp.openLink(linkToOpen);
                    else window.open(linkToOpen, '_blank');
                    return;
                }
                if (screen === 'quiQuo') {
                    const linkToOpen = customLink || dynamicBookingLink;
                    if (!linkToOpen) { alert("Ссылка на подборку еще не добавлена!"); return; }
                    if (window.Telegram?.WebApp?.openLink) window.Telegram.WebApp.openLink(linkToOpen);
                    else window.open(linkToOpen, '_blank');
                    return;
                }
                setActiveScreen(screen);
                if(screen === 'home') setIsReviewModalOpen(false); 
            };

            const extractPrice = (priceStr) => { if (!priceStr) return 0; return parseInt(priceStr.replace(/\D/g, ''), 10) || 0; };
            const onTouchStart = (e) => { touchStartRef.current = { x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY }; };
            const onTouchEnd = (e) => {
                if (!touchStartRef.current) return;
                const distanceX = e.changedTouches[0].clientX - touchStartRef.current.x;
                const distanceY = Math.abs(e.changedTouches[0].clientY - touchStartRef.current.y);
                const isEdgeSwipe = touchStartRef.current.x <= 30;
                if (isEdgeSwipe && distanceX > 80 && distanceY < 50) {
                    if (activeScreen !== 'home') navigateTo('home');
                }
                touchStartRef.current = null;
            };

            const handleSubmitReview = async (e) => {
                e.preventDefault();
                if (isSubmitting) return;
                setIsSubmitting(true);
                try {
                    await fetch(APP_SETTINGS.googleScriptSubmitReviewUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(reviewForm) });
                    setIsReviewSubmitted(true);
                    const d = new Date();
                    const newDateStr = `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
                    setReviews(prev => [{ id: Date.now(), name: reviewForm.name, date: newDateStr, rating: reviewForm.rating, text: reviewForm.text }, ...prev]);
                    setTimeout(() => { setIsReviewModalOpen(false); setIsReviewSubmitted(false); setReviewForm({ name: '', text: '', rating: 5 }); }, 3000);
                } catch (error) { alert("Ошибка при отправке."); } finally { setIsSubmitting(false); }
            };

            const BottomSheet = ({ isOpen, onClose, title, children, isTall = true }) => {
                if (!isOpen) return null;
                return (
                    <div className="fixed inset-0 z-[110] flex flex-col justify-end">
                        <div className="absolute inset-0 bg-black/50 backdrop-blur-[2px] animate-fade" onClick={onClose}></div>
                        <div className={`relative bg-[#F9F8F6] w-full max-w-5xl mx-auto rounded-t-[24px] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex flex-col animate-slide-up ${isTall ? 'max-h-[90vh]' : 'max-h-[70vh]'}`}>
                            <div className="flex-shrink-0 pt-4 pb-3 px-6 flex flex-col items-center bg-[#F9F8F6]/95 backdrop-blur-md rounded-t-[24px] z-10 sticky top-0 border-b border-[#E5E5E5]/50">
                                <div className="w-12 h-1 bg-[#D4D4D4] rounded-full mb-5"></div>
                                <div className="w-full flex justify-between items-center mb-1">
                                    <h2 className="font-serif text-2xl text-[#1A1A1A]">{title}</h2>
                                    <button onClick={onClose} className="p-2 -mr-2 text-[#8C8C8C] hover:text-[#242424] transition-colors rounded-full bg-white/50">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div className="overflow-y-auto hide-scrollbar w-full">
                                {children}
                            </div>
                        </div>
                    </div>
                );
            };

            const featuredTour = tours.length > 0 ? tours[0] : null;

            return (
                <div 
                    className="app-container hide-scrollbar"
                    onTouchStart={onTouchStart}
                    onTouchEnd={onTouchEnd}
                >
                    {/* ЭКРАН ЗАГРУЗКИ */}
                    {isAppLoading && (
                        <div className={`fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-700 bg-cover bg-center ${isAppFading ? 'opacity-0' : 'opacity-100'}`} style={{backgroundImage: `url('${APP_SETTINGS.heroImage}')`}}>
                            <div className="absolute inset-0 bg-[#F9F8F6]/80 backdrop-blur-md"></div>
                            <div className="relative z-10 flex flex-col items-center">
                                <svg className="animate-spin h-12 w-12 text-[#B85C47] mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                <p className="font-serif text-[#1A1A1A] text-lg tracking-widest uppercase animate-pulse">Загрузка...</p>
                            </div>
                        </div>
                    )}

                    {/* ГЛАВНАЯ СТРАНИЦА */}
                    <div className="pb-32 relative">
                        <header className="relative w-full flex flex-col items-center">
                            <div className="w-full min-h-[300px] relative" style={{ height: APP_SETTINGS.sizes.heroImageHeight }}>
                                <img src={APP_SETTINGS.heroImage} alt="Main" className="w-full h-full object-cover" />
                                <div className="absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-[#F9F8F6] to-transparent"></div>
                            </div>
                            <div className="relative -mt-12 flex flex-col items-center px-4 text-center z-10 w-full">
                                <div className="bg-[#F9F8F6]/80 backdrop-blur-md px-8 py-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-[90%] border border-white/50">
                                    <h1 className="font-serif text-3xl font-medium tracking-wide mb-3 text-[#1A1A1A]">{APP_SETTINGS.brandName}</h1>
                                    <div className="flex items-center justify-center gap-3">
                                        <div className="h-[1px] w-8 bg-[#B85C47]/40"></div>
                                        <p className="font-sans uppercase tracking-[0.2em] text-[9px] font-medium text-[#6B6B6B]">
                                            {APP_SETTINGS.brandSubtitle}
                                        </p>
                                        <div className="h-[1px] w-8 bg-[#B85C47]/40"></div>
                                    </div>
                                    <p className="font-serif italic text-sm text-[#8C8C8C] mt-2">{APP_SETTINGS.slogan}</p>
                                </div>
                            </div>
                        </header>

                        <main className="px-5 py-8">
                            <section className="relative z-20">
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => navigateTo('tours')} className="appearance-none focus:outline-none w-full text-left col-span-2 relative aspect-[21/9] rounded-[10px] overflow-hidden shadow-sm group cursor-pointer">
                                        <img src={APP_SETTINGS.menuToursImage} alt="Tours" className="absolute inset-0 w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105 pointer-events-none" />
                                        <div className="absolute inset-0 bg-black/30 transition-colors duration-500 group-hover:bg-black/40 pointer-events-none"></div>
                                        <div className="absolute inset-0 p-5 flex flex-col justify-end text-white pointer-events-none">
                                            <div className="flex items-end justify-between">
                                                <div>
                                                    <p className="text-[10px] uppercase tracking-widest opacity-80 mb-1">{APP_SETTINGS.menuToursSubtitle}</p>
                                                    <h3 className="font-serif text-2xl">{APP_SETTINGS.menuToursTitle}</h3>
                                                </div>
                                                <div className="w-10 h-10 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                                </div>
                                            </div>
                                        </div>
                                    </button>

                                    <button onClick={() => navigateTo('about')} className="appearance-none focus:outline-none w-full text-left bg-white rounded-[10px] p-5 aspect-square flex flex-col items-center justify-center text-center shadow-[0_2px_15px_-4px_rgba(0,0,0,0.03)] hover:shadow-md transition-shadow cursor-pointer">
                                        <div className="w-12 h-12 rounded-full bg-[#F9F8F6] flex items-center justify-center mb-3 pointer-events-none text-[#B85C47]">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
                                        </div>
                                        <span className="text-sm font-medium tracking-wide pointer-events-none">{APP_SETTINGS.menuAboutTitle}</span>
                                        <span className="text-[10px] text-[#8C8C8C] mt-1 pointer-events-none">{APP_SETTINGS.menuAboutSubtitle}</span>
                                    </button>

                                    <button onClick={() => navigateTo('reviews')} className="appearance-none focus:outline-none w-full text-left bg-white rounded-[10px] p-5 aspect-square flex flex-col items-center justify-center text-center shadow-[0_2px_15px_-4px_rgba(0,0,0,0.03)] hover:shadow-md transition-shadow cursor-pointer">
                                        <div className="w-12 h-12 rounded-full bg-[#F9F8F6] flex items-center justify-center mb-3 pointer-events-none text-[#B85C47]">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 21a9 9 0 1 0-9-9c0 1.488.36 2.89 1 4.127L3 21l4.873-1c1.236.64 2.64 1 4.127 1Z"/><path d="M9 12h.01"/><path d="M12 12h.01"/><path d="M15 12h.01"/></svg>
                                        </div>
                                        <span className="text-sm font-medium tracking-wide pointer-events-none">{APP_SETTINGS.menuReviewsTitle}</span>
                                        <span className="text-[10px] text-[#8C8C8C] mt-1 pointer-events-none">{APP_SETTINGS.menuReviewsSubtitle}</span>
                                    </button>

                                    <button onClick={() => navigateTo('contacts')} className="appearance-none focus:outline-none w-full text-left col-span-2 bg-white rounded-[10px] p-4 flex items-center justify-between text-center shadow-[0_2px_15px_-4px_rgba(0,0,0,0.03)] hover:shadow-md transition-shadow cursor-pointer">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-full bg-[#F9F8F6] flex items-center justify-center pointer-events-none text-[#B85C47]">

                                            </div>
                                            <p className="font-serif text-xl text-[#1A1A1A]">Спасибо за эмоции!</p>
                                            <p className="text-[13px] text-[#6B6B6B] mt-2 font-light">Ваш отзыв появится в списке.</p>
                                        </div>
                                    ) : (
                                        <form onSubmit={handleSubmitReview} className="space-y-4">
                                            <div>
                                                <label className="block text-xs uppercase tracking-widest text-[#8C8C8C] mb-2 ml-1">Оценка</label>
                                                <div className="flex gap-2 text-amber-400">
                                                    {[1, 2, 3, 4, 5].map((star) => (
                                                        <button type="button" key={star} onClick={() => setReviewForm({...reviewForm, rating: star})} className="active:scale-75 transition-all">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill={star <= reviewForm.rating ? "currentColor" : "none"} stroke="currentColor" strokeWidth="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs uppercase tracking-widest text-[#8C8C8C] mb-1.5 ml-1">Ваше имя</label>
                                                <input type="text" required value={reviewForm.name} onChange={(e) => setReviewForm({...reviewForm, name: e.target.value})} placeholder="Например: Мария" className="w-full bg-[#F9F8F6] border border-[#E5E5E5] text-[#242424] text-[15px] rounded-[10px] px-4 py-3.5 focus:outline-none focus:border-[#B85C47] transition-all font-light" />
                                            </div>
                                            <div>
                                                <label className="block text-xs uppercase tracking-widest text-[#8C8C8C] mb-1.5 ml-1">Впечатления</label>
                                                <textarea required rows="3" value={reviewForm.text} onChange={(e) => setReviewForm({...reviewForm, text: e.target.value})} placeholder="Пару слов об отдыхе..." className="w-full bg-[#F9F8F6] border border-[#E5E5E5] text-[#242424] text-[15px] rounded-[10px] px-4 py-3.5 focus:outline-none focus:border-[#B85C47] transition-all font-light resize-none"></textarea>
                                            </div>
                                            <button type="submit" disabled={isSubmitting} className="w-full bg-[#1A1A1A] text-white py-4 px-6 rounded-[10px] text-xs uppercase tracking-[0.15em] font-medium shadow-[0_8px_20px_-6px_rgba(0,0,0,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-6 disabled:opacity-70">
                                                {isSubmitting ? (
                                                    <svg className="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                                ) : (
                                                    <><span>Отправить отзыв</span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></>
                                                )}
                                            </button>
                                        </form>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
