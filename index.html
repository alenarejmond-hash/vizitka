  <!-- Подключение премиальных шрифтов: Playfair Display (Serif) и Montserrat (Sans) -->

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Настройки Tailwind для эстетики Modern Boutique -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pearl: '#F3F4F6',      // Жемчужно-серый фон
            charcoal: '#1A1A1A',   // Угольно-черный для текста и кнопок
            gold: '#C5A059',       // Золотой песок для акцентов
            surface: '#FFFFFF',    // Белый для карточек
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'], // Элегантный шрифт
            sans: ['"Montserrat"', 'sans-serif'],   // Чистый гротеск
          },
          boxShadow: {
            'soft': '0 8px 30px rgba(0, 0, 0, 0.04)',
            'soft-inner': 'inset 0 2px 10px rgba(0, 0, 0, 0.02)',
            'float': '0 15px 40px -10px rgba(26, 26, 26, 0.3)',
          }
        }
      }
    }
  </script>

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      if (window.Telegram.WebApp.disableVerticalSwipes) {
        window.Telegram.WebApp.disableVerticalSwipes();
      }
    }
  </script>

  <style>
    /* Прячем скроллбар */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    
    body {
      background-color: #F3F4F6;
    }

    /* Сброс стандартных стилей полей ввода */
    input[type="text"], textarea, select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }
    
    select option {
      background-color: #FFFFFF;
      color: #1A1A1A;
    }

    /* Эффект блюра для фона при открытии шторок */
    .app-wrapper {
      transition: filter 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .app-wrapper.blurred {
      filter: blur(8px) brightness(0.95);
      transform: scale(0.98);
      pointer-events: none;
    }

    /* Специфичное скругление как у iOS иконок (squircle) */
    .squircle {
      border-radius: 26%;
    }

    /* Градиент для затемнения фото на главной карточке Bento */
    .bento-img-overlay {
      background: linear-gradient(to top, rgba(26,26,26,0.8) 0%, rgba(26,26,26,0) 60%);
    }
  </style>
</head>

  <!-- Оболочка приложения для эффекта блюра -->
  <div id="app-wrapper" class="app-wrapper min-h-screen relative pb-32 w-full max-w-md md:max-w-xl mx-auto overflow-hidden flex flex-col pt-6 px-5">
    
    <!-- БЛОК 1: Профиль (Header) -->
    <header class="flex items-center gap-5 mb-8 mt-2">
      <!-- Квадратная аватарка со скруглением squircle -->
      <div class="w-20 h-20 shrink-0 squircle overflow-hidden shadow-soft relative">
        <img id="cfg-hero-image" src="" alt="Avatar" class="w-full h-full object-cover">
      </div>
      <div>
        <h1 id="cfg-author-name" class="font-serif text-2xl font-semibold text-charcoal leading-tight mb-1"></h1>
        <p class="font-sans text-[10px] uppercase tracking-widest text-charcoal/50 font-medium">Автор ваших лучших путешествий</p>
      </div>
    </header>

    <!-- БЛОК 2: Асимметричная сетка кнопок (Bento Grid) -->
    <main class="flex-grow flex flex-col gap-4">
      
      <!-- Сетка 2 колонки -->
      <div class="grid grid-cols-2 gap-4 h-56">
        
        <!-- Кнопка 1: ТУРЫ (Большая, левая) -->
        <button onclick="openExpeditions()" class="group relative rounded-3xl overflow-hidden shadow-soft shadow-soft-inner col-span-1 row-span-2 flex flex-col justify-end p-5 text-left active:scale-[0.98] transition-all bg-charcoal">
          <img id="cfg-bento-tour-img" src="" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-700">
          <div class="absolute inset-0 bento-img-overlay"></div>
          <div class="relative z-10">
            <span class="block font-sans text-[9px] uppercase tracking-[0.2em] text-white/70 mb-1">Маршруты</span>
            <span class="block font-serif text-2xl text-white">Туры</span>
          </div>
        </button>

        <!-- Правая колонка: 2 горизонтальные кнопки -->
        <div class="col-span-1 row-span-2 flex flex-col gap-4">
          
          <!-- Кнопка 2: ОБО МНЕ (Верхняя правая) -->
          <button onclick="openPhilosophy()" class="group bg-surface rounded-3xl shadow-soft shadow-soft-inner flex-1 flex flex-col justify-center p-5 text-left active:scale-[0.98] transition-all relative overflow-hidden">
            <div class="absolute right-[-10px] top-[-10px] opacity-5 group-hover:scale-110 transition-transform duration-500">
              <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="7" r="4"/><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/></svg>
            </div>
            <span class="block font-sans text-[9px] uppercase tracking-[0.2em] text-gold mb-1 relative z-10">Личность</span>
            <span class="block font-serif text-xl text-charcoal relative z-10">Обо мне</span>
          </button>

          <!-- Кнопка 3: ОТЗЫВЫ (Нижняя правая) -->
          <button onclick="openReviews()" class="group bg-surface rounded-3xl shadow-soft shadow-soft-inner flex-1 flex flex-col justify-center p-5 text-left active:scale-[0.98] transition-all relative overflow-hidden">
            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gold/20 group-hover:text-gold group-hover:scale-110 transition-all duration-300">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="opacity-30"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            </div>
            <span class="block font-sans text-[9px] uppercase tracking-[0.2em] text-charcoal/40 mb-1 relative z-10">Эмоции</span>

        </div>
      </div>

      <!-- Дополнительная кнопка АРХИВ (встраивается под сетку органично) -->

      </div>
    </footer>

  </div> <!-- End of app-wrapper -->

  <!-- БЛОК 4: Fixed CTA (Главная кнопка внизу) -->
  <div class="fixed bottom-0 left-0 right-0 p-5 md:p-8 z-50 pointer-events-none pb-8 bg-gradient-to-t from-pearl via-pearl/90 to-transparent">
    <div class="w-full max-w-md md:max-w-xl mx-auto">
      <button onclick="openForm()" class="pointer-events-auto w-full bg-charcoal text-white py-5 px-6 rounded-full shadow-float flex justify-center items-center gap-2 active:scale-[0.98] transition-all">
        <span class="font-sans text-[11px] uppercase tracking-[0.25em] font-semibold">Записаться в тур</span>

  <!-- ================= СВЕТЛЫЕ ШТОРКИ (BOTTOM SHEETS) ================= -->
  
  <!-- Общий стиль шторок: Белый фон, темный текст -->
  
  <!-- Шторка "ТУРЫ" -->
  <div id="expeditions-sheet" class="fixed inset-0 z-[110] flex flex-col justify-end pointer-events-none transition-all duration-500">
    <div id="expeditions-backdrop" class="absolute inset-0 bg-charcoal/20 opacity-0 transition-opacity duration-500" onclick="closeExpeditions()"></div>
    <div id="expeditions-content" class="relative bg-surface w-full max-w-md md:max-w-xl mx-auto rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] translate-y-full transition-transform duration-500 cubic-bezier(0.3, 0.9, 0.4, 1) flex flex-col max-h-[85vh]">

        <h2 class="font-serif text-2xl text-charcoal">Маршруты</h2>
        <button onclick="closeExpeditions()" class="w-8 h-8 bg-pearl rounded-full flex items-center justify-center text-charcoal/50 hover:text-charcoal transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="cfg-tours-container" class="overflow-y-auto p-6 pb-32 space-y-6">
        <!-- Карточки генерируются скриптом -->
      </div>
    </div>
  </div>

  <!-- Шторка "ОБО МНЕ" -->
  <div id="philosophy-sheet" class="fixed inset-0 z-[110] flex flex-col justify-end pointer-events-none transition-all duration-500">
    <div id="philosophy-backdrop" class="absolute inset-0 bg-charcoal/20 opacity-0 transition-opacity duration-500" onclick="closePhilosophy()"></div>
    <div id="philosophy-content" class="relative bg-surface w-full max-w-md md:max-w-xl mx-auto rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] translate-y-full transition-transform duration-500 flex flex-col max-h-[90vh]">
      <div class="pt-6 pb-2 px-6 flex justify-between items-center sticky top-0 bg-surface rounded-t-3xl z-10">
        <h2 class="font-serif text-2xl text-charcoal">Обо мне</h2>
        <button onclick="closePhilosophy()" class="w-8 h-8 bg-pearl rounded-full flex items-center justify-center text-charcoal/50 hover:text-charcoal transition-colors">

        </button>
      </div>
      <div class="overflow-y-auto px-8 pb-16 pt-4 flex flex-col text-center">
        <div class="w-32 h-32 mx-auto squircle overflow-hidden mb-6 shadow-soft">
          <img id="cfg-philosophy-popup-img" src="" alt="Guide" class="w-full h-full object-cover" />
        </div>
        <h2 id="cfg-philosophy-popup-title" class="font-serif text-2xl text-charcoal mb-8"></h2>
        <ul id="cfg-philosophy-bullets" class="space-y-4 font-sans text-[14px] text-charcoal/80 text-left border-y border-pearl py-8 mx-auto w-full">
          <!-- Буллиты генерируются из скрипта -->
        </ul>
      </div>
    </div>
  </div>

    <div id="archive-backdrop" class="absolute inset-0 bg-charcoal/20 opacity-0 transition-opacity duration-500" onclick="closeArchive()"></div>
    <div id="archive-content" class="relative bg-surface w-full max-w-md md:max-w-xl mx-auto rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] translate-y-full transition-transform duration-500 flex flex-col max-h-[90vh]">
      <div class="pt-6 pb-2 px-6 flex justify-between items-center sticky top-0 bg-surface rounded-t-3xl z-10">
        <h2 class="font-serif text-2xl text-charcoal">Архив</h2>
        <button onclick="closeArchive()" class="w-8 h-8 bg-pearl rounded-full flex items-center justify-center text-charcoal/50 hover:text-charcoal transition-colors">

      <div class="overflow-y-auto px-6 py-6 pb-32">

        <div id="cfg-archive-gallery" class="grid grid-cols-2 gap-3 mb-8">

        <a id="cfg-archive-sheet-btn" href="#" target="_blank" class="w-full inline-flex items-center justify-center bg-pearl text-charcoal rounded-2xl py-4 font-sans text-[11px] uppercase tracking-[0.2em] font-semibold hover:bg-gold hover:text-white transition-colors">
          <span id="cfg-archive-sheet-btn-text"></span>

        <button onclick="closeReviews()" class="w-8 h-8 bg-pearl rounded-full flex items-center justify-center text-charcoal/50 hover:text-charcoal transition-colors">

        </button>
      </div>
      <div id="cfg-reviews-container" class="overflow-y-auto p-6 pb-32 space-y-4">
        <!-- Отзывы -->
      </div>
      <div class="absolute bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-surface via-surface/90 to-transparent">
        <button onclick="openWriteReview()" class="w-full bg-pearl text-charcoal font-sans text-[11px] uppercase tracking-[0.2em] font-semibold py-4 rounded-full active:scale-[0.98] transition-all">
          Оставить отзыв
        </button>
      </div>
    </div>
  </div>

  <!-- Шторка "НАПИСАТЬ ОТЗЫВ" -->
  <div id="write-review-sheet" class="fixed inset-0 z-[140] flex flex-col justify-end pointer-events-none transition-all duration-500">
    <div id="write-review-backdrop" class="absolute inset-0 bg-charcoal/20 opacity-0 transition-opacity duration-500" onclick="closeWriteReview()"></div>
    <div id="write-review-content" class="relative bg-surface w-full max-w-md md:max-w-xl mx-auto rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] translate-y-full transition-transform duration-500 flex flex-col">
      <div class="pt-6 pb-2 px-6 flex justify-between items-center sticky top-0">
        <h2 class="font-serif text-2xl text-charcoal">Новая история</h2>
        <button onclick="closeWriteReview()" class="w-8 h-8 bg-pearl rounded-full flex items-center justify-center text-charcoal/50 hover:text-charcoal transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="p-6 pb-12 relative">
        <div id="review-success-msg" class="hidden absolute inset-0 bg-surface z-20 flex flex-col items-center justify-center p-8 text-center rounded-t-3xl">
          <div class="w-16 h-16 rounded-full bg-pearl flex items-center justify-center mb-4 text-gold">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <p class="font-serif text-2xl text-charcoal mb-2">Отправлено</p>
          <p class="text-xs text-charcoal/50 font-sans">Ваш отзыв сохранен</p>
        </div>
        <form id="write-review-form" onsubmit="submitNewReview(event)" class="space-y-6">
          <div>
            <label class="block font-sans text-[10px] uppercase tracking-[0.2em] text-charcoal/40 mb-2 font-semibold">Имя и маршрут</label>
            <input type="text" name="reviewer_name" required placeholder="Анна, Марокко" class="w-full bg-pearl text-charcoal font-sans text-sm px-4 py-4 rounded-xl focus:ring-1 focus:ring-gold outline-none">
          </div>
          <div>
            <label class="block font-sans text-[10px] uppercase tracking-[0.2em] text-charcoal/40 mb-2 font-semibold">Впечатления</label>
            <textarea name="reviewer_text" required rows="4" placeholder="Поделитесь вашими эмоциями..." class="w-full bg-pearl text-charcoal font-sans text-sm px-4 py-4 rounded-xl focus:ring-1 focus:ring-gold outline-none resize-none"></textarea>
          </div>
          <button type="submit" id="review-submit-btn" class="w-full bg-charcoal text-white py-4 mt-2 text-[11px] uppercase tracking-[0.2em] font-sans font-semibold rounded-full flex justify-center items-center">
            <span>Отправить</span>
            <svg id="review-btn-loader" class="animate-spin hidden ml-3 text-white" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Шторка "ФОРМА ЗАЯВКИ" -->
  <div id="form-sheet" class="fixed inset-0 z-[130] flex flex-col justify-end pointer-events-none transition-all duration-500">
    <div id="form-backdrop" class="absolute inset-0 bg-charcoal/20 opacity-0 transition-opacity duration-500" onclick="closeForm()"></div>
    <div id="form-content" class="relative bg-surface w-full max-w-md md:max-w-xl mx-auto rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] translate-y-full transition-transform duration-500 flex flex-col">
      <div class="pt-6 pb-2 px-6 flex justify-between items-center sticky top-0">
        <h2 id="cfg-form-title" class="font-serif text-2xl text-charcoal"></h2>
        <button onclick="closeForm()" class="w-8 h-8 bg-pearl rounded-full flex items-center justify-center text-charcoal/50 hover:text-charcoal transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="p-6 pb-12 relative">
        <p id="cfg-form-subtitle" class="font-sans text-[12px] text-charcoal/60 mb-8 font-light"></p>
        
        <div id="form-success-msg" class="hidden absolute inset-0 bg-surface z-20 flex flex-col items-center justify-center p-8 text-center rounded-t-3xl">
          <div class="w-16 h-16 rounded-full bg-pearl flex items-center justify-center mb-4 text-gold">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </div>
          <p id="cfg-form-success-text" class="font-serif text-2xl text-charcoal mb-2"></p>
        </div>

        <form id="lead-form" onsubmit="submitForm(event)" class="space-y-5">
          <div>
            <label class="block font-sans text-[10px] uppercase tracking-[0.2em] text-charcoal/40 mb-1 font-semibold">Имя</label>
            <input type="text" id="name" name="name" required placeholder="Ваше имя" class="w-full bg-pearl text-charcoal font-sans text-sm px-4 py-4 rounded-xl focus:ring-1 focus:ring-gold outline-none">
          </div>
          <div>
            <label class="block font-sans text-[10px] uppercase tracking-[0.2em] text-charcoal/40 mb-1 font-semibold">Контакт</label>
            <input type="text" id="contact" name="contact" required placeholder="@username или телефон" class="w-full bg-pearl text-charcoal font-sans text-sm px-4 py-4 rounded-xl focus:ring-1 focus:ring-gold outline-none">
          </div>
          <div>
            <label class="block font-sans text-[10px] uppercase tracking-[0.2em] text-charcoal/40 mb-1 font-semibold">Маршрут</label>
            <div class="relative">
              <select id="tour-select" name="tour" required class="w-full bg-pearl text-charcoal font-sans text-sm px-4 py-4 rounded-xl focus:ring-1 focus:ring-gold outline-none cursor-pointer">
              </select>
              <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-charcoal/40">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
              </div>
            </div>
          </div>
          <button type="submit" id="form-submit-btn" class="w-full bg-charcoal text-white py-4 mt-6 text-[11px] uppercase tracking-[0.2em] font-sans font-semibold rounded-full flex justify-center items-center">
            <span id="cfg-form-btn-text"></span>
            <svg id="form-btn-loader" class="animate-spin hidden ml-3 text-white" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    function applyVibeConfig() {
      // 1. Профиль и Bento
      document.getElementById('cfg-hero-image').src = APP_DATA.heroImage;
      document.getElementById('cfg-author-name').textContent = APP_DATA.authorName;
      
      const nearestTour = APP_DATA.tours.find(t => !t.isSoldOut) || APP_DATA.tours[0];
      if (nearestTour || APP_DATA.expeditionsImage) {
        document.getElementById('cfg-bento-tour-img').src = nearestTour ? nearestTour.image : APP_DATA.expeditionsImage;
      }

      // Соцсети
      if(APP_DATA.socialLinks) {
        const wa = document.getElementById('cfg-contact-wa');
        if(APP_DATA.socialLinks.whatsapp) { wa.href = APP_DATA.socialLinks.whatsapp; wa.style.display = 'flex'; } else { wa.style.display = 'none'; }
        
        const tg = document.getElementById('cfg-contact-tg');
        if(APP_DATA.socialLinks.telegram) { tg.href = APP_DATA.socialLinks.telegram; tg.style.display = 'flex'; } else { tg.style.display = 'none'; }
        
        const ig = document.getElementById('cfg-contact-ig');
        if(APP_DATA.socialLinks.instagram) { ig.href = APP_DATA.socialLinks.instagram; ig.style.display = 'flex'; } else { ig.style.display = 'none'; }
      }

      // Форма заявки
      document.getElementById('cfg-form-title').textContent = APP_DATA.formTitle;
      document.getElementById('cfg-form-subtitle').textContent = APP_DATA.formSubtitle;
      document.getElementById('cfg-form-btn-text').textContent = APP_DATA.formSubmitBtnText;
      document.getElementById('cfg-form-success-text').textContent = APP_DATA.formSuccessText;

      // Обо мне
      document.getElementById('cfg-philosophy-popup-img').src = APP_DATA.philosophyPopupImage;
      document.getElementById('cfg-philosophy-popup-title').textContent = APP_DATA.philosophyPopupTitle;
      
      const bulletsContainer = document.getElementById('cfg-philosophy-bullets');
      bulletsContainer.innerHTML = '';
      APP_DATA.philosophyPopupBullets.forEach(text => {
        const html = `<li class="flex items-start"><span class="text-gold mr-3 mt-0.5 font-bold text-sm">•</span><span class="leading-relaxed">${text}</span></li>`;
        bulletsContainer.insertAdjacentHTML('beforeend', html);
      });

      // Архив
      document.getElementById('cfg-archive-sheet-text').textContent = `«${APP_DATA.archiveSheetText}»`;
      document.getElementById('cfg-archive-sheet-btn-text').textContent = APP_DATA.archiveSheetBtnText;
      document.getElementById('cfg-archive-sheet-btn').href = APP_DATA.archiveSheetBtnLink;

      const galleryContainer = document.getElementById('cfg-archive-gallery');
      galleryContainer.innerHTML = '';
      APP_DATA.archivePhotos.forEach(photoUrl => {
        const html = `<div class="rounded-2xl overflow-hidden shadow-soft bg-pearl"><img src="${photoUrl}" class="w-full aspect-square object-cover" alt="Archive"></div>`;
        galleryContainer.insertAdjacentHTML('beforeend', html);
      });

      // Туры (Светлые карточки)
      const toursContainer = document.getElementById('cfg-tours-container');
      toursContainer.innerHTML = ''; 
      
      APP_DATA.tours.forEach((tour) => {
        const isSold = tour.isSoldOut;
        const html = `
          <div class="bg-pearl rounded-3xl overflow-hidden ${isSold ? 'opacity-70 grayscale-[20%]' : ''}">
            <div class="relative w-full aspect-[4/3] overflow-hidden bg-pearl">
              <img src="${tour.image}" class="w-full h-full object-cover" alt="${tour.title}">
              <div class="absolute top-4 left-4 bg-surface text-charcoal px-3 py-1 rounded-full text-[9px] uppercase tracking-[0.2em] font-sans font-semibold shadow-soft">
                ${tour.badge || "TOUR"}
              </div>
            </div>
            <div class="p-6">
              <h3 class="font-serif text-[22px] text-charcoal mb-2">${tour.title}</h3>
              <div class="flex justify-between items-center font-sans text-[10px] tracking-[0.1em] text-charcoal/50 uppercase mb-4 font-semibold">
                <span>${tour.dates}</span>
                ${tour.location ? `<span>${tour.location}</span>` : ''}
              </div>
              ${tour.desc ? `<p class="text-[13px] text-charcoal/70 leading-relaxed mb-6 font-sans">${tour.desc}</p>` : ''}
              <div class="flex items-center justify-between mt-4">
                <span class="font-sans font-semibold text-lg text-charcoal ${isSold ? 'line-through opacity-50' : ''}">${tour.price}</span>
                ${isSold 
                  ? `<span class="text-charcoal/40 text-[9px] uppercase tracking-[0.2em] font-sans border border-charcoal/10 rounded-full px-4 py-2 font-semibold">${tour.soldOutText || "Закрыто"}</span>`
                  : `<a href="${tour.link}" target="_blank" class="inline-flex items-center font-sans text-[9px] uppercase tracking-[0.2em] font-semibold text-white bg-charcoal rounded-full px-5 py-2.5 hover:bg-gold transition-colors">Программа</a>`
                }
              </div>
            </div>
          </div>
        `;
        toursContainer.insertAdjacentHTML('beforeend', html);
      });

      const tourSelect = document.getElementById('tour-select');
      tourSelect.innerHTML = '<option value="" disabled selected>Выберите направление</option><option value="Нужна помощь">Помогите выбрать</option>';
      APP_DATA.tours.forEach(tour => {
        tourSelect.insertAdjacentHTML('beforeend', `<option value="${tour.title} ${tour.isSoldOut?'(Резерв)':''}">${tour.title} ${tour.isSoldOut?'(Резерв)':''}</option>`);
      });

      // Отзывы
      const reviewsContainer = document.getElementById('cfg-reviews-container');
      reviewsContainer.innerHTML = '';
      APP_DATA.reviews.forEach((review) => {
        const html = `
          <div class="bg-pearl p-6 rounded-3xl relative">
            <div class="text-gold opacity-30 mb-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.99c1.03 0 1.01 0 1.01 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/></svg>
            </div>
            <p class="font-sans text-[13px] text-charcoal/80 leading-relaxed mb-4">${review.text}</p>
            <div class="flex flex-col pt-4 border-t border-charcoal/5">
              <span class="text-sm font-serif text-charcoal">${review.name}</span>
              <span class="font-sans text-[10px] text-charcoal/40 uppercase tracking-widest mt-1">${review.tour}</span>
            </div>
          </div>
        `;
        reviewsContainer.insertAdjacentHTML('beforeend', html);
      });
    }

    // Загрузка
    window.addEventListener('load', function() {
      applyVibeConfig();
      const fetches = [];
      // (Логика парсинга Google Sheets оставлена без изменений)
      if (APP_DATA.googleSheetUrl) {
        fetches.push(fetch(APP_DATA.googleSheetUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n'); const fetchedTours = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim(); if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              fetchedTours.push({ title: cols[0] || "", dates: cols[1] || "", price: cols[2] || "", badge: cols[3] || "", image: cols[4] || "", link: cols[5] || "", isSoldOut: (cols[6] && cols[6].toLowerCase() === 'да'), soldOutText: "Ожидание", location: cols[7] || "", desc: cols[8] || "" });
            }
            if (fetchedTours.length > 0) APP_DATA.tours = fetchedTours;
          }).catch(e => console.error(e)));
      }
      if (APP_DATA.googleSheetArchiveUrl) {
        fetches.push(fetch(APP_DATA.googleSheetArchiveUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n'); const fetchedPhotos = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim(); if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              if (cols[0]) fetchedPhotos.push(cols[0]); 
            }
            if (fetchedPhotos.length > 0) APP_DATA.archivePhotos = fetchedPhotos;
          }).catch(e => console.error(e)));
      }
      if (APP_DATA.googleSheetReviewsUrl) {
        fetches.push(fetch(APP_DATA.googleSheetReviewsUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n'); const fetchedReviews = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim(); if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              if (cols[0] && cols[2]) fetchedReviews.push({ name: cols[0] || "Гость", tour: cols[1] || "", text: cols[2] || "" });
            }
            if (fetchedReviews.length > 0) APP_DATA.reviews = fetchedReviews;
          }).catch(e => console.error(e)));
      }
      Promise.allSettled(fetches).then(() => applyVibeConfig());
    });

    // --- УПРАВЛЕНИЕ ШТОРКАМИ (С ЭФФЕКТОМ БЛЮРА) ---
    function toggleBlur(enable) {
      if(enable) document.getElementById('app-wrapper').classList.add('blurred');
      else document.getElementById('app-wrapper').classList.remove('blurred');
    }

    function openSheet(sheetId, backdropId, contentId) {
      document.getElementById(sheetId).classList.remove('pointer-events-none');
      document.getElementById(backdropId).classList.replace('opacity-0', 'opacity-100');
      document.getElementById(contentId).classList.replace('translate-y-full', 'translate-y-0');
      document.body.style.overflow = 'hidden';
      toggleBlur(true);
    }
    
    function closeSheet(sheetId, backdropId, contentId, keepBlur = false) {
      document.getElementById(backdropId).classList.replace('opacity-100', 'opacity-0');
      document.getElementById(contentId).classList.replace('translate-y-0', 'translate-y-full');
      setTimeout(() => {
        document.getElementById(sheetId).classList.add('pointer-events-none');
        if(!keepBlur) { document.body.style.overflow = ''; toggleBlur(false); }
      }, 400); // ускорил анимацию закрытия для snappy эффекта
    }

    function openExpeditions() { openSheet('expeditions-sheet', 'expeditions-backdrop', 'expeditions-content'); }
    function closeExpeditions() { closeSheet('expeditions-sheet', 'expeditions-backdrop', 'expeditions-content'); }
    function openPhilosophy() { openSheet('philosophy-sheet', 'philosophy-backdrop', 'philosophy-content'); }
    function closePhilosophy() { closeSheet('philosophy-sheet', 'philosophy-backdrop', 'philosophy-content'); }
    function openArchive() { openSheet('archive-sheet', 'archive-backdrop', 'archive-content'); }
    function closeArchive() { closeSheet('archive-sheet', 'archive-backdrop', 'archive-content'); }
    function openForm() { openSheet('form-sheet', 'form-backdrop', 'form-content'); document.getElementById('form-success-msg').classList.add('hidden'); document.getElementById('lead-form').reset(); document.getElementById('form-submit-btn').disabled = false; document.getElementById('form-btn-loader').classList.add('hidden'); }
    function closeForm() { closeSheet('form-sheet', 'form-backdrop', 'form-content'); }
    function openReviews() { openSheet('reviews-sheet', 'reviews-backdrop', 'reviews-content'); }
    function closeReviews() { closeSheet('reviews-sheet', 'reviews-backdrop', 'reviews-content'); }
    
    function openWriteReview() { 
      closeSheet('reviews-sheet', 'reviews-backdrop', 'reviews-content', true); 
      setTimeout(() => {
        openSheet('write-review-sheet', 'write-review-backdrop', 'write-review-content');
        document.getElementById('review-success-msg').classList.add('hidden'); 
        document.getElementById('write-review-form').reset(); 
        document.getElementById('review-submit-btn').disabled = false; 
        document.getElementById('review-btn-loader').classList.add('hidden');
      }, 300); 
    }
    function closeWriteReview() { closeSheet('write-review-sheet', 'write-review-backdrop', 'write-review-content'); }

    // Отправка форм
    function submitNewReview(event) {
      event.preventDefault();
      const form = document.getElementById('write-review-form'); const btn = document.getElementById('review-submit-btn'); const loader = document.getElementById('review-btn-loader'); const successMsg = document.getElementById('review-success-msg');
      btn.disabled = true; loader.classList.remove('hidden');
      const formData = new URLSearchParams(new FormData(form));
      if (APP_DATA.googleSheetSubmitReviewUrl) { fetch(APP_DATA.googleSheetSubmitReviewUrl, { method: 'POST', body: formData, mode: 'no-cors' }).then(() => showReviewSuccess()).catch(err => showReviewSuccess()); } else { setTimeout(showReviewSuccess, 1000); }
      function showReviewSuccess() { successMsg.classList.remove('hidden'); setTimeout(() => { closeWriteReview(); }, 2500); }
    }

    function submitForm(event) {
      event.preventDefault(); 
      const form = document.getElementById('lead-form'); const btn = document.getElementById('form-submit-btn'); const loader = document.getElementById('form-btn-loader'); const successMsg = document.getElementById('form-success-msg');
      btn.disabled = true; loader.classList.remove('hidden');
      const formData = new URLSearchParams(new FormData(form));
      if (APP_DATA.googleSheetSubmitUrl) { fetch(APP_DATA.googleSheetSubmitUrl, { method: 'POST', body: formData, mode: 'no-cors' }).then(() => { showSuccess(); }).catch(err => { showSuccess(); }); } else { setTimeout(showSuccess, 1000); }
      function showSuccess() { successMsg.classList.remove('hidden'); setTimeout(() => { closeForm(); }, 2500); }
    }
  </script>
</body>
</html>
