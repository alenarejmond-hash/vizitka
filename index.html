<!DOCTYPE html>
<html lang="ru" class="overscroll-none">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tracks & Stories</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Подключение новых мягких и рукописных шрифтов -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Nunito:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

  <!-- Настройки Tailwind для новых цветов и шрифтов -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sand: '#FAF5EE',       // Светло-песочный фон
            paper: '#FDFBF7',      // Текстура бумаги
            coffee: '#3E2723',     // Темно-коричневый текст (вместо черного)
            terracotta: '#D97757', // Приглушенный терракотовый
            sage: '#8DA399',       // Шалфейный зеленый
            cream: '#FFFBF5',      // Кремовый для карточек
          },
          fontFamily: {
            sans: ['Nunito', 'sans-serif'],   // Мягкий округлый
            hand: ['Caveat', 'cursive'],      // Рукописный
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(62, 39, 35, 0.05)',
            'polaroid': '0 10px 25px -5px rgba(62, 39, 35, 0.1)',
            'float': '0 12px 30px -8px rgba(217, 119, 87, 0.5)',
          }
        }
      }
    }
  </script>

  <!-- Настройки Telegram Mini App -->
  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      if (window.Telegram.WebApp.disableVerticalSwipes) {
        window.Telegram.WebApp.disableVerticalSwipes();
      }
    }
  </script>

  <style>
    /* Эффект скотча (washi tape) для полароидов */
    .washi-tape {
      position: absolute;
      width: 70px;
      height: 22px;
      background-color: rgba(253, 251, 247, 0.65);
      box-shadow: 0 1px 3px rgba(62, 39, 35, 0.05);
      z-index: 10;
      border: 1px solid rgba(253, 251, 247, 0.8);
      opacity: 0.9;
    }
    .washi-tape-1 { top: -10px; left: 50%; transform: translateX(-50%) rotate(-3deg); }
    .washi-tape-2 { top: -10px; left: 15%; transform: rotate(4deg); }
    
    /* Скрытие скроллбара для эстетики */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body class="bg-sand text-coffee font-sans overscroll-none selection:bg-terracotta selection:text-white">

  <!-- 
  =======================================================================
  ✨✨✨ БЛОК ДЛЯ ВАЙБКОДЕРА (НАСТРОЙКИ ПРИЛОЖЕНИЯ) ✨✨✨
  =======================================================================
  -->
  <script>
    const APP_DATA = {
      preloaderImage: "https://i.postimg.cc/9QM60kVV/ib7.webp",
      heroImage: "https://i.postimg.cc/9QM60kVV/ib7.webp",
      authorName: "Кристина Вейс",
      authorSubtitle: "Авторские путешествия",

      expeditionsImage: "https://i.postimg.cc/mkjn2Y5Y/1554794717-1541585748427874764.jpg",
      
      archiveTitle: "Как это было",
      archiveSub: "Архив эмоций",

      philosophyTitle: "Философия",
      philosophySub: "Смысл пути",

      philosophyPopupImage: "https://i.postimg.cc/d39MXkPW/unnamed-2.jpg",
      philosophyPopupTitle: "Мой подход",
      philosophyPopupBullets: [
        "Только мини-группы (до 8 человек).",
        "Никаких автобусов — передвигаемся на джипах.",
        "Секретные локации, которых нет в путеводителях."
      ],

      reviewsTitle: "Отзывы",
      reviewsSub: "Слова туристов",
      googleSheetReviewsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWTsKdTeviytAVN625NFks2VNZg6CKSXsC7sf8zhoih6T20yKCKM1qQ-RaNYFzwVv6cYmS2waj2iAV/pub?gid=1962320611&single=true&output=csv", 
      googleSheetSubmitReviewUrl: "https://script.google.com/macros/s/AKfycby9RoPcuVc63XpHcrczs0GprIJp1HqGlcMJk58gXSrFr0nQ5onbskljhxqEssSlpsqx1A/exec", 
      reviews: [],

      contactsTitle: "Контакты",
      contactsSub: "Связаться",
      socialLinks: {
        whatsapp: "https://wa.me/79990000000",
        telegram: "https://t.me/durov",
        instagram: "https://instagram.com",
        vk: "https://vk.com"
      },

      mainTourImage: "",
      mainTourBadge: "",
      mainTourTitle: "",
      mainTourDates: "",
      mainTourLocation: "",
      mainTourDesc: "",
      mainTourBtnText: "Программа тура",
      mainTourLink: "", 

      bottomBtnText: "Оставить заявку",
      bottomBtnLink: "https://t.me/durov",

      googleSheetUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWTsKdTeviytAVN625NFks2VNZg6CKSXsC7sf8zhoih6T20yKCKM1qQ-RaNYFzwVv6cYmS2waj2iAV/pub?gid=0&single=true&output=csv",

      archiveSheetBtnLink: "https://t.me/durov", 
      archiveSheetBtnText: "Смотреть дневник...",
      archiveSheetText: "Мы не просто смотрим достопримечательности, мы создаем истории.",
      googleSheetArchiveUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQWTsKdTeviytAVN625NFks2VNZg6CKSXsC7sf8zhoih6T20yKCKM1qQ-RaNYFzwVv6cYmS2waj2iAV/pub?gid=1427517511&single=true&output=csv",
      archivePhotos: [],

      googleSheetSubmitUrl: "https://script.google.com/macros/s/AKfycbwScQlTvTiC3BnCYUrLvdkJR4lTEhDP1lCpJuQxwdpS0sBj9NaR0Uzm6JP38sG4X_kiRw/exec",
      formTitle: "Написать мне",
      formSubtitle: "Оставьте свои контакты, и мы вместе создадим историю вашего идеального путешествия.",
      formSubmitBtnText: "Отправить письмо",
      formSuccessText: "Письмо отправлено! Скоро свяжусь с вами.",

      tours: []
    };
  </script>
  <!-- ================= КОНЕЦ БЛОКА НАСТРОЕК ================= -->


  <!-- Прелоадер -->
  <div id="preloader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-700 bg-sand">
    <div class="relative z-10 flex flex-col items-center">
      <svg class="animate-spin h-10 w-10 text-terracotta mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <p class="font-hand text-coffee text-2xl tracking-wide animate-pulse">открываем дневник...</p>
    </div>
  </div>

  <div class="min-h-screen bg-sand text-coffee font-sans pb-32 relative">
    
    <div class="w-full max-w-md md:max-w-3xl lg:max-w-5xl mx-auto bg-sand min-h-screen relative">
      
      <!-- БЛОК 1: Hero-секция (Скрапбукинг/Полароид) -->
      <header class="pt-12 md:pt-16 pb-6 px-5 flex flex-col items-center relative z-10">
        
        <p class="font-hand text-terracotta text-2xl md:text-3xl mb-1 -rotate-2">твой проводник в мир приключений</p>
        <h1 id="cfg-author-name" class="font-sans font-bold text-3xl md:text-4xl text-coffee text-center mb-8"></h1>

        <!-- Полароидное фото гида -->
        <div class="relative bg-white p-3 md:p-4 pb-12 md:pb-14 rounded-sm shadow-polaroid rotate-2 w-4/5 max-w-sm border border-gray-100">
          <div class="washi-tape washi-tape-1"></div>
          <img 
            id="cfg-hero-image"
            src="" 
            alt="Guide" 
            class="w-full aspect-[4/5] object-cover rounded-sm grayscale-[15%] sepia-[10%]"
          />
          <p id="cfg-author-sub" class="font-hand text-2xl text-coffee text-center absolute bottom-3 left-0 w-full"></p>
        </div>
      </header>

      <!-- Основной контент -->
      <main class="px-5 md:px-10 lg:px-16 py-6 md:py-10">
        
        <!-- БЛОК 2: Главное меню (Мягкие эстетичные плашки) -->
        <section class="relative z-20">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
            
            <!-- Карточка 1: Ближайшие экспедиции (Акцентная) -->
            <button type="button" onclick="openExpeditions()" class="col-span-2 appearance-none focus:outline-none w-full text-left bg-cream border border-[#F2EBE1] rounded-[20px] p-5 shadow-soft hover:shadow-polaroid hover:-translate-y-1 transition-all duration-300 flex items-center justify-between group cursor-pointer">
              <!-- Скрытое изображение для JS -->
              <img id="cfg-expeditions-image" src="" class="hidden" />
              <div>
                <p class="font-hand text-sage text-xl md:text-2xl mb-0.5 group-hover:text-terracotta transition-colors">Расписание</p>
                <h3 class="font-sans font-bold text-xl text-coffee">Экспедиции</h3>
              </div>
              <div class="w-12 h-12 rounded-full bg-sand flex items-center justify-center text-terracotta group-hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/></svg>
              </div>
            </button>

            <!-- Карточка 2: Как это было -->
            <button type="button" onclick="openArchive()" class="appearance-none focus:outline-none w-full text-left bg-cream border border-[#F2EBE1] rounded-[20px] p-4 aspect-square flex flex-col items-center justify-center text-center shadow-soft hover:shadow-polaroid hover:-translate-y-1 transition-all duration-300 cursor-pointer group">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-terracotta mb-2 group-hover:scale-110 transition-transform"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
              <span id="cfg-archive-title" class="text-sm font-bold text-coffee mb-0.5"></span>
              <span id="cfg-archive-sub" class="font-hand text-sage text-lg"></span>
            </button>

            <!-- Карточка 3: Моя философия -->
            <button type="button" onclick="openPhilosophy()" class="appearance-none focus:outline-none w-full text-left bg-cream border border-[#F2EBE1] rounded-[20px] p-4 aspect-square flex flex-col items-center justify-center text-center shadow-soft hover:shadow-polaroid hover:-translate-y-1 transition-all duration-300 cursor-pointer group">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-terracotta mb-2 group-hover:scale-110 transition-transform"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              <span id="cfg-philosophy-title" class="text-sm font-bold text-coffee mb-0.5"></span>
              <span id="cfg-philosophy-sub" class="font-hand text-sage text-lg"></span>
            </button>

            <!-- Карточка 4: Отзывы -->
            <button type="button" onclick="openReviews()" class="appearance-none focus:outline-none w-full text-left bg-cream border border-[#F2EBE1] rounded-[20px] p-4 aspect-square flex flex-col items-center justify-center text-center shadow-soft hover:shadow-polaroid hover:-translate-y-1 transition-all duration-300 cursor-pointer group">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-terracotta mb-2 group-hover:scale-110 transition-transform"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
              <span id="cfg-reviews-title" class="text-sm font-bold text-coffee mb-0.5"></span>
              <span id="cfg-reviews-sub" class="font-hand text-sage text-lg"></span>
            </button>

            <!-- Карточка 5: Контакты -->
            <button type="button" onclick="openContacts()" class="appearance-none focus:outline-none w-full text-left bg-cream border border-[#F2EBE1] rounded-[20px] p-4 aspect-square flex flex-col items-center justify-center text-center shadow-soft hover:shadow-polaroid hover:-translate-y-1 transition-all duration-300 cursor-pointer group">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="text-terracotta mb-2 group-hover:scale-110 transition-transform"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span id="cfg-contacts-title" class="text-sm font-bold text-coffee mb-0.5"></span>
              <span id="cfg-contacts-sub" class="font-hand text-sage text-lg"></span>
            </button>
          </div>
        </section>

        <!-- БЛОК 3: Актуальный тур (Полароид) -->
        <section class="mt-14">
          <div class="flex items-center gap-2 mb-6 justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-terracotta"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/><path d="m9 12 2 2 4-4"/></svg>
            <h2 class="font-hand text-3xl text-coffee">Скоро отправляемся</h2>
          </div>
          
          <!-- Карточка-полароид -->
          <div class="bg-white rounded-sm shadow-polaroid border border-gray-100 p-3 md:p-5 pb-8 relative -rotate-1 md:w-4/5 mx-auto">
            <div class="washi-tape washi-tape-2"></div>
            
            <div class="relative w-full aspect-[4/3] mb-5 bg-sand rounded-sm overflow-hidden">
              <img 
                id="cfg-main-tour-image"
                src="" 
                alt="Main Tour" 
                class="w-full h-full object-cover sepia-[10%] grayscale-[10%]" 
              />
              <div class="absolute top-3 left-3 bg-white px-3 py-1 rounded-sm shadow-sm border border-gray-100">
                <p id="cfg-main-tour-badge" class="text-[10px] font-bold text-coffee tracking-wider uppercase"></p>
              </div>
            </div>
            
            <div class="px-2">
              <h3 id="cfg-main-tour-title" class="font-hand text-3xl md:text-4xl text-coffee mb-3"></h3>
              
              <div class="flex flex-col gap-1.5 mb-4">
                <div class="flex items-center text-sm text-coffee/80 font-medium">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mr-2 text-sage"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                  <span id="cfg-main-tour-dates"></span>
                </div>
                <div class="flex items-center text-sm text-coffee/80 font-medium">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mr-2 text-sage"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                  <span id="cfg-main-tour-location"></span>
                </div>
              </div>
              
              <p id="cfg-main-tour-desc" class="text-sm text-coffee/70 leading-relaxed mb-6 font-sans line-clamp-3"></p>
              
              <a id="cfg-main-tour-btn" href="#" target="_blank" class="w-full py-3.5 border border-terracotta/30 text-terracotta rounded-full text-xs uppercase tracking-widest font-bold hover:bg-terracotta hover:text-white transition-colors flex items-center justify-center gap-2">
                <span id="cfg-main-tour-btn-text"></span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </a>
            </div>
          </div>
        </section>

      </main>

      <!-- БЛОК 4: Sticky CTA (Pill shape) -->
      <div class="fixed bottom-0 left-0 right-0 p-5 md:p-8 pt-16 md:pt-24 bg-gradient-to-t from-sand via-sand/95 to-transparent z-50 pointer-events-none">
        <div class="w-full max-w-md md:max-w-3xl lg:max-w-5xl mx-auto flex justify-center">
          <button id="cfg-bottom-btn" onclick="openForm()" class="pointer-events-auto w-[90%] md:w-auto md:px-12 bg-terracotta text-white py-4 px-6 rounded-full text-sm uppercase tracking-[0.15em] font-bold shadow-float hover:bg-[#C26245] hover:-translate-y-0.5 transition-all duration-300 active:scale-95 block text-center">
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Всплывающие шторки (Мягкие формы, без стекла) -->
  
  <!-- Шторка "Экспедиции" -->
  <div id="expeditions-sheet" class="fixed inset-0 z-[110] flex flex-col justify-end pointer-events-none transition-all duration-500">
    <div id="expeditions-backdrop" class="absolute inset-0 bg-coffee/40 opacity-0 transition-opacity duration-500" onclick="closeExpeditions()"></div>
    
    <div id="expeditions-content" class="relative bg-sand w-full max-w-md md:max-w-3xl lg:max-w-5xl mx-auto rounded-t-[30px] shadow-[0_-10px_40px_rgba(62,39,35,0.1)] translate-y-full transition-transform duration-500 ease-out flex flex-col max-h-[85vh]">
      
      <div class="flex-shrink-0 pt-5 pb-3 px-6 flex flex-col items-center bg-sand rounded-t-[30px] z-10 sticky top-0 border-b border-coffee/5">
        <div class="w-12 h-1.5 bg-coffee/10 rounded-full mb-4"></div>
        <div class="w-full flex justify-between items-center mb-2">
          <h2 class="font-hand text-3xl text-coffee">Ближайшие туры</h2>
          <button onclick="closeExpeditions()" class="p-2 -mr-2 text-coffee/50 hover:text-terracotta transition-colors rounded-full bg-cream">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
      </div>

      <div id="cfg-tours-container" class="overflow-y-auto p-5 pb-10 space-y-6 md:grid md:grid-cols-2 md:space-y-0 md:gap-6">
        <!-- Полароиды генерируются скриптом -->
      </div>
    </div>
  </div>

  <!-- Шторка "Как это было" -->
  <div id="archive-sheet" class="fixed inset-0 z-[110] flex flex-col justify-end pointer-events-none transition-all duration-500">
    <div id="archive-backdrop" class="absolute inset-0 bg-coffee/40 opacity-0 transition-opacity duration-500" onclick="closeArchive()"></div>
    
    <div id="archive-content" class="relative bg-sand w-full max-w-md md:max-w-3xl lg:max-w-5xl mx-auto rounded-t-[30px] shadow-[0_-10px_40px_rgba(62,39,35,0.1)] translate-y-full transition-transform duration-500 ease-out flex flex-col max-h-[90vh]">
      
      <div class="flex-shrink-0 pt-5 pb-3 px-6 flex flex-col items-center bg-sand rounded-t-[30px] z-10 sticky top-0 border-b border-coffee/5">
        <div class="w-12 h-1.5 bg-coffee/10 rounded-full mb-4"></div>
        <div class="w-full flex justify-between items-center mb-2">
          <h2 class="font-hand text-3xl text-coffee">Наш фотодневник</h2>
          <button onclick="closeArchive()" class="p-2 -mr-2 text-coffee/50 hover:text-terracotta transition-colors rounded-full bg-cream">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
      </div>

      <div class="overflow-y-auto p-5 pb-12 flex flex-col">
        <p id="cfg-archive-sheet-text" class="font-hand text-2xl text-center text-sage leading-relaxed mb-8 px-4"></p>

  <script>
    function applyVibeConfig() {
      // 1. Главный экран
      document.getElementById('preloader').style.backgroundImage = 'none'; // Убираем картинку, оставляем песочный фон
      document.getElementById('cfg-hero-image').src = APP_DATA.heroImage;
      document.getElementById('cfg-author-name').textContent = APP_DATA.authorName;
      document.getElementById('cfg-author-sub').textContent = APP_DATA.authorSubtitle;

      // 2. Меню
      document.getElementById('cfg-expeditions-image').src = APP_DATA.expeditionsImage;
      document.getElementById('cfg-archive-title').textContent = APP_DATA.archiveTitle;
      document.getElementById('cfg-archive-sub').textContent = APP_DATA.archiveSub;
      
      document.getElementById('cfg-philosophy-title').textContent = APP_DATA.philosophyTitle;
      document.getElementById('cfg-philosophy-sub').textContent = APP_DATA.philosophySub;

      document.getElementById('cfg-reviews-title').textContent = APP_DATA.reviewsTitle;
      document.getElementById('cfg-reviews-sub').textContent = APP_DATA.reviewsSub;

      document.getElementById('cfg-contacts-title').textContent = APP_DATA.contactsTitle;
      document.getElementById('cfg-contacts-sub').textContent = APP_DATA.contactsSub;
      
      if(APP_DATA.socialLinks) {
        const wa = document.getElementById('cfg-contact-wa');
        if(APP_DATA.socialLinks.whatsapp) { wa.href = APP_DATA.socialLinks.whatsapp; wa.style.display = 'flex'; } else { wa.style.display = 'none'; }
        
        const tg = document.getElementById('cfg-contact-tg');
        if(APP_DATA.socialLinks.telegram) { tg.href = APP_DATA.socialLinks.telegram; tg.style.display = 'flex'; } else { tg.style.display = 'none'; }
        
        const ig = document.getElementById('cfg-contact-ig');
        if(APP_DATA.socialLinks.instagram) { ig.href = APP_DATA.socialLinks.instagram; ig.style.display = 'flex'; } else { ig.style.display = 'none'; }
      }

      // 3. Актуальный тур
      const nearestTour = APP_DATA.tours.find(t => !t.isSoldOut) || APP_DATA.tours[0];
      
      if (nearestTour) {
        document.getElementById('cfg-main-tour-image').src = nearestTour.image || APP_DATA.mainTourImage;
        document.getElementById('cfg-main-tour-badge').textContent = nearestTour.badge || APP_DATA.mainTourBadge;
        document.getElementById('cfg-main-tour-title').textContent = nearestTour.title || APP_DATA.mainTourTitle;
        document.getElementById('cfg-main-tour-dates').textContent = nearestTour.dates || APP_DATA.mainTourDates;
        document.getElementById('cfg-main-tour-location').textContent = nearestTour.location || APP_DATA.mainTourLocation;
        document.getElementById('cfg-main-tour-desc').textContent = nearestTour.desc || APP_DATA.mainTourDesc;
        document.getElementById('cfg-main-tour-btn-text').textContent = APP_DATA.mainTourBtnText;
        document.getElementById('cfg-main-tour-btn').href = nearestTour.link || APP_DATA.mainTourLink;
      }

      // 4. Главная кнопка
      document.getElementById('cfg-bottom-btn').textContent = APP_DATA.bottomBtnText;

      // 5. Форма
      document.getElementById('cfg-form-title').textContent = APP_DATA.formTitle;
      document.getElementById('cfg-form-subtitle').textContent = APP_DATA.formSubtitle;
      document.getElementById('cfg-form-btn-text').textContent = APP_DATA.formSubmitBtnText;
      document.getElementById('cfg-form-success-text').textContent = APP_DATA.formSuccessText;

      // 6. Философия
      document.getElementById('cfg-philosophy-popup-img').src = APP_DATA.philosophyPopupImage;
      document.getElementById('cfg-philosophy-popup-title').textContent = APP_DATA.philosophyPopupTitle;
      
      const bulletsContainer = document.getElementById('cfg-philosophy-bullets');
      bulletsContainer.innerHTML = '';
      APP_DATA.philosophyPopupBullets.forEach(text => {
        const html = `
          <li class="flex items-start gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-terracotta shrink-0 mt-0.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
            <span class="leading-relaxed">${text}</span>
          </li>
        `;
        bulletsContainer.insertAdjacentHTML('beforeend', html);
      });

      // 7. Архив
      document.getElementById('cfg-archive-sheet-text').textContent = `«${APP_DATA.archiveSheetText}»`;
      document.getElementById('cfg-archive-sheet-btn-text').textContent = APP_DATA.archiveSheetBtnText;
      document.getElementById('cfg-archive-sheet-btn').href = APP_DATA.archiveSheetBtnLink;

      const galleryContainer = document.getElementById('cfg-archive-gallery');
      galleryContainer.innerHTML = '';
      APP_DATA.archivePhotos.forEach((photoUrl, index) => {
        const rot = index % 2 === 0 ? 'rotate-2' : '-rotate-2';
        const tapeRot = index % 2 === 0 ? '-rotate-3' : 'rotate-4';
        const html = `
          <div class="bg-white p-2 pb-8 shadow-polaroid rounded-sm border border-gray-100 ${rot} hover:rotate-0 hover:scale-105 transition-all duration-300 transform origin-center z-10 hover:z-20 relative">
            <div class="absolute -top-3 left-1/2 -translate-x-1/2 ${tapeRot} z-10 w-12 h-5 bg-paper/80 shadow-sm border border-white/50"></div>
            <img src="${photoUrl}" class="w-full aspect-square object-cover grayscale-[10%]" alt="Story">
          </div>
        `;
        galleryContainer.insertAdjacentHTML('beforeend', html);
      });

      // 8. Туры (Стиль полароид)
      const toursContainer = document.getElementById('cfg-tours-container');
      toursContainer.innerHTML = ''; 
      
      APP_DATA.tours.forEach((tour, index) => {
        const isSold = tour.isSoldOut;
        const rot = index % 2 === 0 ? 'rotate-1' : '-rotate-1';
        const tapeRot = index % 2 === 0 ? '-rotate-2' : 'rotate-3';

        const html = `
          <a href="${tour.link}" target="_blank" class="flex flex-col bg-white p-3 md:p-4 rounded-sm shadow-polaroid border border-gray-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group ${isSold ? 'opacity-85' : ''} transform ${rot} mb-4 relative">
            
            <div class="absolute -top-3 left-[15%] ${tapeRot} z-10 w-16 h-6 bg-paper/80 shadow-sm border border-white/50"></div>
            
            <div class="relative w-full aspect-[4/3] shrink-0 overflow-hidden bg-sand rounded-sm ${isSold ? 'grayscale' : 'grayscale-[10%]' }">
              <img src="${tour.image}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="${tour.title}">
              <div class="absolute top-3 left-3 bg-white px-3 py-1 rounded-sm shadow-sm border border-gray-100 z-10">
                <p class="text-[10px] font-bold text-coffee uppercase tracking-wider">${tour.badge}</p>
              </div>
            </div>
            
            <div class="pt-4 flex flex-col flex-1 px-1">
              <h3 class="font-hand text-[32px] md:text-[36px] text-coffee mb-2 leading-tight group-hover:text-terracotta transition-colors">${tour.title}</h3>
              
              <div class="flex flex-col gap-1.5 mb-4">
                <p class="text-sm text-coffee/80 flex items-center gap-2 font-medium font-sans">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-sage"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                  ${tour.dates}
                </p>
                ${tour.location ? `
                <p class="text-sm text-coffee/80 flex items-center gap-2 font-medium font-sans">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-sage"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${tour.location}
                </p>
                ` : ''}
              </div>

              ${tour.desc ? `<p class="text-sm text-coffee/70 leading-relaxed mb-5 font-sans line-clamp-3">${tour.desc}</p>` : ''}
              
              <div class="flex items-center justify-between mt-auto pt-4 border-t border-coffee/5">
                <span class="text-lg font-bold text-coffee font-sans ${isSold ? 'opacity-50 line-through' : ''}">${tour.price}</span>
                ${isSold 
                  ? `<span class="text-sage text-[10px] uppercase tracking-widest font-bold px-3 py-1.5 border border-sage/30 rounded-full font-sans">${tour.soldOutText || "В резерв"}</span>`
                  : `<span class="flex items-center gap-1.5 text-[11px] uppercase tracking-widest font-bold text-terracotta group-hover:text-[#C26245] transition-colors font-sans">
                      Подробнее
                     </span>`
                }
              </div>
            </div>
          </a>
        `;
        toursContainer.insertAdjacentHTML('beforeend', html);
      });

      const tourSelect = document.getElementById('tour-select');
      tourSelect.innerHTML = '<option value="" disabled selected>Куда поедем?</option><option value="Не определился, нужна помощь">Пока не знаю, помогите выбрать</option>';
      APP_DATA.tours.forEach(tour => {
        if(!tour.isSoldOut) {
          tourSelect.insertAdjacentHTML('beforeend', `<option value="${tour.title}">${tour.title}</option>`);
        } else {
          tourSelect.insertAdjacentHTML('beforeend', `<option value="${tour.title} (В резерв)">${tour.title} (В резерв)</option>`);
        }
      });

      // 9. Отзывы (Стиль записок/стикеров)
      const reviewsContainer = document.getElementById('cfg-reviews-container');
      reviewsContainer.innerHTML = '';
      
      const starSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-90"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
      const starsHtml = starSvg.repeat(5);

      APP_DATA.reviews.forEach((review, index) => {
        const rotations = ['rotate-1', '-rotate-1', 'rotate-2', '-rotate-2'];
        const rot = rotations[index % 4];

        const html = `
          <div class="bg-[#FFF9E6] border border-[#F2E5C9] shadow-soft rounded-br-[24px] rounded-tl-sm p-6 relative ${rot} mb-4">
            
            <div class="absolute -top-3 left-1/2 -translate-x-1/2 w-8 h-8 flex items-center justify-center">
              <div class="w-3 h-3 rounded-full bg-terracotta shadow-sm opacity-90"></div>
            </div>
            
            <div class="flex gap-1 mb-4 text-terracotta justify-center">
              ${starsHtml}
            </div>
            
            <p class="font-hand text-[22px] md:text-3xl text-coffee leading-relaxed mb-6 text-center px-2">«${review.text}»</p>
            
            <div class="flex flex-col items-center border-t border-coffee/10 pt-4">
              <span class="text-[13px] font-bold text-coffee tracking-widest uppercase font-sans">${review.name}</span>
              <span class="font-hand text-xl text-sage mt-1">${review.tour}</span>
            </div>
          </div>
        `;
        reviewsContainer.insertAdjacentHTML('beforeend', html);
      });
    }

    // Запуск приложения и загрузка из Гугл Таблицы
    window.addEventListener('load', function() {
      applyVibeConfig();

      const preloader = document.getElementById('preloader');
      if (preloader) {
        setTimeout(() => {
          preloader.style.opacity = '0';
          preloader.style.pointerEvents = 'none';
          setTimeout(() => { preloader.style.display = 'none'; }, 700);
        }, 800);
      }

      const fetches = [];

      if (APP_DATA.googleSheetUrl) {
        fetches.push(
          fetch(APP_DATA.googleSheetUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n');
            const fetchedTours = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim();
              if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              fetchedTours.push({
                title: cols[0] || "", dates: cols[1] || "", price: cols[2] || "",
                badge: cols[3] || "", image: cols[4] || "", link: cols[5] || "",
                isSoldOut: (cols[6] && cols[6].toLowerCase() === 'да'),
                soldOutText: "Запись в резерв", location: cols[7] || "", desc: cols[8] || ""
              });
            }
            if (fetchedTours.length > 0) APP_DATA.tours = fetchedTours;
          }).catch(e => console.error(e))
        );
      }

      if (APP_DATA.googleSheetArchiveUrl) {
        fetches.push(
          fetch(APP_DATA.googleSheetArchiveUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n');
            const fetchedPhotos = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim();
              if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              if (cols[0]) fetchedPhotos.push(cols[0]); 
            }
            if (fetchedPhotos.length > 0) APP_DATA.archivePhotos = fetchedPhotos;
          }).catch(e => console.error(e))
        );
      }

      if (APP_DATA.googleSheetReviewsUrl) {
        fetches.push(
          fetch(APP_DATA.googleSheetReviewsUrl).then(res => res.text()).then(csvText => {
            const rows = csvText.split('\n');
            const fetchedReviews = [];
            for (let i = 1; i < rows.length; i++) { 
              const row = rows[i].trim();
              if (!row) continue;
              const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
              if (cols[0] && cols[2]) {
                fetchedReviews.push({ name: cols[0] || "Гость", tour: cols[1] || "", text: cols[2] || "" });
              }
            }
            if (fetchedReviews.length > 0) APP_DATA.reviews = fetchedReviews;
          }).catch(e => console.error(e))
        );
      }

      Promise.allSettled(fetches).then(() => { applyVibeConfig(); });
    });

    // --- ШТОРКИ И МОДАЛКИ ---
    function openExpeditions() { document.getElementById('expeditions-sheet').classList.remove('pointer-events-none'); document.getElementById('expeditions-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('expeditions-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; }
    function closeExpeditions() { document.getElementById('expeditions-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('expeditions-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('expeditions-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function openArchive() { document.getElementById('archive-sheet').classList.remove('pointer-events-none'); document.getElementById('archive-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('archive-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; }
    function closeArchive() { document.getElementById('archive-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('archive-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('archive-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function openPhilosophy() { document.getElementById('philosophy-popup').classList.remove('pointer-events-none'); document.getElementById('philosophy-backdrop').classList.replace('opacity-0', 'opacity-100'); const content = document.getElementById('philosophy-content'); content.classList.replace('scale-95', 'scale-100'); content.classList.replace('opacity-0', 'opacity-100'); document.body.style.overflow = 'hidden'; }
    function closePhilosophy() { document.getElementById('philosophy-backdrop').classList.replace('opacity-100', 'opacity-0'); const content = document.getElementById('philosophy-content'); content.classList.replace('scale-100', 'scale-95'); content.classList.replace('opacity-100', 'opacity-0'); setTimeout(() => { document.getElementById('philosophy-popup').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 300); }

    function openForm() { document.getElementById('form-sheet').classList.remove('pointer-events-none'); document.getElementById('form-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('form-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; document.getElementById('form-success-msg').classList.add('hidden'); document.getElementById('lead-form').reset(); document.getElementById('form-submit-btn').disabled = false; document.getElementById('form-btn-icon').classList.remove('hidden'); document.getElementById('form-btn-loader').classList.add('hidden'); }
    function closeForm() { document.getElementById('form-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('form-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('form-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function openReviews() { document.getElementById('reviews-sheet').classList.remove('pointer-events-none'); document.getElementById('reviews-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('reviews-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; }
    function closeReviews() { document.getElementById('reviews-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('reviews-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('reviews-sheet').classList.add('pointer-events-none'); if (document.getElementById('write-review-sheet').classList.contains('pointer-events-none')) { document.body.style.overflow = ''; } }, 500); }

    function openWriteReview() { closeReviews(); setTimeout(() => { document.getElementById('write-review-sheet').classList.remove('pointer-events-none'); document.getElementById('write-review-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('write-review-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; document.getElementById('review-success-msg').classList.add('hidden'); document.getElementById('write-review-form').reset(); document.getElementById('review-submit-btn').disabled = false; document.getElementById('review-btn-icon').classList.remove('hidden'); document.getElementById('review-btn-loader').classList.add('hidden'); }, 100); }
    function closeWriteReview() { document.getElementById('write-review-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('write-review-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('write-review-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function openContacts() { document.getElementById('contacts-sheet').classList.remove('pointer-events-none'); document.getElementById('contacts-backdrop').classList.replace('opacity-0', 'opacity-100'); document.getElementById('contacts-content').classList.replace('translate-y-full', 'translate-y-0'); document.body.style.overflow = 'hidden'; }
    function closeContacts() { document.getElementById('contacts-backdrop').classList.replace('opacity-100', 'opacity-0'); document.getElementById('contacts-content').classList.replace('translate-y-0', 'translate-y-full'); setTimeout(() => { document.getElementById('contacts-sheet').classList.add('pointer-events-none'); document.body.style.overflow = ''; }, 500); }

    function submitNewReview(event) {
      event.preventDefault();
      const form = document.getElementById('write-review-form'); const btn = document.getElementById('review-submit-btn'); const icon = document.getElementById('review-btn-icon'); const loader = document.getElementById('review-btn-loader'); const successMsg = document.getElementById('review-success-msg');
      btn.disabled = true; icon.classList.add('hidden'); loader.classList.remove('hidden');
      const formData = new URLSearchParams(new FormData(form));
      if (APP_DATA.googleSheetSubmitReviewUrl) { fetch(APP_DATA.googleSheetSubmitReviewUrl, { method: 'POST', body: formData, mode: 'no-cors' }).then(() => showReviewSuccess()).catch(err => showReviewSuccess()); } else { setTimeout(showReviewSuccess, 1000); }
      function showReviewSuccess() { successMsg.classList.remove('hidden'); successMsg.classList.add('animate-pulse'); setTimeout(() => { closeWriteReview(); }, 2500); }
    }

    function submitForm(event) {
      event.preventDefault(); 
      const form = document.getElementById('lead-form'); const btn = document.getElementById('form-submit-btn'); const icon = document.getElementById('form-btn-icon'); const loader = document.getElementById('form-btn-loader'); const successMsg = document.getElementById('form-success-msg');
      btn.disabled = true; icon.classList.add('hidden'); loader.classList.remove('hidden');
      const formData = new URLSearchParams(new FormData(form));
      if (APP_DATA.googleSheetSubmitUrl) { fetch(APP_DATA.googleSheetSubmitUrl, { method: 'POST', body: formData, mode: 'no-cors' }).then(() => { showSuccess(); }).catch(err => { showSuccess(); }); } else { setTimeout(showSuccess, 1000); }
      function showSuccess() { successMsg.classList.remove('hidden'); successMsg.classList.add('animate-pulse'); setTimeout(() => { closeForm(); }, 2500); }
    }
  </script>
</body>
</html>
