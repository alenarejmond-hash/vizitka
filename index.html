    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Премиальные Google Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --glass-bg: rgba(20, 20, 25, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: #e2e8f0;
            background-color: #0f172a;
            /* Разрешаем скролл, так как добавили карусель на главную */
            overflow-x: hidden; 
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
            overscroll-behavior-y: none; /* Предотвращает оттягивание аппки вниз */
        }
        body::-webkit-scrollbar { display: none; }

        h1, h2, h3, .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }

        /* --- Загрузочный экран (Loader) --- */
        #global-loader {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Плавный движущийся фон (Ken Burns Effect) --- */
        .bg-photo {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            /* Замени ссылку на свое фото (звезды, дым, кристаллы, космос) */
            background: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1080&auto=format&fit=crop') center/cover no-repeat;
            animation: slowPan 40s alternate infinite ease-in-out;
            z-index: -2;
        }
        
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.6) 0%, rgba(10, 15, 25, 0.95) 100%);
            z-index: -1;
        }

        @keyframes slowPan {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.08) translate(-2%, -2%); }
        }

        /* --- Темный Глассморфизм --- */
        .glass-dark {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        .glass-btn {
            background: rgba(30, 30, 40, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-btn:active {
            transform: scale(0.97);
            background: rgba(40, 40, 50, 0.7);
            border-color: var(--gold-light);
        }

        /* --- Карусель Отзывов --- */
        .carousel-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1rem;
            padding-bottom: 1rem;
            /* Скрываем скроллбар */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .carousel-container::-webkit-scrollbar { display: none; }
        
        .carousel-item {
            scroll-snap-align: center;
            min-width: 85%;
            max-width: 85%;
        }

        /* --- Блокировка скролла фона --- */
        body.no-scroll {
            overflow: hidden !important;
        }

        /* --- Шторки (Bottom Sheets) --- */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 40;
        }
        .sheet-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .bottom-sheet {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            height: 85vh;
            background: rgba(20, 20, 28, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px 28px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1);
            z-index: 50;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.5);
        }
        .bottom-sheet.active {
            transform: translateY(0);
        }

        .sheet-header {
            padding: 1.25rem 1rem 0.5rem;
            text-align: center;
            position: relative;
        }
        .sheet-drag-handle {
            width: 36px; height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 0 auto 12px auto;
        }
        .sheet-content {
            padding: 1rem 1.5rem 2.5rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* Золотое свечение для Руны */
        .gold-glow {
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5), 0 0 30px rgba(212, 175, 55, 0.3);
            animation: pulseGold 2.5s infinite alternate;
        }
        @keyframes pulseGold {
            from { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }
            to { text-shadow: 0 0 25px rgba(212, 175, 55, 0.8), 0 0 40px rgba(212, 175, 55, 0.5); }
        }

        .text-gold { color: var(--gold); }
    </style>
</head>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready(); // Сообщает ТГ, что аппка готова (ускоряет отображение)
        tg.setHeaderColor('#0f172a'); // Подстраиваем цвет шапки тг

        // Запрещаем вертикальные свайпы, чтобы аппка не улетала при случайном касании
        if (tg.disableVerticalSwipes) {
            tg.disableVerticalSwipes();
        }

        // --- Убираем загрузчик после загрузки страницы ---
        window.addEventListener('load', () => {
            const loader = document.getElementById('global-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 400);
            }
        });

        // --- Логика Шторок ---
        const overlay = document.getElementById('overlay');
        let activeSheet = null;

        function openSheet(sheetId) {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            closeAllSheets();
            const sheet = document.getElementById(sheetId);
            sheet.classList.add('active');
            overlay.classList.add('active');
            activeSheet = sheet;
            document.body.classList.add('no-scroll'); // Блокируем скролл фона
        }

        function closeAllSheets() {
            if (activeSheet) {
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                activeSheet.classList.remove('active');
                activeSheet = null;
            }
            overlay.classList.remove('active');
            document.body.classList.remove('no-scroll'); // Возвращаем скролл фона
        }

        // --- Логика Руны Дня ---
        const runes = [
            { symbol: 'ᚠ', name: 'Феху', desc: 'Энергия созидания и ресурса. Сегодня прекрасный день для закладки финансового фундамента.' },
            { symbol: 'ᚢ', name: 'Уруз', desc: 'Первозданная мощь. В вас скрыт огромный потенциал для прорыва. Действуйте смело.' },
            { symbol: 'ᚱ', name: 'Райдо', desc: 'Дорога открыта. Доверьтесь потоку событий, ваш внутренний компас настроен верно.' },
            { symbol: 'ᚨ', name: 'Ансуз', desc: 'Мудрость Вселенной. Обратите внимание на знаки, сны и случайно услышанные слова.' },
            { symbol: 'ᚷ', name: 'Гебо', desc: 'Гармония обмена. Отдавая — получаете. Прекрасное время для союзов и искренней любви.' },
            { symbol: 'ᚹ', name: 'Вуньо', desc: 'Радость и свет. Позвольте себе насладиться моментом, тьма отступила.' },
            { symbol: 'ᛟ', name: 'Одал', desc: 'Связь с родом. Ваша опора сегодня — ваши корни и внутренний духовный дом.' },
            { symbol: 'ᛉ', name: 'Альгиз', desc: 'Высшая защита. Вы под покровительством. Страхи иллюзорны, слушайте интуицию.' }
        ];

        function drawRune() {
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            const randomRune = runes[Math.floor(Math.random() * runes.length)];
            
            document.getElementById('rune-symbol').innerText = randomRune.symbol;
            document.getElementById('rune-name').innerText = randomRune.name;
            document.getElementById('rune-desc').innerText = randomRune.desc;
            
            openSheet('rune-sheet');
        }

        // --- Заглушка отправки отзыва ---
        function submitReview(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('form-message');
            const name = document.getElementById('rev-name').value;
            const text = document.getElementById('rev-text').value;
            
            btn.innerHTML = 'Отправка...';
            btn.disabled = true;

            // === ЗАГЛУШКА (Удалите или закомментируйте этот блок, когда подключите Google Script) ===
            setTimeout(() => {
                btn.innerHTML = 'Отправить';
                btn.disabled = false;
                document.getElementById('review-form').reset();
                msg.innerHTML = 'Благодарю. Отзыв отправлен на модерацию ✨';
                msg.classList.remove('hidden', 'text-red-400');
                msg.classList.add('text-gold');
            }, 1000);
            // === КОНЕЦ ЗАГЛУШКИ ===

            /* // === РЕАЛЬНАЯ ОТПРАВКА В GOOGLE SCRIPT (Раскомментируйте, когда добавите ссылку в MY_DATA) ===
            if (MY_DATA.googleScriptUrl) {
                const formData = new FormData();
                formData.append('action', 'addReview');
                formData.append('name', name);
                formData.append('text', text);

                fetch(MY_DATA.googleScriptUrl, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors'
                }).then(() => {
                    btn.innerHTML = 'Отправить';
                    btn.disabled = false;
                    document.getElementById('review-form').reset();
                    msg.innerHTML = 'Благодарю. Отзыв отправлен на модерацию ✨';
                    msg.classList.remove('hidden', 'text-red-400');
                    msg.classList.add('text-gold');
                }).catch(err => {
                    btn.innerHTML = 'Отправить';
                    btn.disabled = false;
                    msg.innerHTML = 'Произошла ошибка. Попробуйте позже.';
                    msg.classList.remove('hidden', 'text-gold');
                    msg.classList.add('text-red-400');
                });
            }
            // === КОНЕЦ РЕАЛЬНОЙ ОТПРАВКИ ===
            */
        }

        // --- МАГИЯ: ПОДСТАНОВКА ВАШИХ ДАННЫХ В ДИЗАЙН ---
        document.addEventListener('DOMContentLoaded', () => {
            // Фон и Аватар
            document.getElementById('dynamic-bg').style.backgroundImage = `url('${MY_DATA.backgroundPhoto}')`;
            document.getElementById('dynamic-avatar').src = MY_DATA.avatarPhoto;
            
            // Имя и теги
            document.getElementById('dynamic-name').innerText = MY_DATA.name;
            const tagsContainer = document.getElementById('dynamic-tags');
            MY_DATA.tags.forEach((tag, index) => {
                tagsContainer.innerHTML += `<span>${tag}</span>`;
                if (index < MY_DATA.tags.length - 1) {
                    tagsContainer.innerHTML += `<span class="w-1 h-1 rounded-full bg-gold/50"></span>`;
                }
            });

            // Гайд
            document.getElementById('dynamic-guide-title').innerText = MY_DATA.guide.title;
            document.getElementById('dynamic-guide-subtitle').innerText = MY_DATA.guide.subtitle;
            document.getElementById('dynamic-guide-link').href = MY_DATA.guide.link;

            // Соцсети
            document.getElementById('dynamic-tg').href = MY_DATA.socialLinks.telegram;
            document.getElementById('dynamic-inst').href = MY_DATA.socialLinks.instagram;
            document.getElementById('dynamic-wa').href = MY_DATA.socialLinks.whatsapp;

            // Отзывы
            const reviewsContainer = document.getElementById('reviews-carousel');
            MY_DATA.reviews.forEach(rev => {
                reviewsContainer.innerHTML += `
                <div class="carousel-item glass-dark rounded-2xl p-5 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h4 class="font-serif text-lg text-white">${rev.name}</h4>
                                <span class="text-[10px] text-gray-400 uppercase tracking-wider">${rev.date}</span>
                            </div>
                            <div class="flex text-gold text-sm gap-0.5">
                                <i class="ph-fill ph-star"></i><i class="ph-fill ph-star"></i><i class="ph-fill ph-star"></i><i class="ph-fill ph-star"></i><i class="ph-fill ph-star"></i>
                            </div>
                        </div>
                        <p class="text-sm text-gray-300 font-light leading-relaxed mb-2">${rev.text}</p>
                    </div>
                </div>`;
            });

            // Услуги
            const servicesContainer = document.getElementById('dynamic-services');
            const tgLink = MY_DATA.socialLinks.telegram;
            const tgDomain = tgLink.includes('/') ? tgLink.split('/').pop() : tgLink.replace('@', '');
            
            MY_DATA.services.forEach(srv => {
                servicesContainer.innerHTML += `
                <div class="glass-btn rounded-xl p-5 text-left border border-white/5">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-serif text-xl text-gold">${srv.title}</h3>
                        <span class="text-sm tracking-wider font-light border border-gold/30 px-3 py-1 rounded-full text-gold">${srv.price}</span>
                    </div>
                    <p class="text-xs text-gray-400 font-light leading-relaxed mb-4">${srv.description}</p>
                    <a href="tg://resolve?domain=${tgDomain}&text=${encodeURIComponent(srv.telegramMessage)}" 
                       class="block w-full text-center bg-white/10 hover:bg-white/20 text-white text-sm py-3 rounded-lg uppercase tracking-widest transition-colors">
                       Записаться
                    </a>
                </div>`;
            });

            // Обо мне
            document.getElementById('dynamic-about-img').src = MY_DATA.about.photo;
            document.getElementById('dynamic-about-text').innerText = MY_DATA.about.text;
            document.getElementById('dynamic-about-quote').innerText = MY_DATA.about.quote;
            const toolsContainer = document.getElementById('dynamic-about-tools');
            MY_DATA.about.tools.forEach(tool => {
                toolsContainer.innerHTML += `<span class="px-3 py-1 rounded-full glass-btn text-xs text-gold">${tool}</span>`;
            });

            // Добавляем виброотклик на все ссылки и кнопки (Telegram Haptics)
            document.querySelectorAll('a, button').forEach(el => {
                el.addEventListener('click', () => {
                    // Игнорируем элементы, у которых уже прописан onclick с вибрацией
                    if(tg.HapticFeedback && !el.hasAttribute('onclick')) {
                        tg.HapticFeedback.impactOccurred('light');
                    }
                });
            });
        });
    </script>
</body>
</html>
