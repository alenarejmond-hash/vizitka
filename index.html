<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Навигатор Канала</title>
    <!-- Подключение Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключение шрифта (похож на тот, что на референсе) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Иконки Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        app: {
                            bg: '#e2e2e6', // Мягкий серый фон как на фото
                            card: 'rgba(255, 255, 255, 0.6)', // Полупрозрачный белый для эффекта стекла
                            dark: '#1c1c1e',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #e2e2e6;
            /* Легкий градиент для имитации фона с референса */
            background-image: radial-gradient(circle at 50% 0%, #f4f4f6 0%, #d5d5db 100%);
            background-attachment: fixed;
            color: #1c1c1e;
            -webkit-tap-highlight-color: transparent;
        }

        /* Парящие тени как на референсе */
        .floating-shadow {
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3), 0 20px 30px -10px rgba(0, 0, 0, 0.2);
        }

        /* Воздушные и полупрозрачные карточки (эффект матового стекла) */
        .card-shadow {
            background: rgba(255, 255, 255, 0.4) !important;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.12), 0 10px 20px -5px rgba(0,0,0,0.05);
        }

        /* Кнопка "Subscribe" стайл */
        .black-pill-btn {
            background-color: #1a1a1c;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        .black-pill-btn:active {
            transform: scale(0.97);
            background-color: #000000;
        }

        /* Кастомный скроллбар (скрыт для красоты) */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Плавное появление */
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
    </style>
</head>
<body class="min-h-screen pb-12 pt-6 px-5 flex flex-col items-center">

    <!-- ЗАГРУЗОЧНЫЙ ЭКРАН (Огненный лоадер) -->
    <div id="app-loader" class="fixed inset-0 z-[100] bg-[#e2e2e6] flex items-center justify-center transition-opacity duration-500">
        <div class="relative w-20 h-20 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-4 border-orange-500/20"></div>
            <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-orange-500 border-r-red-500 border-b-yellow-400 animate-spin shadow-[0_0_30px_rgba(249,115,22,0.6)]"></div>
            <i class="ph-fill ph-fire text-orange-500 text-3xl animate-pulse"></i>
        </div>
    </div>

    <!-- ========================================================================= -->
    <!-- 🛑 НАСТРОЙКИ: МЕНЯЙТЕ ФОТО, ТЕКСТЫ И ССЫЛКИ ТОЛЬКО ЗДЕСЬ 🛑 -->
    <!-- ========================================================================= -->
    <script>
        const CONFIG = {
            
            // 👤 1. ВАШ ПРОФИЛЬ
            profile: {
                name: "Полина Чубакина", // Ваше имя
                
                // Ссылка на фото (Идеально подходят вертикальные фото. Можно скопировать ссылку из ВК, Telegram или загрузить на imgbb.com)
                avatar: "https://i.postimg.cc/vT8f0F1c/photo-2026-03-13-17-39-13.jpg", 
                
                // Краткое описание под фото
                bio: "Зажигаю сердца и сцены. Фаер-шоу, акробатика и жизнь в движении 🔥"
            },

            // 👋 2. ДАВАЙТЕ ЗНАКОМИТЬСЯ (Шторка)
            about: {
                photo: "https://images.unsplash.com/photo-1542282811-943ef1a6477b?auto=format&fit=crop&w=600&q=80", 
                text: "Привет! Меня зовут Полина. Я занимаюсь фаер-шоу уже более 2 лет...<br><br>Мой путь начался с простой искры, а теперь я зажигаю целые стадионы. В этом блоге я делюсь самым сокровенным." // Тег <br> делает перенос строки
            },

            // 🔗 3. ВАШИ КНОПКИ-ССЫЛКИ (Белые карточки посередине)
            links: [
                { 
                    title: "Огненные выступления", // Главный (крупный) текст кнопки
                    subtitle: "Смотреть лучшее",   // Мелкий текст справа
                    link: "https://t.me/telegram", // Ссылка, куда ведет кнопка
                    badge: "Хит!"                  // Черная плашка над кнопкой. Если она не нужна, напишите null (без кавычек)
                },
                { 
                    title: "Моя история", 
                    subtitle: "Как я приручила огонь", 
                    link: "https://t.me/telegram",
                    badge: null                    // Пример: плашка отключена (стоит null)
                },
                { 
                    title: "Закулисье", 
                    subtitle: "Секреты шоу", 
                    link: "https://t.me/telegram",
                    badge: null
                }
                // Вы можете добавить сюда еще карточки, скопировав блок выше
            ],

            // 🎲 4. СЛУЧАЙНЫЙ ПОСТ (Массивная черная кнопка внизу)
            // Вставьте в кавычках ссылки на ваши лучшие посты. Кнопка выберет один из них случайно!
            randomPosts: [
                "https://t.me/telegram", 
                "https://t.me/telegram"
            ],

            // 📱 5. СОЦИАЛЬНЫЕ СЕТИ (Мелкие ссылки в самом низу экрана)
            socials: {
                instagram: "https://instagram.com",
                youtube: "https://youtube.com",
                vk: "https://vk.com"
            }
        };
    </script>
    <!-- ========================================================================= -->
    <!-- 🛑 КОНЕЦ НАСТРОЕК (ДАЛЬШЕ КОД НЕ ТРОГАЙТЕ, ЧТОБЫ НЕ СЛОМАТЬ ДИЗАЙН) 🛑 -->
    <!-- ========================================================================= -->

    <div class="w-full max-w-md mx-auto space-y-6">

        <!-- ГЛАВНОЕ ФОТО (Как на референсе слева) -->
        <div class="relative w-full aspect-[3.5/4] rounded-[2.5rem] overflow-hidden floating-shadow fade-in">
            <!-- Само фото -->
            <img id="profile-avatar" src="" alt="Avatar" class="absolute inset-0 w-full h-full object-cover">
            
            <!-- Градиент внизу для читаемости текста -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
            
            <!-- Контент поверх фото -->
            <div class="absolute bottom-6 left-6 right-6 text-white">
                <!-- Имя и галочка -->
                <h1 class="text-4xl font-serif font-bold flex items-center gap-2 tracking-tight">
                    <span id="profile-name"></span>
                    <i class="ph-fill ph-check-circle text-white/90 text-[24px]"></i>
                </h1>
            </div>
        </div>

        <!-- КРАТКАЯ ИНФОРМАЦИЯ (Под фото) -->
        <div class="text-center px-4 fade-in delay-1">
            <p id="profile-bio" class="text-gray-600 font-medium text-sm leading-relaxed"></p>
        </div>

        <!-- КНОПКА "ДАВАЙТЕ ЗНАКОМИТЬСЯ" -->
        <div class="w-full fade-in delay-2 pt-2">
            <button onclick="openSheet()" class="w-full relative rounded-3xl p-5 card-shadow transition-transform active:scale-[0.98] flex items-center justify-between text-left">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full border border-white/60 flex items-center justify-center shadow-sm bg-white/30 text-gray-700">
                        <i class="ph-bold ph-user text-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-[16px] font-bold text-gray-900">Давайте знакомиться</h3>
                        <p class="text-[13px] font-medium text-gray-700">Моя история и путь</p>
                    </div>
                </div>
                <i class="ph-bold ph-caret-right text-gray-500 text-xl"></i>
            </button>
        </div>

        <!-- КАРТОЧКИ-ССЫЛКИ (Стиль "Select your plan") -->
        <div class="space-y-3 fade-in delay-2 mt-3" id="links-container">
            <!-- Карточки сгенерируются через JS -->
        </div>

        <!-- ЧЕРНАЯ КНОПКА (Как "Subscribe") -->
        <div class="pt-4 fade-in delay-3">
            <button onclick="openRandomPost()" class="w-full black-pill-btn text-white rounded-full py-4 px-6 flex items-center justify-center gap-2 font-semibold text-[15px]">
                Случайный пост 🎲
            </button>
            
            <!-- Футер (Как "Cancel anytime / Terms of use...") -->
            <div class="mt-4 text-center space-y-2">
                <p class="text-xs text-gray-500 font-medium">Мои социальные сети</p>
                <div class="flex justify-center gap-4 text-xs text-gray-400 font-medium">
                    <a id="social-inst" href="#" target="_blank" onclick="tg.HapticFeedback.impactOccurred('light')" class="hover:text-gray-800 transition-colors">Instagram</a>
                    <span>|</span>
                    <a id="social-yt" href="#" target="_blank" onclick="tg.HapticFeedback.impactOccurred('light')" class="hover:text-gray-800 transition-colors">YouTube</a>
                    <span>|</span>
                    <a id="social-vk" href="#" target="_blank" onclick="tg.HapticFeedback.impactOccurred('light')" class="hover:text-gray-800 transition-colors">ВКонтакте</a>
                </div>
            </div>
        </div>

    </div>

    <!-- ============================================== -->
    <!-- ШТОРКА "ДАВАЙТЕ ЗНАКОМИТЬСЯ" -->
    <!-- ============================================== -->
    <div id="sheet-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300" onclick="closeSheet()"></div>
    
    <div id="about-sheet" class="fixed bottom-0 left-0 w-full bg-[#f4f4f6] rounded-t-[2.5rem] z-50 transform translate-y-full transition-transform duration-300 flex flex-col max-h-[90vh] shadow-[0_-10px_40px_rgba(0,0,0,0.2)]">
        <!-- Зона закрытия / полоска -->
        <div class="w-full flex justify-center py-4" onclick="closeSheet()">
            <div class="w-14 h-1.5 bg-gray-300 rounded-full"></div>
        </div>
        
        <!-- Контент шторки (со скроллом) -->
        <div class="overflow-y-auto px-6 pb-12 custom-scrollbar">
            <h2 class="text-2xl font-bold mb-5 tracking-tight text-gray-900">Обо мне</h2>
            <img id="about-photo" src="" alt="About" class="w-full aspect-square object-cover rounded-[2rem] mb-5 shadow-lg">
            <div id="about-text" class="text-gray-700 space-y-3 leading-relaxed text-[15px] font-medium"></div>
        </div>
    </div>

    <!-- ОСНОВНАЯ ЛОГИКА -->
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Предотвращаем закрытие шторки свайпом вниз
        try {
            tg.disableVerticalSwipes();
        } catch(e) {}
        
        // Устанавливаем цвет фона шапки в телеграме (под цвет нашего фона)
        tg.setHeaderColor('#e2e2e6');

        function renderApp() {
            // Профиль
            document.getElementById('profile-avatar').src = CONFIG.profile.avatar;
            document.getElementById('profile-name').textContent = CONFIG.profile.name;
            document.getElementById('profile-bio').textContent = CONFIG.profile.bio;

            // Шторка "Давайте знакомиться"
            document.getElementById('about-photo').src = CONFIG.about.photo;
            document.getElementById('about-text').innerHTML = CONFIG.about.text;

            // Генерация карточек в стиле референса
            const container = document.getElementById('links-container');
            container.innerHTML = '';
            
            CONFIG.links.forEach((item, index) => {
                // Создаем бейдж, если он есть (как "Save 90%" на фото)
                const badgeHtml = item.badge 
                    ? `<div class="absolute -top-3 left-6 bg-black text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-md z-10">${item.badge}</div>` 
                    : '';

                container.innerHTML += `
                    <a href="${item.link}" target="_blank" onclick="tg.HapticFeedback.impactOccurred('light')" class="block relative bg-app-card rounded-3xl p-5 card-shadow transition-transform active:scale-[0.98]">
                        ${badgeHtml}
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <!-- Имитация пустой радио-кнопки как на референсе -->
                                <div class="w-5 h-5 rounded-full border border-gray-400 flex items-center justify-center">
                                    ${index === 0 ? '<div class="w-2.5 h-2.5 bg-black rounded-full"></div>' : ''}
                                </div>
                                
                                <div>
                                    <h3 class="text-[15px] font-semibold text-gray-900">${item.title}</h3>
                                </div>
                            </div>
                            <!-- Subtitle как правая часть на референсе ($0.77 / week) -->
                            <div class="text-right">
                                <p class="text-[13px] font-medium text-gray-800">${item.subtitle}</p>
                            </div>
                        </div>
                    </a>
                `;
            });

            // Соцсети
            document.getElementById('social-inst').href = CONFIG.socials.instagram;
            document.getElementById('social-yt').href = CONFIG.socials.youtube;
            document.getElementById('social-vk').href = CONFIG.socials.vk;
        }

        function openRandomPost() {
            tg.HapticFeedback.impactOccurred('medium');
            const links = CONFIG.randomPosts;
            const randomIndex = Math.floor(Math.random() * links.length);
            window.open(links[randomIndex], '_blank');
        }

        // Логика шторки
        function openSheet() {
            tg.HapticFeedback.impactOccurred('light');
            document.body.style.overflow = 'hidden'; // Блокируем скролл главной страницы
            const sheet = document.getElementById('about-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        function closeSheet() {
            document.body.style.overflow = ''; // Возвращаем скролл главной страницы
            const sheet = document.getElementById('about-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.add('opacity-0');
            sheet.classList.add('translate-y-full');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        window.onload = () => {
            renderApp();
            
            // Скрываем загрузочный экран
            setTimeout(() => {
                const loader = document.getElementById('app-loader');
                if(loader) {
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.remove(), 500);
                }
            }, 600); // Небольшая задержка для красоты
        };
    </script>
</body>
</html>
