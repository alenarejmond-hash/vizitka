        /* Меняйте цвета ниже. Можно использовать HEX-коды или английские названия */
        /* ========================================================================= */
        :root {
            --bg-color-1: #ffcf00; /* Желтый */
            --bg-color-2: #ff7700; /* Оранжевый */
            --bg-color-3: #b000ff; /* Фиолетовый */
        }

        .dynamic-bg {
            background: linear-gradient(-45deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3), var(--bg-color-1));
            background-size: 300% 300%;
            animation: gradient-bg 12s ease infinite;
        }

        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        html, body {
            overscroll-behavior-y: none; /* Запрет прыжков/резинки при скролле (п.6) */
        }

        body {
            color: #1c1c1e;

            user-select: none; /* Запрет выделения текста (п.1) */
        }

        /* Парящие тени как на референсе */
        .floating-shadow {
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.3), 0 20px 30px -10px rgba(0, 0, 0, 0.2);
        }

        /* Воздушные полупрозрачные карточки (Чистый эффект парения) */
        .card-shadow {
            background: rgba(20, 20, 24, 0.5) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            /* Аккуратная тень без "грязи" вокруг и легкий стеклянный блик, чтобы элементы не сливались */
            box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.5), 
                        0 10px 20px -10px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateZ(0);
        }

        /* Кнопка "Subscribe" стайл */
        .black-pill-btn {
            background-color: #1a1a1c;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        .black-pill-btn:active {
            transform: scale(0.97);
            background-color: #000000;
        }

        /* Кастомный скроллбар (скрыт для красоты) */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

            display: none;
        }

            -ms-overflow-style: none;

        }

            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        try {
            tg.disableVerticalSwipes();
        } catch(e) {}
        
        tg.setHeaderColor('#b000ff');

        // Запрет правой кнопки мыши (контекстного меню, п.1)
        document.addEventListener('contextmenu', event => event.preventDefault());

        function renderApp() {
            // Переводы статических элементов интерфейса
            document.getElementById('ui-about-btn-title').textContent = CONFIG.ui.aboutBtnTitle;
            document.getElementById('ui-about-btn-sub').textContent = CONFIG.ui.aboutBtnSub;
            document.getElementById('ui-reviews-title').textContent = CONFIG.ui.reviewsTitle;
            document.getElementById('ui-write-review-btn').textContent = CONFIG.ui.writeReview;
            document.getElementById('ui-fortune-btn-title').textContent = CONFIG.ui.fortuneBtnTitle;
            document.getElementById('ui-fortune-btn-sub').textContent = CONFIG.ui.fortuneBtnSub;
            document.getElementById('ui-socials-title').textContent = CONFIG.ui.socialsTitle;
            document.getElementById('ui-services-page-title').textContent = CONFIG.ui.servicesPageTitle;
            document.getElementById('ui-about-sheet-title').textContent = CONFIG.ui.aboutSheetTitle;
            document.getElementById('ui-training-sheet-title').textContent = CONFIG.ui.trainingSheetTitle;
            document.getElementById('training-btn').textContent = CONFIG.ui.enrollBtn;
            document.getElementById('service-sheet-btn').textContent = CONFIG.ui.enrollBtn;
            document.getElementById('ui-fortune-sheet-title').textContent = CONFIG.ui.fortuneSheetTitle;
            document.getElementById('ui-review-sheet-title').textContent = CONFIG.ui.reviewSheetTitle;
            document.getElementById('review-input-name').placeholder = CONFIG.ui.reviewNamePlaceholder;
            document.getElementById('review-input-text').placeholder = CONFIG.ui.reviewTextPlaceholder;
            document.getElementById('review-submit-btn').textContent = CONFIG.ui.reviewSubmitBtn;

            // Профиль
            document.getElementById('profile-avatar').src = CONFIG.profile.avatar;
            document.getElementById('profile-name').textContent = CONFIG.profile.name;
            document.getElementById('profile-bio').textContent = CONFIG.profile.bio;

            // Шторка "Давайте знакомиться" (Рендерим галерею)
            renderGallery('about-gallery-container', CONFIG.about.photos || [CONFIG.about.photo]);
            document.getElementById('about-text').innerHTML = CONFIG.about.text;

            // Генерация квадратных карточек-рубрик
            const container = document.getElementById('links-container');
            container.innerHTML = '';
            
            CONFIG.categories.forEach((item, index) => {
                let onClickAction = `openPostsSheet(${index})`;
                if (item.action === 'training') onClickAction = `openTrainingSheet()`;
                if (item.action === 'services') onClickAction = `openServicesPage()`;

                if (item.type === 'wide') {
                    const badgeHtml = item.badge 
                        ? `<div class="absolute -top-3 left-6 bg-white text-black text-[10px] font-extrabold px-3 py-1 w-max rounded-full shadow-[0_5px_15px_rgba(255,255,255,0.3)] z-10">${item.badge}</div>` 
                        : '';

                    container.innerHTML += `
                        <button onclick="${onClickAction}" class="col-span-2 block relative rounded-3xl p-5 card-shadow transition-transform active:scale-[0.98] flex items-center justify-between text-left w-full mt-1">
                            ${badgeHtml}
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full border border-white/40 flex items-center justify-center bg-white/10 text-white text-2xl shadow-sm shrink-0">
                                    ${item.icon}
                                </div>
                                <div>
                                    <h3 class="text-[16px] font-bold text-white">${item.title}</h3>
                                    ${item.subtitle ? `<p class="text-[13px] font-medium text-gray-300 mt-0.5">${item.subtitle}</p>` : ''}
                                </div>
                            </div>
                            <i class="ph-bold ph-caret-right text-gray-400 text-xl"></i>
                        </button>
                    `;
                } else {
                    const badgeHtml = item.badge 
                        ? `<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-white text-black text-[10px] font-extrabold px-3 py-1 w-max rounded-full shadow-[0_5px_15px_rgba(255,255,255,0.3)] z-10">${item.badge}</div>` 
                        : '';

                    container.innerHTML += `
                        <button onclick="${onClickAction}" class="block relative rounded-3xl p-4 card-shadow transition-transform active:scale-[0.98] flex flex-col items-center justify-center aspect-square w-full text-center">
                            ${badgeHtml}
                            <div class="w-12 h-12 rounded-full border border-white/40 flex items-center justify-center mb-3 bg-white/10 text-2xl text-white">
                                ${item.icon}
                            </div>
                            <h3 class="text-[14px] font-bold text-white leading-tight">${item.title}</h3>
                        </button>
                    `;
                }
            });

            // Рендер списка услуг для отдельной страницы
            const servicesList = document.getElementById('services-list');
            servicesList.innerHTML = '';
            CONFIG.services.forEach((s, index) => {
                const thumb = s.photos && s.photos.length > 0 ? s.photos[0] : s.photo;
                servicesList.innerHTML += `
                    <div class="card-shadow rounded-3xl p-4 flex gap-4 active:scale-[0.98] transition-transform text-left cursor-pointer" onclick="openServiceDetails(${index})">
                        <img src="${thumb}" class="w-24 h-24 rounded-2xl object-cover shrink-0 shadow-lg border border-white/10">
                        <div class="flex flex-col justify-between w-full">
                            <div>
                                <h3 class="text-white font-bold text-[15px] mb-1 leading-tight">${s.title}</h3>
                                <p class="text-gray-300 text-[12px] line-clamp-2 leading-tight">${s.shortDesc}</p>
                            </div>
                            <div class="flex items-end justify-between mt-2">
                                <div class="flex flex-col">
                                    ${s.oldPrice ? `<span class="text-gray-400 text-[11px] line-through leading-none mb-0.5">${s.oldPrice}</span>` : ''}
                                    <span class="text-white font-bold text-[15px] leading-none drop-shadow-md">${s.newPrice}</span>
                                </div>
                                <div class="text-[11px] font-bold text-white bg-white/10 px-3 py-1.5 rounded-full backdrop-blur-sm flex items-center gap-1">
                                    ${CONFIG.ui.moreBtn} <i class="ph-bold ph-caret-right"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Рендер карусели отзывов (Премиальные стеклянные плашки)
            const reviewsContainer = document.getElementById('reviews-container');
            reviewsContainer.innerHTML = '';
            CONFIG.reviews.forEach(review => {
                let starsHtml = '';
                for(let i=0; i<5; i++) {
                    if(i < review.stars) {
                        starsHtml += '<i class="ph-fill ph-star text-orange-400 drop-shadow-md"></i>';
                    } else {
                        starsHtml += '<i class="ph ph-star text-gray-500"></i>';
                    }
                }
                
                reviewsContainer.innerHTML += `
                    <div class="snap-start shrink-0 w-[85%] bg-black/40 backdrop-blur-2xl border border-white/10 rounded-[1.5rem] p-5 flex flex-col justify-between relative overflow-hidden ml-1 my-2">
                        <!-- Декоративный легкий блик -->
                        <div class="absolute top-0 right-0 w-24 h-24 bg-white/5 rounded-full blur-2xl -translate-y-1/2 translate-x-1/2"></div>
                        
                        <div class="relative z-10">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-2.5">
                                    <!-- Аватарка (первая буква имени) -->
                                    <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white font-bold text-xs border border-white/20 shadow-sm">
                                        ${review.name.charAt(0)}
                                    </div>
                                    <h4 class="text-white font-bold text-[15px]">${review.name}</h4>
                                </div>
                                <span class="text-gray-300 text-[11px] font-medium opacity-80">${review.date}</span>
                            </div>
                            <div class="flex gap-1 mb-3 text-[14px]">
                                ${starsHtml}
                            </div>
                            <p class="text-gray-100 text-[13px] leading-relaxed font-medium italic">"${review.text}"</p>
                        </div>
                    </div>
                `;
            });

            // Соцсети
            document.getElementById('social-tg').href = CONFIG.socials.telegram;
            document.getElementById('social-inst').href = CONFIG.socials.instagram;
            document.getElementById('social-yt').href = CONFIG.socials.youtube;
            document.getElementById('social-vk').href = CONFIG.socials.vk;
        }

        // --- ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ЯЗЫКА ---
        function toggleLanguage() {
            tg.HapticFeedback.impactOccurred('medium');
            const langBtn = document.getElementById('lang-btn');
            
            // Находим главные экраны для эффекта плавного затухания
            const screens = [document.getElementById('main-screen'), document.getElementById('services-screen')];
            
            // Плавно прячем контент
            screens.forEach(s => { 
                if(s) {
                    s.style.transition = 'opacity 0.2s ease'; 
                    s.style.opacity = '0'; 
                }
            });
            
            // Меняем язык через 200мс (пока контент скрыт)
            setTimeout(() => {
                currentLang = currentLang === 'ru' ? 'en' : 'ru';
                langBtn.textContent = currentLang === 'ru' ? 'EN' : 'RU';
                
                // Берем нужный конфиг (APP_DATA.ru или APP_DATA.en)
                CONFIG = APP_DATA[currentLang];
                
                // Перерисовываем интерфейс с новыми данными
                renderApp();
                
                // Плавно возвращаем контент
                screens.forEach(s => { 
                    if(s) s.style.opacity = '1'; 
                });
            }, 200);
        }

        // --- ЛОГИКА ФОРМЫ ОТЗЫВОВ ---
        let currentRating = 0;
        function setRating(stars) {
            currentRating = stars;
            tg.HapticFeedback.impactOccurred('light');
            const starElements = document.querySelectorAll('#star-rating i');
            starElements.forEach((el, index) => {
                if (index < stars) {
                    el.classList.remove('text-gray-500');
                    el.classList.add('text-orange-400');
                } else {
                    el.classList.remove('text-orange-400');
                    el.classList.add('text-gray-500');
                }
            });
        }

        function openReviewSheet() {
            tg.HapticFeedback.impactOccurred('medium');
            document.body.style.overflow = 'hidden'; 
            
            // Сброс формы перед открытием
            setRating(0);
            document.getElementById('review-input-name').value = '';
            document.getElementById('review-input-text').value = '';

            const sheet = document.getElementById('review-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        function submitReview() {
            if (currentRating === 0) {
                tg.HapticFeedback.notificationOccurred('warning');
                showToast(CONFIG.ui.toastWarning, 'ph-fill ph-warning-circle');
                return; // Не даем отправить без оценки
            }
            // Здесь в будущем будет отправка в Google Таблицы
            showToast(CONFIG.ui.toastSuccess, 'ph-fill ph-heart');
            closeSheet();
        }

        // Открытие шторки Предсказания
        function openFortuneSheet() {
            tg.HapticFeedback.impactOccurred('medium');
            document.body.style.overflow = 'hidden'; 

            const randomIndex = Math.floor(Math.random() * CONFIG.fortunes.length);
            const fortune = CONFIG.fortunes[randomIndex];

            document.getElementById('fortune-text').innerHTML = `«${fortune.text}»`;
            document.getElementById('fortune-link-text').textContent = fortune.postTitle;
            document.getElementById('fortune-link').href = fortune.postLink;

            const sheet = document.getElementById('fortune-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        // --- ЛОГИКА ОТКРЫТИЯ ЭКРАНОВ И ШТОРОК ---

        // Открытие страницы Услуг
        function openServicesPage() {
            tg.HapticFeedback.impactOccurred('light');
            document.getElementById('main-screen').classList.add('hidden');
            const servicesScreen = document.getElementById('services-screen');
            servicesScreen.classList.remove('hidden');
            servicesScreen.classList.add('fade-in');
            window.scrollTo(0, 0);
        }

        // Закрытие страницы Услуг
        function closeServicesPage() {
            tg.HapticFeedback.impactOccurred('light');
            document.getElementById('services-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        // Открытие шторки с конкретной услугой
        function openServiceDetails(index) {
            tg.HapticFeedback.impactOccurred('light');
            document.body.style.overflow = 'hidden';

            const service = CONFIG.services[index];
            document.getElementById('service-sheet-title').textContent = service.title;
            renderGallery('service-gallery-container', service.photos || [service.photo]);
            document.getElementById('service-sheet-desc').innerHTML = service.fullDesc;
            document.getElementById('service-sheet-new-price').textContent = service.newPrice;
            document.getElementById('service-sheet-old-price').textContent = service.oldPrice || '';
            document.getElementById('service-sheet-btn').href = service.buttonLink;

            const sheet = document.getElementById('service-details-sheet');
            const overlay = document.getElementById('sheet-overlay');

            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        // Открытие шторки Обучения
        function openTrainingSheet() {
            tg.HapticFeedback.impactOccurred('light');
            document.body.style.overflow = 'hidden'; 

            document.getElementById('training-photo').src = CONFIG.training.photo;
            document.getElementById('training-text').innerHTML = CONFIG.training.text;
            document.getElementById('training-btn').href = CONFIG.training.buttonLink;

            const sheet = document.getElementById('training-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        // Открытие шторки с постами
        function openPostsSheet(index) {
            tg.HapticFeedback.impactOccurred('light');
            document.body.style.overflow = 'hidden'; 
            
            const category = CONFIG.categories[index];
            document.getElementById('posts-sheet-title').textContent = category.title;
            
            const list = document.getElementById('posts-sheet-list');
            list.innerHTML = '';
            category.posts.forEach(post => {
                list.innerHTML += `
                    <a href="${post.link}" target="_blank" onclick="tg.HapticFeedback.impactOccurred('light')" class="block p-4 rounded-2xl bg-white/10 hover:bg-white/20 border border-white/20 transition-colors flex items-center justify-between active:scale-[0.98]">
                        <span class="text-[14px] font-bold text-white text-left">${post.title}</span>
                        <i class="ph-bold ph-caret-right text-gray-300"></i>
                    </a>
                `;
            });

            const sheet = document.getElementById('posts-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        // Открытие шторки "Обо мне"
        function openSheet() {
            tg.HapticFeedback.impactOccurred('light');
            document.body.style.overflow = 'hidden'; 
            const sheet = document.getElementById('about-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                sheet.classList.remove('translate-y-full');
            }, 10);
        }

        // Универсальное закрытие любой шторки
        function closeSheet() {
            document.body.style.overflow = ''; 
            const aboutSheet = document.getElementById('about-sheet');
            const postsSheet = document.getElementById('posts-sheet');
            const trainingSheet = document.getElementById('training-sheet');
            const serviceDetailsSheet = document.getElementById('service-details-sheet');
            const fortuneSheet = document.getElementById('fortune-sheet');
            const reviewSheet = document.getElementById('review-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            overlay.classList.add('opacity-0');
            aboutSheet.classList.add('translate-y-full');
            postsSheet.classList.add('translate-y-full');
            trainingSheet.classList.add('translate-y-full');
            serviceDetailsSheet.classList.add('translate-y-full');
            fortuneSheet.classList.add('translate-y-full');
            reviewSheet.classList.add('translate-y-full');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        // --- НОВЫЕ ФУНКЦИИ (ТОСТЫ, ГАЛЕРЕЯ, ПОДЕЛИТЬСЯ) ---
        
        // Всплывающее уведомление (Toast)
        let toastTimeout;
        function showToast(message, iconClass = 'ph-fill ph-check-circle') {
            tg.HapticFeedback.notificationOccurred('success');
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="${iconClass} text-orange-400 text-lg"></i><span>${message}</span>`;
            
            toast.classList.remove('-translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('-translate-y-24', 'opacity-0');
            }, 2500);
        }

        // Кнопка Поделиться (Share)
        function shareProfile() {
            tg.HapticFeedback.impactOccurred('medium');
            // Здесь должна быть ссылка на твоего бота, который открывает это приложение
            const shareUrl = "https://t.me/telegram"; 
            const shareText = "🔥 Смотри крутое фаер-шоу Полины Чубакиной!";
            const telegramUrl = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`;
            tg.openTelegramLink(telegramUrl);
        }

        // Рендер галереи-свайпера с точками
        function renderGallery(containerId, photos) {
            const wrapper = document.getElementById(containerId);
            if (!photos || photos.length === 0) return;
            
            const aspectClass = containerId === 'service-gallery-container' ? 'aspect-video' : 'aspect-square';
            
            let html = `
            <div class="relative w-full ${aspectClass} rounded-[2rem] overflow-hidden mb-5 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
                <div class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar h-full w-full" id="${containerId}-scroll" onscroll="updateGalleryDots('${containerId}')">
                    ${photos.map(p => `<img src="${p}" class="w-full h-full object-cover shrink-0 snap-center">`).join('')}
                </div>
                ${photos.length > 1 ? `
                <div class="absolute bottom-4 left-0 w-full flex justify-center gap-2 z-10" id="${containerId}-dots">
                    ${photos.map((_, i) => `<div class="w-2 h-2 rounded-full bg-white transition-all duration-300 shadow-md ${i === 0 ? 'opacity-100 scale-125' : 'opacity-40'}"></div>`).join('')}
                </div>
                ` : ''}
            </div>
            `;
            wrapper.innerHTML = html;
        }

        // Обновление активной точки при свайпе галереи
        function updateGalleryDots(containerId) {
            const scrollContainer = document.getElementById(`${containerId}-scroll`);
            const dotsContainer = document.getElementById(`${containerId}-dots`);
            if (!scrollContainer || !dotsContainer) return;
            
            const scrollLeft = scrollContainer.scrollLeft;
            const width = scrollContainer.clientWidth;
            const index = Math.round(scrollLeft / width);
            
            Array.from(dotsContainer.children).forEach((dot, i) => {
                if (i === index) {
                    dot.classList.remove('opacity-40');
                    dot.classList.add('opacity-100', 'scale-125');
                } else {
                    dot.classList.remove('opacity-100', 'scale-125');
                    dot.classList.add('opacity-40');
                }
            });
        }

        window.onload = () => {
            renderApp();
            
            // --- ЛОГИКА 3D-НАКЛОНА (TILT EFFECT) ДЛЯ ГЛАВНОГО ФОТО ---
            const tiltCard = document.getElementById('tilt-card');
            const tiltGlare = document.getElementById('tilt-glare');
            
            if(tiltCard) {
                function handleTiltMove(e) {
                    const rect = tiltCard.getBoundingClientRect();
                    // Получаем координаты мыши или пальца
                    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                    
                    const x = clientX - rect.left;
                    const y = clientY - rect.top;
                    
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    // Вычисляем угол наклона (максимум 12 градусов)
                    const rotateX = ((y - centerY) / centerY) * -12; 
                    const rotateY = ((x - centerX) / centerX) * 12;
                    
                    // Применяем наклон
                    tiltCard.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                    
                    // Двигаем блик
                    if(tiltGlare) {
                        tiltGlare.style.opacity = '1';
                        const glareX = (x / rect.width) * 100;
                        const glareY = (y / rect.height) * 100;
                        tiltGlare.style.background = `radial-gradient(circle at ${glareX}% ${glareY}%, rgba(255,255,255,0.4) 0%, transparent 60%)`;
                    }
                }
                
                function handleTiltLeave() {
                    // Возвращаем в исходное положение
                    tiltCard.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                    if(tiltGlare) {
                        tiltGlare.style.opacity = '0';
                    }
                }
                
                // Слушатели для мыши (ПК) и пальцев (Сенсор)
                tiltCard.addEventListener('mousemove', handleTiltMove);
                tiltCard.addEventListener('mouseleave', handleTiltLeave);
                tiltCard.addEventListener('touchmove', handleTiltMove, {passive: true});
                tiltCard.addEventListener('touchend', handleTiltLeave);
            }

            // Логика свайпа вниз для закрытия шторок
            let touchStartY = 0;
            let touchCurrentY = 0;
            document.querySelectorAll('.drag-handle').forEach(handle => {
                handle.addEventListener('touchstart', (e) => {
                    touchStartY = e.touches[0].clientY;
                }, {passive: true});
                handle.addEventListener('touchmove', (e) => {
                    touchCurrentY = e.touches[0].clientY;
                }, {passive: true});
                handle.addEventListener('touchend', (e) => {
                    if (touchCurrentY > touchStartY + 40) { // Если потянули вниз больше чем на 40px
                        closeSheet();
                    }
                });
            });
            
            setTimeout(() => {
                const loader = document.getElementById('app-loader');
                if(loader) {
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.remove(), 500);
                }
            }, 600);
        };
    </script>
</body>
</html>
